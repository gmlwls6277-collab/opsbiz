<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OPSbiz — 운영 관리 시스템</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F8FAFC;--bg2:#FFFFFF;--bg3:#F1F5F9;--bg4:#E8EEF5;
  --bd:#E2E8F0;--bd2:#CBD5E1;
  --t1:#0F172A;--t2:#475569;--t3:#94A3B8;
  --blue:#3B82F6;--blue-d:#2563EB;--blue-l:#EFF6FF;--blue-m:#DBEAFE;
  --green:#10B981;--green-l:#ECFDF5;--green-d:#059669;
  --amber:#F59E0B;--amber-l:#FFFBEB;--amber-d:#B45309;
  --red:#EF4444;--red-l:#FEF2F2;--red-d:#B91C1C;
  --purple:#8B5CF6;--purple-l:#F5F3FF;
  --cyan:#06B6D4;--cyan-l:#ECFEFF;
  --r:6px;--rlg:10px;
  --font:'Noto Sans KR',-apple-system,sans-serif;
  --mono:'Space Mono',monospace;
}
body{font-family:var(--font);background:var(--bg);color:var(--t1);min-height:100vh;-webkit-font-smoothing:antialiased;font-size:14px;line-height:1.55}
button,input,select,textarea{font-family:var(--font);font-size:14px}
button{cursor:pointer}input,select,textarea{cursor:text}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#CBD5E1;border-radius:99px}

/* ═══ LAYOUT ═══════════════════════════════════════ */
.hdr{height:54px;background:#FFFFFF;border-bottom:1px solid var(--bd);box-shadow:0 1px 4px rgba(0,0,0,.06);display:flex;align-items:center;padding:0 20px;gap:12px;position:sticky;top:0;z-index:200;flex-shrink:0}
.logo{display:flex;align-items:center;gap:8px;flex-shrink:0}
.logo-mark{width:28px;height:28px;background:var(--blue);border-radius:6px;display:flex;align-items:center;justify-content:center}
.logo-mark svg{width:14px;height:14px}
.logo-text{font-size:15px;font-weight:800;letter-spacing:-.01em}
.logo-text b{color:var(--blue)}
.logo-badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:99px;background:var(--blue-l);color:var(--blue);letter-spacing:.04em}
.hdiv{width:1px;height:20px;background:var(--bd);flex-shrink:0}
.hnav{display:flex;align-items:center;gap:2px;flex:1}
.hnb{padding:5px 12px;font-size:13px;font-weight:500;color:var(--t2);border:none;background:none;border-radius:var(--r);transition:all .12s;white-space:nowrap}
.hnb:hover{color:var(--t1);background:var(--bg3)}
.hnb.on{color:var(--blue);font-weight:700;background:var(--blue-l)}
.hright{display:flex;align-items:center;gap:8px;margin-left:auto}
.btn-p{display:flex;align-items:center;gap:5px;padding:7px 14px;background:var(--blue);color:#fff;border:none;border-radius:var(--r);font-size:13px;font-weight:600;transition:all .12s}
.btn-p:hover{background:var(--blue-d);transform:translateY(-1px)}
.btn-p svg{width:12px;height:12px}
.btn-s{display:flex;align-items:center;gap:5px;padding:7px 12px;background:var(--bg3);color:var(--t2);border:1px solid var(--bd2);border-radius:var(--r);font-size:13px;font-weight:500;transition:all .12s}
.btn-s:hover{color:var(--t1);border-color:var(--t3)}

.app{display:flex;height:calc(100vh - 54px);overflow:hidden}

/* ═══ SIDEBAR ═══════════════════════════════════════ */
.sb{width:220px;flex-shrink:0;background:#F8FAFC;border-right:1px solid var(--bd);display:flex;flex-direction:column;overflow:hidden}
.sb-nav{flex:1;overflow-y:auto;padding:10px 8px;display:flex;flex-direction:column;gap:1px}
.sb-sec{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--t3);padding:8px 10px 4px;margin-top:6px}
.sb-sec:first-child{margin-top:0}
.sni{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:var(--r);font-size:13px;font-weight:500;color:var(--t2);border:none;background:none;width:100%;text-align:left;transition:all .12s;position:relative}
.sni svg{width:15px;height:15px;flex-shrink:0}
.sni:hover{background:var(--bg3);color:var(--t1)}
.sni.on{background:var(--blue-l);color:var(--blue);font-weight:600}
.sni.on::before{content:'';position:absolute;left:0;top:20%;bottom:20%;width:2px;border-radius:1px;background:var(--blue)}
.sni-badge{margin-left:auto;font-family:var(--mono);font-size:10px;font-weight:700;padding:1px 7px;border-radius:99px;background:var(--bg3);color:var(--t2)}
.sni.on .sni-badge{background:var(--blue-m);color:var(--blue)}
.sni-badge.danger{background:var(--red-l);color:var(--red)}
.sb-footer{padding:12px;border-top:1px solid var(--bd)}
.sb-team-pills{display:flex;gap:5px;flex-wrap:wrap}
.team-pill{display:flex;align-items:center;gap:4px;padding:3px 8px 3px 4px;border-radius:99px;background:var(--bg3);border:1px solid var(--bd2);font-size:11px;font-weight:500;color:var(--t2)}
.team-av{width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:7px;font-weight:800;color:#fff;flex-shrink:0}

/* ═══ MAIN ═══════════════════════════════════════════ */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{height:48px;background:#FFFFFF;border-bottom:1px solid var(--bd);box-shadow:0 1px 3px rgba(0,0,0,.04);display:flex;align-items:center;padding:0 20px;gap:10px;flex-shrink:0}
.topbar-title{font-size:15px;font-weight:700;color:var(--t1)}
.topbar-sub{font-size:12px;color:var(--t3)}
.topbar-right{margin-left:auto;display:flex;gap:8px;align-items:center}

.pane{display:none;flex:1;overflow:hidden;flex-direction:column;min-height:0}
.pane.on{display:flex}

/* ═══ CARDS ═══════════════════════════════════════════ */
.card{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--rlg);box-shadow:0 1px 3px rgba(0,0,0,.05)}
.card-hd{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--bd);gap:8px}
.card-title{font-size:13px;font-weight:700;color:var(--t1)}
.card-sub{font-size:11px;color:var(--t3)}
.card-body{padding:14px 16px}

/* ═══ KPI ═══════════════════════════════════════════ */
.kpi-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:11px;margin-bottom:14px}
.kpi-card{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--rlg);padding:15px 16px;position:relative;overflow:hidden;cursor:pointer;transition:all .15s;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.kpi-card:hover{border-color:var(--blue);box-shadow:0 4px 12px rgba(59,130,246,.12);transform:translateY(-1px)}
.kpi-card::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;border-radius:var(--rlg) var(--rlg) 0 0}
.kpi-icon{width:30px;height:30px;border-radius:var(--r);display:flex;align-items:center;justify-content:center;margin-bottom:10px}
.kpi-icon svg{width:14px;height:14px}
.kpi-lbl{font-size:11px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--t3);margin-bottom:4px}
.kpi-val{font-family:var(--mono);font-size:26px;font-weight:700;line-height:1;margin-bottom:4px;letter-spacing:-.02em}
.kpi-sub{font-size:12px;color:var(--t3)}
.kpi-delta{font-size:11px;font-weight:600;margin-top:5px}
.kpi-blue .kpi-icon{background:var(--blue-l);color:var(--blue)} .kpi-blue .kpi-val{color:var(--blue)} .kpi-blue::after{background:var(--blue)}
.kpi-green .kpi-icon{background:var(--green-l);color:var(--green)} .kpi-green .kpi-val{color:var(--green)} .kpi-green::after{background:var(--green)}
.kpi-amber .kpi-icon{background:var(--amber-l);color:var(--amber)} .kpi-amber .kpi-val{color:var(--amber)} .kpi-amber::after{background:var(--amber)}
.kpi-red .kpi-icon{background:var(--red-l);color:var(--red)} .kpi-red .kpi-val{color:var(--red)} .kpi-red::after{background:var(--red)}
.kpi-purple .kpi-icon{background:var(--purple-l);color:var(--purple)} .kpi-purple .kpi-val{color:var(--purple)} .kpi-purple::after{background:var(--purple)}

/* ═══ BADGE ═══════════════════════════════════════════ */
.bdg{display:inline-flex;align-items:center;gap:3px;font-size:11px;font-weight:600;padding:2px 8px;border-radius:99px;white-space:nowrap}
.qa-open{background:#EFF6FF;color:#1D4ED8} .qa-progress{background:var(--blue-l);color:var(--blue)} .qa-review{background:var(--amber-l);color:var(--amber)} .qa-done{background:var(--green-l);color:var(--green)} .qa-hold{background:var(--bg3);color:var(--t3)}
.tp-routine{background:var(--cyan-l);color:var(--cyan)} .tp-maint{background:var(--blue-l);color:var(--blue)} .tp-enhance{background:var(--purple-l);color:var(--purple)} .tp-bug{background:rgba(245,158,11,.18);color:#FCD34D} .tp-incident{background:var(--red-l);color:var(--red);font-weight:800}
.tm-kr{background:var(--blue-l);color:var(--blue)} .tm-vn{background:var(--green-l);color:var(--green)}
.rc-REQ{background:var(--amber-l);color:var(--amber)} .rc-DEV{background:var(--red-l);color:var(--red)} .rc-QA{background:var(--purple-l);color:var(--purple)} .rc-OPS{background:var(--cyan-l);color:var(--cyan)} .rc-EXT{background:var(--bg3);color:var(--t3)}

/* ═══ TABLE ═══════════════════════════════════════════ */
.tbl-wrap{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--rlg);overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.05)}
table{width:100%;border-collapse:collapse}
thead tr{background:#F8FAFC}
th{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--t3);padding:10px 14px;text-align:left;border-bottom:1px solid var(--bd);white-space:nowrap}
td{padding:11px 14px;font-size:13px;color:var(--t2);border-bottom:1px solid var(--bd);vertical-align:middle}
tbody tr:last-child td{border:none}
tbody tr:hover{background:#F8FAFC;cursor:pointer}

/* ═══ TICKET LIST LAYOUT ═══════════════════════════ */
.tk-layout{display:flex;flex:1;overflow:hidden;min-height:0}
.tk-list{width:340px;flex-shrink:0;border-right:1px solid var(--bd);display:flex;flex-direction:column;background:#FFFFFF}
.tk-hd{padding:14px 14px 10px;border-bottom:1px solid var(--bd);flex-shrink:0}
.tk-hd-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.tk-hd-title{font-size:14px;font-weight:700;color:var(--t1)}
.tk-cnt{font-family:var(--mono);font-size:11px;font-weight:700;padding:2px 8px;border-radius:99px;background:var(--blue-m);color:var(--blue)}
.tk-filters{display:flex;flex-direction:column;gap:7px}
.tk-search{position:relative}
.tk-search svg{position:absolute;left:9px;top:50%;transform:translateY(-50%);width:13px;height:13px;color:var(--t3);pointer-events:none}
.tk-search input{width:100%;background:var(--bg3);border:1px solid var(--bd2);border-radius:var(--r);padding:8px 10px 8px 30px;font-size:13px;color:var(--t1);outline:none;transition:border-color .12s}
.tk-search input:focus{border-color:var(--blue)}
.tk-search input::placeholder{color:var(--t3)}
.chips{display:flex;gap:4px;flex-wrap:wrap}
.chip{padding:4px 9px;border-radius:99px;border:1px solid var(--bd2);background:transparent;font-size:12px;font-weight:500;color:var(--t3);transition:all .11s}
.chip:hover{border-color:var(--blue);color:var(--blue);background:#EFF6FF}
.chip.on{background:var(--blue-l);border-color:var(--blue);color:var(--blue);font-weight:600}
.tk-items{flex:1;overflow-y:auto;padding:8px}
.tki{padding:11px 12px;border-radius:var(--r);border:1px solid var(--bd);background:#FFFFFF;margin-bottom:5px;cursor:pointer;transition:all .11s;border-left:2px solid transparent}
.tki:hover{background:#F8FAFC;border-color:var(--blue-d)}
.tki.on{background:#EFF6FF;border-color:#BFDBFE;border-left-color:var(--blue)}
.tki.inc-item{border-left-color:var(--red) !important}
.tki-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px;gap:6px}
.tki-id{font-family:var(--mono);font-size:10px;color:var(--t3)}
.tki-title{font-size:13px;font-weight:500;color:var(--t1);line-height:1.4;margin-bottom:6px}
.tki-meta{display:flex;align-items:center;gap:5px;flex-wrap:wrap}

/* ═══ TICKET DETAIL ═══════════════════════════════════ */
.tk-detail{flex:1;overflow-y:auto;background:var(--bg);display:flex;flex-direction:column;min-width:0}
.tk-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--t3);font-size:14px;gap:10px}
.tk-empty svg{width:44px;height:44px;opacity:.18}
.td-inner{padding:24px;max-width:820px;width:100%}
.td-id-row{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.td-title{font-size:20px;font-weight:800;color:var(--t1);line-height:1.3;margin-bottom:12px;letter-spacing:-.01em}
.td-badges{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:18px}
.td-sec{background:#FFFFFF;border:1px solid var(--bd);border-radius:var(--rlg);padding:16px;margin-bottom:12px}
.td-sec-title{font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--t3);margin-bottom:12px}
.td-g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.td-g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.td-field{display:flex;flex-direction:column;gap:4px}
.td-fl{font-size:11px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.04em}
.td-fv{font-size:14px;font-weight:500;color:var(--t1);display:flex;align-items:center;gap:6px}
.td-fv-mono{font-family:var(--mono);font-size:14px;font-weight:700}
.qa-steps{display:flex;gap:5px;flex-wrap:wrap}
.qa-step{padding:7px 13px;border-radius:var(--r);border:1px solid var(--bd2);background:var(--bg3);font-size:12px;font-weight:500;color:var(--t3);cursor:pointer;transition:all .11s}
.qa-step:hover{border-color:var(--blue);color:var(--blue)}
.qa-step.on{border-color:var(--blue);background:var(--blue-l);color:var(--blue);font-weight:600}
.dur-box{display:flex;align-items:center;gap:14px;padding:12px 14px;background:#F8FAFC;border-radius:var(--r);border:1px solid var(--bd);margin-top:8px}
.dur-val{font-family:var(--mono);font-size:22px;font-weight:700}
.dur-lbl{font-size:11px;color:var(--t3);margin-top:2px}
.td-actions{display:flex;gap:8px;align-items:center;padding:14px 24px;border-top:1px solid var(--bd);background:#FFFFFF;flex-shrink:0}
.btn-ghost{padding:7px 14px;border:1px solid var(--bd2);border-radius:var(--r);background:transparent;color:var(--t2);font-size:13px;font-weight:500;transition:all .11s}
.btn-ghost:hover{border-color:var(--t3);color:var(--t1)}
.btn-danger{padding:7px 14px;border:1px solid rgba(239,68,68,.3);border-radius:var(--r);background:var(--red-l);color:var(--red);font-size:13px;font-weight:600;transition:all .11s;margin-left:auto}
.btn-danger:hover{background:var(--red);color:#fff}
.btn-done{display:flex;align-items:center;gap:5px;padding:7px 14px;border:1px solid rgba(16,185,129,.3);border-radius:var(--r);background:var(--green-l);color:var(--green);font-size:13px;font-weight:600;transition:all .11s}
.btn-done:hover{background:var(--green);color:#fff}
.btn-done svg{width:12px;height:12px}

/* ═══ DASH LAYOUT ═══════════════════════════════════ */
.dash-body{flex:1;overflow-y:auto;padding:18px}
.dg2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.dg21{display:grid;grid-template-columns:2fr 1fr;gap:12px;margin-bottom:12px}
.dg3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:12px}

/* Charts */
.spark{display:flex;align-items:flex-end;gap:4px;height:72px}
.sc{display:flex;flex-direction:column;align-items:center;gap:3px;flex:1}
.sc-bars{display:flex;gap:2px;align-items:flex-end;height:54px;width:100%;justify-content:center}
.sc-b{border-radius:3px 3px 0 0;min-width:6px;flex:1;transition:opacity .15s}
.sc-b:hover{opacity:.72}
.sc-lbl{font-size:10px;color:var(--t3)}
.hbar-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.hbar-lbl{font-size:12px;font-weight:500;color:var(--t2);flex-shrink:0}
.hbar-track{flex:1;height:6px;background:var(--bg3);border-radius:99px;overflow:hidden}
.hbar-fill{height:100%;border-radius:99px;transition:width .5s}
.hbar-val{font-family:var(--mono);font-size:11px;font-weight:600;color:var(--t2);width:40px;text-align:right;flex-shrink:0}
.ring-wrap{position:relative;display:inline-flex;align-items:center;justify-content:center}
.ring-center{position:absolute;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ring-val{font-family:var(--mono);font-weight:700;line-height:1;color:var(--t1)}
.ring-lbl{font-size:10px;color:var(--t3);margin-top:2px}
.leg{display:flex;flex-wrap:wrap;gap:8px}
.leg-item{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--t2)}
.leg-dot{width:8px;height:8px;border-radius:2px}

/* VS compare */
.vs-card{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--rlg);overflow:hidden}
.vs-hd{display:grid;grid-template-columns:1fr 60px 1fr;background:#F8FAFC;border-bottom:1px solid var(--bd)}
.vs-team{padding:12px 14px;display:flex;align-items:center;gap:7px}
.vs-team-r{flex-direction:row-reverse;text-align:right}
.vs-name{font-size:13px;font-weight:800}
.vs-sub{font-size:11px;color:var(--t3);margin-top:1px}
.vs-divider{display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--t3);font-family:var(--mono);border-left:1px solid var(--bd);border-right:1px solid var(--bd)}
.vs-row{display:grid;grid-template-columns:1fr 80px 1fr;border-bottom:1px solid var(--bd);align-items:stretch}
.vs-row:last-child{border:none}
.vs-val{padding:10px 14px;font-size:13px;font-weight:600;color:var(--t1);display:flex;align-items:center}
.vs-val-r{justify-content:flex-end}
.vs-metric{padding:10px 6px;text-align:center;font-size:11px;font-weight:500;color:var(--t3);background:#F8FAFC;border-left:1px solid var(--bd);border-right:1px solid var(--bd);display:flex;align-items:center;justify-content:center;line-height:1.3}
.win-kr{color:var(--blue);font-weight:800}
.win-vn{color:var(--green);font-weight:800}

/* Mini tk list */
.mini-tk{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--bd);cursor:pointer}
.mini-tk:last-child{border:none}
.mini-tk:hover{opacity:.8}
.mini-id{font-family:var(--mono);font-size:10px;color:var(--t3);width:44px;flex-shrink:0}
.mini-title{flex:1;font-size:13px;font-weight:500;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mini-right{display:flex;align-items:center;gap:4px;flex-shrink:0}

/* Incident banner */
.inc-banner{background:linear-gradient(135deg,#FFF1F2,#FFE4E6);border:1px solid #FECACA;border-radius:var(--rlg);padding:14px 18px;margin-bottom:14px;display:flex;align-items:center;gap:14px;cursor:pointer;animation:incPulse 2.5s ease-in-out infinite}
@keyframes incPulse{0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,0)}50%{box-shadow:0 0 0 4px rgba(239,68,68,.15)}}
.inc-dot{width:10px;height:10px;border-radius:50%;background:var(--red);flex-shrink:0;animation:blink 1s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.inc-count{font-family:var(--mono);font-size:28px;font-weight:700;color:var(--red);flex-shrink:0}

/* ═══ ROUTINE PANE ═══════════════════════════════════ */
.rt-wrap{flex:1;overflow-y:auto;padding:18px}
.rt-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px;gap:12px}
.rt-prog-row{display:flex;align-items:center;gap:8px;margin-top:8px}
.rt-prog-bar{width:200px;height:6px;background:var(--bg3);border-radius:99px;overflow:hidden}
.rt-prog-fill{height:100%;background:var(--green);border-radius:99px;transition:width .4s}
.rt-section{margin-bottom:20px}
.rt-sec-hd{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.rt-sec-lbl{font-size:13px;font-weight:700;color:var(--t1)}
.rt-sec-cnt{font-family:var(--mono);font-size:11px;font-weight:700;padding:2px 7px;border-radius:99px;background:var(--bg3);color:var(--t2)}
.rt-sec-cnt.all{background:var(--green-l);color:var(--green)}
.rt-sec-line{flex:1;height:1px;background:var(--bd)}
.rt-list{background:#FFFFFF;border:1px solid var(--bd);border-radius:var(--rlg);overflow:hidden}
.rt-item{display:flex;align-items:center;gap:10px;padding:13px 15px;border-bottom:1px solid var(--bd);transition:background .1s}
.rt-item:last-child{border:none}
.rt-item:hover{background:var(--bg3)}
.rt-item.done .rt-item-text{text-decoration:line-through;color:var(--t3)}
.rt-chk{width:18px;height:18px;border-radius:5px;border:1.5px solid var(--bd2);background:transparent;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:all .13s}
.rt-chk:hover{border-color:var(--green)}
.rt-chk.on{background:var(--green);border-color:var(--green)}
.rt-chk svg{width:10px;height:10px;color:#fff}
.rt-item-body{flex:1;min-width:0}
.rt-item-text{font-size:13px;font-weight:500;color:var(--t1)}
.rt-item-meta{display:flex;align-items:center;gap:6px;margin-top:3px}
.rt-item-who{font-size:11px;color:var(--t3)}
.rt-item-actions{display:flex;align-items:center;gap:4px;flex-shrink:0}
.rt-done-btn{padding:4px 10px;border-radius:99px;font-size:11px;font-weight:600;border:1px solid var(--green);background:var(--green-l);color:var(--green);cursor:pointer;transition:all .11s;white-space:nowrap}
.rt-done-btn:hover{background:var(--green);color:#fff}
.rt-done-btn.undone{border-color:var(--bd2);background:var(--bg3);color:var(--t3)}
.rt-done-btn.undone:hover{border-color:var(--red);color:var(--red)}
.rt-del{width:24px;height:24px;border:none;border-radius:4px;background:transparent;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--t3);transition:all .11s}
.rt-del:hover{background:var(--red-l);color:var(--red)}
.rt-del svg{width:11px;height:11px}
.rt-hist{margin-top:14px}
.rt-hist-title{font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
.rt-run-item{display:flex;align-items:center;justify-content:space-between;padding:7px 12px;background:var(--bg3);border-radius:var(--r);margin-bottom:5px;font-size:12px}
.rt-run-date{color:var(--t3);font-family:var(--mono)}
.rt-run-status{font-weight:600}
.rt-run-done{color:var(--green)}
.rt-run-skip{color:var(--amber)}

/* ═══ ANALYTICS ═══════════════════════════════════════ */
.an-tabs{display:flex;gap:2px;padding:12px 18px 0;background:#FFFFFF;border-bottom:1px solid var(--bd);flex-shrink:0}
.an-tab{padding:7px 14px;font-size:13px;font-weight:600;color:var(--t2);border:none;background:none;border-bottom:2px solid transparent;cursor:pointer;transition:all .12s}
.an-tab:hover{color:var(--t1)}
.an-tab.on{color:var(--blue);border-bottom-color:var(--blue)}
.an-body{flex:1;overflow-y:auto;padding:18px;background:var(--bg)}
.kpi-strip{display:grid;gap:10px;margin-bottom:14px}
.ks4{grid-template-columns:repeat(4,1fr)}

/* grade */
.grade{font-family:var(--mono);font-size:12px;font-weight:700;padding:3px 9px;border-radius:var(--r);display:inline-flex;align-items:center}
.gr-A{background:var(--green-l);color:var(--green)}.gr-B{background:var(--blue-l);color:var(--blue)}.gr-C{background:var(--amber-l);color:var(--amber)}.gr-D{background:var(--red-l);color:var(--red)}

/* kbox */
.kbox{background:#FFFFFF;border:1px solid var(--bd);box-shadow:0 1px 3px rgba(0,0,0,.05);border-radius:var(--rlg);padding:14px 15px;position:relative;overflow:hidden;cursor:pointer;transition:border-color .15s}
.kbox:hover{border-color:var(--bd2)}
.kbox-bar{position:absolute;top:0;left:0;right:0;height:2px;border-radius:var(--rlg) var(--rlg) 0 0}
.kbox-lbl{font-size:11px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--t3);margin-bottom:4px}
.kbox-val{font-family:var(--mono);font-size:22px;font-weight:700;line-height:1;margin-bottom:4px}
.kbox-sub{font-size:12px;color:var(--t3)}

/* ═══ ADMIN PANE ═══════════════════════════════════════ */
.admin-wrap{flex:1;overflow-y:auto;padding:18px}
.admin-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.member-card{background:#FFFFFF;border:1px solid var(--bd);box-shadow:0 1px 3px rgba(0,0,0,.05);border-radius:var(--rlg);padding:14px;display:flex;align-items:center;gap:12px;transition:border-color .15s}
.member-card:hover{border-color:var(--bd2)}
.mem-av{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:#fff;flex-shrink:0}
.mem-info{flex:1;min-width:0}
.mem-name{font-size:14px;font-weight:700;color:var(--t1)}
.mem-role{font-size:12px;color:var(--t3);margin-top:2px}
.mem-stats{display:flex;gap:8px;margin-top:6px}
.mem-stat{font-size:11px;color:var(--t2);display:flex;align-items:center;gap:3px}
.mem-actions{display:flex;gap:4px;flex-shrink:0}
.mem-btn{width:28px;height:28px;border:1px solid var(--bd2);border-radius:var(--r);background:transparent;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--t3);transition:all .11s}
.mem-btn:hover{background:var(--bg3);color:var(--t1)}
.mem-btn.danger:hover{background:var(--red-l);color:var(--red);border-color:rgba(239,68,68,.3)}
.mem-btn svg{width:12px;height:12px}
.add-member-card{background:#FAFAFA;border:1px dashed var(--bd2);border-radius:var(--rlg);padding:14px;display:flex;align-items:center;justify-content:center;gap:8px;cursor:pointer;transition:all .14s;color:var(--t3);font-size:13px;font-weight:500}
.add-member-card:hover{border-color:var(--blue);color:var(--blue);background:var(--blue-l)}
.add-member-card svg{width:16px;height:16px}

/* requester list */
.req-item{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid var(--bd);font-size:13px;transition:background .1s}
.req-item:last-child{border:none}
.req-item:hover{background:var(--bg3)}
.req-name{font-weight:500;color:var(--t1)}
.req-team{font-size:11px;color:var(--t3)}

/* ═══ MODAL ═══════════════════════════════════════════ */
.mbg{position:fixed;inset:0;background:rgba(0,0,0,.55);backdrop-filter:blur(4px);z-index:500;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .17s}
.mbg.on{opacity:1;pointer-events:all}
.mbox{background:#FFFFFF;border:1px solid var(--bd2);border-radius:var(--rlg);width:580px;max-width:96vw;max-height:92vh;overflow-y:auto;padding:24px;box-shadow:0 20px 64px rgba(0,0,0,.5);transform:translateY(8px) scale(.99);transition:transform .2s}
.mbg.on .mbox{transform:translateY(0) scale(1)}
.mbox-sm{width:440px}
.mhd{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.mtitle{font-size:16px;font-weight:800;color:var(--t1)}
.mclose{width:28px;height:28px;border-radius:var(--r);border:1px solid var(--bd2);background:transparent;display:flex;align-items:center;justify-content:center;color:var(--t3);transition:all .12s}
.mclose:hover{background:var(--bg3);color:var(--t1)}
.mclose svg{width:12px;height:12px}
.fstack{display:flex;flex-direction:column;gap:12px}
.f2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.f3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.fg{display:flex;flex-direction:column;gap:5px}
.fl{font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--t3)}
.fl-req::after{content:' *';color:var(--red)}
.fi,.fs,.fta{background:#F8FAFC;border:1px solid var(--bd2);border-radius:var(--r);padding:9px 11px;font-size:13px;color:var(--t1);outline:none;transition:border-color .13s;width:100%}
.fi:focus,.fs:focus,.fta:focus{border-color:var(--blue);background:#FFFFFF;box-shadow:0 0 0 3px #DBEAFE}
.fi::placeholder,.fta::placeholder{color:var(--t3)}
.fta{resize:vertical;min-height:70px}
.fs{appearance:none;cursor:pointer}
.fi-ro{background:var(--bg);color:var(--t3)}
.sec-box{background:#F8FAFC;border:1px solid var(--bd);border-radius:var(--rlg);padding:13px}
.sec-box-lbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--t3);margin-bottom:10px}
.mft{margin-top:20px;display:flex;justify-content:space-between;align-items:center}
.mft-r{display:flex;gap:8px}
/* color picker row */
.color-row{display:flex;gap:6px;flex-wrap:wrap}
.color-swatch{width:28px;height:28px;border-radius:6px;cursor:pointer;border:2px solid transparent;transition:all .12s}
.color-swatch.on{border-color:#fff;transform:scale(1.15)}

/* ═══ TOAST ═══════════════════════════════════════════ */
.toast{position:fixed;bottom:18px;right:18px;z-index:600;background:#1E293B;border:1px solid #334155;border-radius:var(--rlg);padding:11px 16px;display:flex;align-items:center;gap:8px;box-shadow:0 8px 32px rgba(0,0,0,.4);font-size:13px;font-weight:500;color:#F8FAFC;transform:translateY(12px);opacity:0;transition:all .2s;pointer-events:none}
.toast.on{opacity:1;transform:translateY(0)}
.toast svg{width:14px;height:14px;flex-shrink:0}
.av{display:flex;align-items:center;justify-content:center;border-radius:50%;font-weight:800;color:#fff;flex-shrink:0}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px;color:var(--t3);font-size:13px;gap:8px}
.empty-state svg{width:40px;height:40px;opacity:.18}
@media(max-width:960px){.tk-list{width:280px}.kpi-grid{grid-template-columns:repeat(3,1fr)}}
@media(max-width:700px){.tk-list{display:none}.sb{width:52px}.sni span,.sni-badge{display:none}.sb-sec,.sb-footer{display:none}}
</style>
</head>
<body>
<!-- HEADER -->
<header class="hdr">
  <div class="logo">
    <div class="logo-mark"><svg viewBox="0 0 16 16" fill="none"><rect x="1" y="1" width="6" height="6" rx="1.5" fill="white"/><rect x="9" y="1" width="6" height="6" rx="1.5" fill="white" opacity=".5"/><rect x="1" y="9" width="6" height="6" rx="1.5" fill="white" opacity=".5"/><rect x="9" y="9" width="6" height="6" rx="1.5" fill="white"/></svg></div>
    <span class="logo-text">OPS<b>biz</b></span>
    <span class="logo-badge">MVP</span>

    <button class="btn-p" onclick="openCreate()"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="8" y1="2" x2="8" y2="14"/><line x1="2" y1="8" x2="14" y2="8"/></svg> 티켓 생성</button>
  </div>
</header>

<div class="app">
<!-- SIDEBAR -->
<nav class="sb">
  <div class="sb-nav">
    <span class="sb-sec">대시보드</span>
    <button class="sni on" onclick="goPane('dash',null,this)"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"><rect x="2" y="2" width="7" height="7" rx="1.5"/><rect x="11" y="2" width="7" height="7" rx="1.5"/><rect x="2" y="11" width="7" height="7" rx="1.5"/><rect x="11" y="11" width="7" height="7" rx="1.5"/></svg><span>Overview</span></button>
    <span class="sb-sec">운영</span>
    <button class="sni" onclick="goPane('tickets',null,this)"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"><rect x="2" y="4" width="16" height="12" rx="2"/><line x1="6" y1="9" x2="14" y2="9"/><line x1="6" y1="12" x2="10" y2="12"/></svg><span>티켓 목록</span><span class="sni-badge" id="sb-open">0</span></button>
    <button class="sni" onclick="goPane('routine',null,this)"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"><circle cx="10" cy="10" r="8"/><polyline points="10,6 10,10 13,12"/></svg><span>루틴 점검</span><span class="sni-badge" id="sb-rt">0</span></button>
    <button class="sni" onclick="filterByType('incident')"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"><path d="M10 2L18 16H2Z"/><line x1="10" y1="9" x2="10" y2="12"/></svg><span>장애</span><span class="sni-badge danger" id="sb-inc" style="display:none">0</span></button>
    <span class="sb-sec">분석</span>
    <button class="sni" onclick="goPane('analytics',null,this)"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"><polyline points="2,15 6,9 10,12 14,6 18,8"/></svg><span>생산성 / 품질</span></button>
    <span class="sb-sec">설정</span>
    <button class="sni" onclick="goPane('admin',null,this)"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"><circle cx="10" cy="7" r="3"/><path d="M4 17c0-3.3 2.7-6 6-6s6 2.7 6 6"/></svg><span>인력 관리</span></button>
  </div>
  <div class="sb-footer">
    <div class="sb-team-pills" id="sb-team-pills"></div>
  </div>
</nav>

<div class="main">
  <div class="topbar">
    <div><span class="topbar-title" id="tb-title">Overview</span><span class="topbar-sub" id="tb-sub"> · 전체 운영 현황</span></div>
    <div class="topbar-right" id="tb-right"></div>
  </div>

  <!-- DASH -->
  <div class="pane on" id="pane-dash"><div class="dash-body" id="dash-body"></div></div>

  <!-- TICKETS -->
  <div class="pane" id="pane-tickets" style="overflow:hidden">
    <div class="tk-layout">
      <div class="tk-list">
        <div class="tk-hd">
          <div class="tk-hd-row"><span class="tk-hd-title">운영 티켓</span><span class="tk-cnt" id="tk-cnt">0</span></div>
          <div class="tk-filters">
            <div class="tk-search"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="6.5" cy="6.5" r="4.5"/><line x1="10" y1="10" x2="14" y2="14"/></svg><input id="tk-q" placeholder="제목·담당자 검색..." oninput="renderList()"></div>
            <div class="chips" id="fchip-type">
              <button class="chip on" onclick="setF('type','all',this)">전체</button>
              <button class="chip" onclick="setF('type','routine',this)">🔄 루틴</button>
              <button class="chip" onclick="setF('type','maint',this)">🛠 유지보수</button>
              <button class="chip" onclick="setF('type','enhance',this)">✨ 수정</button>
              <button class="chip" onclick="setF('type','bug',this)">🐛 버그</button>
              <button class="chip" onclick="setF('type','incident',this)">🚨 장애</button>
            </div>
            <div class="chips" id="fchip-team">
              <button class="chip on" onclick="setF('team','all',this)">전체 팀</button>
              <button class="chip" onclick="setF('team','KR',this)">🇰🇷 KR</button>
              <button class="chip" onclick="setF('team','VN',this)">🇻🇳 VN</button>
            </div>
            <div class="chips" id="fchip-qa">
              <button class="chip on" onclick="setF('qa','all',this)">전체 상태</button>
              <button class="chip" onclick="setF('qa','신규',this)">신규</button>
              <button class="chip" onclick="setF('qa','진행',this)">진행</button>
              <button class="chip" onclick="setF('qa','검수',this)">검수</button>
              <button class="chip" onclick="setF('qa','완료',this)">완료</button>

        <div class="tk-items" id="tk-items"></div>

  <!-- ANALYTICS -->

      <button class="an-tab on" onclick="setAnTab('compare',this)">🇰🇷 vs 🇻🇳 비교</button>

      <button class="an-tab" onclick="setAnTab('productivity',this)">⚡ 생산성</button>
      <button class="an-tab" onclick="setAnTab('members',this)">👥 담당자별</button>

    <div class="an-body" id="an-body"></div>

  <!-- ROUTINE -->
  <div class="pane" id="pane-routine">
    <div class="rt-wrap" id="rt-wrap"></div>
  </div>

  <!-- ADMIN -->
  <div class="pane" id="pane-admin">
    <div class="admin-wrap" id="admin-wrap"></div>
  </div>
</div>
</div>

<!-- TICKET MODAL -->
<div class="mbg" id="m-ticket" onclick="if(event.target.id==='m-ticket')cm('m-ticket')">
<div class="mbox">
  <div class="mhd"><div class="mtitle" id="m-ticket-title">티켓 생성</div><button class="mclose" onclick="cm('m-ticket')"><svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="2" y1="2" x2="12" y2="12"/><line x1="12" y1="2" x2="2" y2="12"/></svg></button></div>
  <div class="fstack">
    <div class="fg"><label class="fl fl-req">제목</label><input class="fi" id="f-title" placeholder="작업 내용을 간략히"></div>
    <div class="f3">
      <div class="fg"><label class="fl">유형</label><select class="fs" id="f-type">
        <option value="routine">🔄 루틴 업무</option>
        <option value="maint">🛠 유지보수</option>
        <option value="enhance" selected>✨ 수정요청</option>
        <option value="bug">🐛 버그 수정</option>
        <option value="incident">🚨 장애 대응</option>
      </select></div>
      <div class="fg"><label class="fl">규모</label><select class="fs" id="f-size">
        <option value="small">Small</option><option value="medium" selected>Medium</option><option value="large">Large</option>
      </select></div>
      <div class="fg"><label class="fl">우선순위</label><select class="fs" id="f-priority">
        <option value="P1">P1 긴급</option><option value="P2" selected>P2 높음</option><option value="P3">P3 중간</option><option value="P4">P4 낮음</option>
      </select></div>
    </div>
    <div class="sec-box">
      <div class="sec-box-lbl">📌 책임 배정</div>
      <div class="f3">
        <div class="fg"><label class="fl fl-req">요청자</label><select class="fs" id="f-requester"></select></div>
        <div class="fg"><label class="fl">처리팀</label><select class="fs" id="f-team" onchange="syncAssignee()">
          <option value="KR">🇰🇷 한국팀</option><option value="VN">🇻🇳 베트남팀</option>
        </select></div>
        <div class="fg"><label class="fl">담당자</label><select class="fs" id="f-assignee"></select></div>
      </div>
    </div>
    <div class="sec-box">
      <div class="sec-box-lbl">⏱ 시간 기록</div>

<script>
// ═══════════════════════════════════════════════════════
// SCHEMA & CONSTANTS
// ═══════════════════════════════════════════════════════
const SCHEMA = "v5";
if(localStorage.getItem("opsbiz_schema") !== SCHEMA){
  ['opsbiz_mvp','opsbiz_rt_mvp','opsbiz_members','opsbiz_requesters','opsbiz_rt_runs'].forEach(k=>localStorage.removeItem(k));
  localStorage.setItem("opsbiz_schema", SCHEMA);
}

const TYPE = {
  routine: {label:"루틴",      cls:"tp-routine",  dot:"#06B6D4", icon:"🔄"},
  maint:   {label:"유지보수",   cls:"tp-maint",    dot:"#3B82F6", icon:"🛠"},
  enhance: {label:"수정요청",   cls:"tp-enhance",  dot:"#8B5CF6", icon:"✨"},
  bug:     {label:"버그",       cls:"tp-bug",       dot:"#F59E0B", icon:"🐛"},
  incident:{label:"장애",       cls:"tp-incident",  dot:"#EF4444", icon:"🚨"},
};
const QA = {"신규":{cls:"qa-open",label:"신규"},"진행":{cls:"qa-progress",label:"진행"},"검수":{cls:"qa-review",label:"검수"},"완료":{cls:"qa-done",label:"완료"},"보류":{cls:"qa-hold",label:"보류"}};
const SLA = {P1:60,P2:240,P3:1440,P4:2880};
const RC  = {REQ:"요청 오류",DEV:"개발 오류",QA:"검수 누락",OPS:"운영 실수",EXT:"외부 요인"};
const COLORS = ["#6366F1","#EC4899","#F97316","#2563EB","#10B981","#06B6D4","#8B5CF6","#F59E0B","#EF4444","#14B8A6","#84CC16","#F43F5E"];

// ═══════════════════════════════════════════════════════
// DATA - Members & Requesters (동적)
// ═══════════════════════════════════════════════════════
function defaultMembers(){
  return[
    {id:"u1",name:"이수진",  role:"기획",   team:"KR",color:"#6366F1"},

    {id:"u4",name:"최성호",  role:"개발",   team:"KR",color:"#2563EB"},
    {id:"u5",name:"Nguyen Van A",role:"핸들링",team:"VN",color:"#10B981"},
    {id:"u6",name:"Tran Thi B",  role:"개발",  team:"VN",color:"#06B6D4"},
    {id:"u7",name:"Le Van C",    role:"개발",  team:"VN",color:"#8B5CF6"},

}
function defaultRequesters(){

    {id:"r1",name:"이수진",dept:"기획팀"},
    {id:"r2",name:"김민지",dept:"디자인팀"},

let members    = JSON.parse(localStorage.getItem("opsbiz_members")||"null") || defaultMembers();
let requesters = JSON.parse(localStorage.getItem("opsbiz_requesters")||"null") || defaultRequesters();

function KR(){ return members.filter(m=>m.team==="KR"); }
function VN(){ return members.filter(m=>m.team==="VN"); }
function ALL(){ return members; }
function memberByName(n){ return members.find(m=>m.name===n); }

// ═══════════════════════════════════════════════════════
// SAMPLE DATA
// ═══════════════════════════════════════════════════════
function genSample(){
  const titles={
    routine:["메인페이지 점검","배너 노출 확인","로그 오류 점검","API 상태 모니터링","DB 백업 확인","디자인 에셋 점검"],
    maint:  ["서버 로그 정리","캐시 초기화","의존성 업데이트","SSL 갱신 확인","DB 인덱스 최적화"],
    enhance:["메인 배너 문구 수정","버튼 컬러 변경","여백 조정","폰트 수정","아이콘 교체","링크 URL 업데이트","팝업 위치 수정","이미지 교체","CTA 개선"],
    bug:    ["로그인 500 에러","결제 버튼 무반응","모바일 이미지 깨짐","API 타임아웃","다크모드 오류"],
    incident:["결제 서비스 장애","로그인 API 중단","CDN 장애","배포 롤백","DB 커넥션 소진"],
  };
  const qaList=["신규","진행","진행","검수","완료","완료","완료"];
  const now=Date.now();
  const data=[];
  let idx=1;
  for(const tp of ["routine","maint","enhance","enhance","bug","incident"]){
    const n=tp==="incident"?4:tp==="routine"?5:7;
    for(let i=0;i<n&&idx<=35;i++){
      const team=Math.random()>.45?"KR":"VN";
      const pool=team==="KR"?KR():VN();
      const assignee=pool[Math.floor(Math.random()*pool.length)]?.name||"";
      const reqList=requesters;
      const requester=reqList[Math.floor(Math.random()*reqList.length)]?.name||"";
      const size=["small","small","medium","medium","large"][Math.floor(Math.random()*5)];
      const qa=tp==="incident"?"진행":qaList[Math.floor(Math.random()*qaList.length)];
      const daysAgo=Math.floor(Math.random()*28);
      const reqAt=new Date(now-daysAgo*86400000-Math.floor(Math.random()*8)*3600000).toISOString().slice(0,16);
      const startAt=new Date(new Date(reqAt).getTime()+(Math.floor(Math.random()*120)+10)*60000).toISOString().slice(0,16);
      const durBase={small:[20,90],medium:[60,300],large:[180,720]}[size];
      const dur=Math.floor(Math.random()*(durBase[1]-durBase[0]))+durBase[0];
      const endAt=qa==="완료"?new Date(new Date(startAt).getTime()+dur*60000).toISOString().slice(0,16):null;
      const dur_min=endAt?Math.round((new Date(endAt)-new Date(startAt))/60000):null;
      const rev=qa==="완료"||qa==="검수"?Math.floor(Math.random()*4):0;
      const result=qa==="완료"?["good","good","good","revise","fail"][Math.floor(Math.random()*5)]:null;
      const priority=tp==="incident"?"P1":["P1","P2","P2","P3","P3","P4"][Math.floor(Math.random()*6)];
      const has_error=Math.random()<.18;
      const root_cause=has_error?["REQ","DEV","QA","OPS","EXT"][Math.floor(Math.random()*5)]:null;
      data.push({
        id:`TK-${String(idx).padStart(3,"0")}`,
        title:titles[tp][Math.floor(Math.random()*titles[tp].length)],
        type:tp,size,priority,requester,team,assignee,
        req_at:reqAt,start_at:startAt,end_at:endAt,dur_min,
        qa,revisions:rev,result,
        has_error,root_cause,
        error_owner:has_error?assignee:null,
        is_incident:tp==="incident",
        severity:tp==="incident"?["P1","P2","P2","P3"][Math.floor(Math.random()*4)]:null,
        sla_met:dur_min?(dur_min<=SLA[priority]):null,
        desc:"",note:"",
        created_at:new Date(reqAt).toISOString(),
      });
      idx++;
    }
  }
  return data;
}

  return{
    weekly:[

      {id:"w4",text:"API 상태 확인",     kr:"최성호", vn:"Tran Thi B"},
      {id:"w5",text:"주간 성과 리포트",  kr:"이수진", vn:"Nguyen Van A"},
      {id:"w6",text:"디자인 에셋 점검",  kr:"박소연", vn:""},
    ],
    monthly:[
      {id:"m1",text:"속도 점검",          kr:"최성호",vn:"Tran Thi B"},

      {id:"m3",text:"보안 점검",          kr:"최성호",vn:"Le Van C"},
      {id:"m4",text:"콘텐츠 정리",        kr:"이수진",vn:""},
      {id:"m5",text:"의존성 업데이트",    kr:"최성호",vn:"Tran Thi B"},
    ],
  };
}

let tickets   = JSON.parse(localStorage.getItem("opsbiz_mvp")||"null") || genSample();
let routines  = JSON.parse(localStorage.getItem("opsbiz_rt_mvp")||"null") || defaultRoutines();
let rt_runs   = JSON.parse(localStorage.getItem("opsbiz_rt_runs")||"null") || [];

// ═══════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════
let selId=null, curPane="dash", anTab="compare";
let filters={type:"all",team:"all",qa:"all"};
let editTicketId=null, editMemberId=null, editRequesterId=null;
let rtFreq="weekly", memTeam="KR", memColor=COLORS[0];
let todayRtDone={weekly:{},monthly:{}};

// ═══════════════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════════════
function ini(n){if(!n)return"?";const p=n.trim().split(/\s+/);return p.length>1?(p[0][0]+p[1][0]).toUpperCase():n.slice(0,2).toUpperCase();}
function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function fmtDt(s){if(!s)return"—";const d=new Date(s);return`${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`;}
function fmtDate(s){if(!s)return"—";const d=new Date(s);return`${d.getMonth()+1}/${d.getDate()}`;}
function durStr(m){if(!m&&m!==0)return"—";if(m<60)return m+"분";const h=Math.floor(m/60),mn=m%60;return mn?`${h}h ${mn}m`:`${h}h`;}
function calcDur(s,e){if(!s||!e)return null;const m=Math.round((new Date(e)-new Date(s))/60000);return m>0?m:null;}
function pct(a,b){return b?Math.round(a/b*100):0;}
function avg(arr){return arr.length?Math.round(arr.reduce((s,v)=>s+v,0)/arr.length):0;}
function today(){return new Date().toISOString().split("T")[0];}
function toast(msg,ok=true){const e=document.getElementById("toast");const s=e.querySelector("svg");s.style.color=ok?"var(--green)":"var(--red)";document.getElementById("toast-msg").textContent=msg;e.classList.add("on");setTimeout(()=>e.classList.remove("on"),2500);}
function cm(id){document.getElementById(id).classList.remove("on");}
document.addEventListener("keydown",e=>{if(e.key==="Escape")["m-ticket","m-member","m-requester","m-routine"].forEach(cm);});

function avHtml(name,team,sz=20,radius="50%"){
  const m=memberByName(name);
  const color=m?m.color:("#"+((name||"x").split("").reduce((h,c)=>(h*31+c.charCodeAt(0))&0xffff,0)%COLORS.length<COLORS.length?COLORS[(name||"x").split("").reduce((h,c)=>(h*31+c.charCodeAt(0))&0xffff,0)%COLORS.length]:"#64748B"));
  const initial=team==="VN"?ini(name):name?name[0]:"?";
  return`<div class="av" style="background:${color};width:${sz}px;height:${sz}px;font-size:${Math.floor(sz*.38)}px;border-radius:${radius}">${initial}</div>`;
}

function goPane(id,navEl,sbEl){
  curPane=id;
  document.querySelectorAll(".pane").forEach(p=>p.classList.remove("on"));
  document.getElementById("pane-"+id).classList.add("on");
  document.querySelectorAll(".hnb").forEach(b=>b.classList.remove("on"));
  document.querySelectorAll(".sni").forEach(b=>b.classList.remove("on"));
  const ni={dash:0,tickets:1,analytics:2,routine:3,admin:4};
  const si={dash:0,tickets:1,routine:2,analytics:4,admin:5};
  document.querySelectorAll(".hnb")[ni[id]]?.classList.add("on");
  document.querySelectorAll(".sni")[si[id]]?.classList.add("on");
  if(navEl)navEl.classList.add("on");
  if(sbEl)sbEl.classList.add("on");
  const m=PANE_META[id];
  if(m){document.getElementById("tb-title").textContent=m.title;document.getElementById("tb-sub").textContent=" · "+m.sub;}
  updateBadges();
  if(id==="dash")renderDash();
  if(id==="tickets"){renderList();document.getElementById("tb-right").innerHTML=`<button class="btn-p" onclick="openCreate()"><svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="8" y1="2" x2="8" y2="14"/><line x1="2" y1="8" x2="14" y2="8"/></svg> 티켓 생성</button>`;}

function updateBadges(){
  const open=tickets.filter(t=>t.qa!=="완료"&&t.qa!=="보류").length;

  const allRt=[...(routines.weekly||[]),...(routines.monthly||[])];

function changeQA(id,qa){
  const t=tickets.find(t=>t.id===id);if(!t)return;
  t.qa=qa;
  if(qa==="완료"&&!t.end_at){t.end_at=new Date().toISOString().slice(0,16);t.dur_min=calcDur(t.start_at,t.end_at);if(t.dur_min)t.sla_met=t.dur_min<=SLA[t.priority||"P3"];}
  if(qa==="진행"&&!t.start_at)t.start_at=new Date().toISOString().slice(0,16);
  save();renderList();renderDetail(id);updateBadges();toast(`QA → ${QA[qa]?.label||qa} ✓`);
}

function deleteTk(id){
  if(!confirm("삭제할까요?"))return;
  tickets=tickets.filter(t=>t.id!==id);selId=null;save();renderList();updateBadges();
  document.getElementById("tk-detail").innerHTML=`<div class="tk-empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"><rect x="2" y="4" width="20" height="16" rx="2"/></svg>삭제됐습니다</div>`;
  toast("삭제됐습니다");
}

  document.getElementById("f-priority").value=t?.priority||"P2";
  document.getElementById("f-requester").value=t?.requester||"";
  document.getElementById("f-team").value=t?.team||"KR";
  syncAssignee();
  document.getElementById("f-assignee").value=t?.assignee||"";
  document.getElementById("f-req-at").value=t?.req_at||new Date().toISOString().slice(0,16);
  document.getElementById("f-start-at").value=t?.start_at||"";
  document.getElementById("f-end-at").value=t?.end_at||"";
  document.getElementById("f-qa").value=t?.qa||"신규";
  document.getElementById("f-rev").value=t?.revisions||0;
  document.getElementById("f-result").value=t?.result||"";
  document.getElementById("f-has-error").value=t?.has_error?"true":"false";
  document.getElementById("f-root-cause").value=t?.root_cause||"";
  document.getElementById("f-error-owner").value=t?.error_owner||"";
  document.getElementById("f-desc").value=t?.desc||"";
  document.getElementById("f-note").value=t?.note||"";
  const incBox=document.getElementById("f-incident-box");
  incBox.style.display=(t?.type||"enhance")==="incident"?"block":"none";
  document.getElementById("f-type").onchange=function(){document.getElementById("f-incident-box").style.display=this.value==="incident"?"block":"none";};
  if(t?.severity)document.getElementById("f-severity").value=t.severity;
  const dur=t?calcDur(t.start_at,t.end_at):null;
  document.getElementById("f-duration").value=dur?durStr(dur):"";
  document.getElementById("m-del-btn").innerHTML=t?`<button class="btn-danger" onclick="deleteTk('${t.id}');cm('m-ticket')">삭제</button>`:"";
  document.getElementById("m-ticket").classList.add("on");
}

document.getElementById("f-start-at").addEventListener("change",()=>{
  const dur=calcDur(document.getElementById("f-start-at").value,document.getElementById("f-end-at").value);
  document.getElementById("f-duration").value=dur?durStr(dur):"";
});
document.getElementById("f-end-at").addEventListener("change",()=>{
  const dur=calcDur(document.getElementById("f-start-at").value,document.getElementById("f-end-at").value);
  document.getElementById("f-duration").value=dur?durStr(dur):"";
});

function saveTicket(){
  const title=document.getElementById("f-title").value.trim();
  if(!title){document.getElementById("f-title").focus();return;}
  const s=document.getElementById("f-start-at").value, e=document.getElementById("f-end-at").value;
  const dur_min=calcDur(s,e);
  const priority=document.getElementById("f-priority").value;
  const type=document.getElementById("f-type").value;
  const data={
    title,type,size:document.getElementById("f-size").value,priority,
    requester:document.getElementById("f-requester").value,
    team:document.getElementById("f-team").value,
    assignee:document.getElementById("f-assignee").value,
    req_at:document.getElementById("f-req-at").value,
    start_at:s||null,end_at:e||null,dur_min,
    qa:document.getElementById("f-qa").value,
    revisions:parseInt(document.getElementById("f-rev").value)||0,
    result:document.getElementById("f-result").value||null,
    has_error:document.getElementById("f-has-error").value==="true",
    root_cause:document.getElementById("f-root-cause").value||null,
    error_owner:document.getElementById("f-error-owner").value||null,
    is_incident:type==="incident",
    severity:type==="incident"?document.getElementById("f-severity").value:null,
    sla_met:dur_min?(dur_min<=SLA[priority]):null,
    desc:document.getElementById("f-desc").value.trim(),
    note:document.getElementById("f-note").value.trim(),
  };
  if(editTicketId){
    const i=tickets.findIndex(t=>t.id===editTicketId);
    if(i>-1)tickets[i]={...tickets[i],...data};
    selId=editTicketId;toast("수정됐습니다 ✓");
  }else{
    const nid=`TK-${String(tickets.length+1).padStart(3,"0")}`;
    tickets.unshift({id:nid,created_at:new Date().toISOString(),...data});
    selId=nid;toast("티켓이 생성됐습니다 ✓");
  }
  save();cm("m-ticket");renderList();updateBadges();if(selId)renderDetail(selId);
}

function renderDash(){
  const t=tickets, done=t.filter(x=>x.qa==="완료"), open=t.filter(x=>x.qa!=="완료"&&x.qa!=="보류");
  const wd=done.filter(x=>x.dur_min>0), ws=done.filter(x=>x.sla_met!==null);
  const rated=t.filter(x=>x.result);

  const kr=ts("KR"),vn=ts("VN");

  // donut

  const qTotal=qSegs.reduce((s,d)=>s+d.v,0)||1;
  const R=30,CI=2*Math.PI*R;let off=0;
  const dPaths=qSegs.map(d=>{const p=d.v/qTotal,seg=CI*p,gap=CI-seg;const e=`<circle cx="40" cy="40" r="${R}" fill="none" stroke="${d.c}" stroke-width="10" stroke-dasharray="${seg.toFixed(2)} ${gap.toFixed(2)}" stroke-dashoffset="${(CI*.25-CI*off).toFixed(2)}" transform="rotate(-90 40 40)"/>`;off+=p;return e;}).join("");

  function cmpRow(metric,kv,vv,unit="",hi=true){const kw=hi?kv>vv:kv<vv,vw=hi?vv>kv:vv<kv;return`<div class="vs-row"><div class="vs-val ${kw?"win-kr":""}">${kv}${unit}</div><div class="vs-metric">${metric}</div><div class="vs-val vs-val-r ${vw?"win-vn":""}">${vv}${unit}</div></div>`;}

  // recent
  const recent=[...tickets].sort((a,b)=>new Date(b.created_at)-new Date(a.created_at)).slice(0,6);

  document.getElementById("dash-body").innerHTML=`
  ${activeInc.length>0?`<div class="inc-banner" onclick="filterByType('incident')">
    <div class="inc-dot"></div>
    <div style="flex:1"><div style="font-size:14px;font-weight:800;color:#991B1B">🚨 장애 ${activeInc.length}건 진행 중 — 즉시 확인</div>
    <div style="font-size:12px;color:#EF4444;margin-top:2px">${activeInc.slice(0,2).map(x=>x.title).join(" · ")}${activeInc.length>2?` 외 ${activeInc.length-2}건`:""}</div></div>
    <div class="inc-count">${activeInc.length}</div>

        delta:{cls:slaRate>=95?"color:var(--green)":"color:var(--red)",txt:slaRate>=95?"✓ 목표 달성":"✗ 목표 미달"}},
      {cls:"purple",lbl:"평균 처리시간", val:durStr(avgDur),  sub:`완료 ${wd.length}건 기준`, link:"goPane('analytics');setAnTab('productivity')",
        ic:`<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="8" cy="8" r="6"/><polyline points="8,5 8,8 10,10"/></svg>`,
        delta:{cls:"color:var(--t3)",txt:`KR ${durStr(kr.avgDur)} · VN ${durStr(vn.avgDur)}`}},

        delta:{cls:goodRate>=85?"color:var(--green)":"color:var(--amber)",txt:goodRate>=85?"▲ 우수":"개선 필요"}},

  <div class="dg21">
    <div class="card">
      <div class="card-hd"><span class="card-title">14일 티켓 현황</span><div class="leg"><div class="leg-item"><div class="leg-dot" style="background:#3B82F6"></div>접수</div><div class="leg-item"><div class="leg-dot" style="background:#10B981"></div>완료</div></div></div>

        </div>
        <div style="display:flex;gap:16px;margin-top:12px;padding-top:12px;border-top:1px solid var(--bd)">
          <div><div style="font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px">오늘 접수</div><div style="font-family:var(--mono);font-size:20px;font-weight:700;color:#3B82F6">${days14[13]?.cr||0}</div></div>
          <div><div style="font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px">오늘 완료</div><div style="font-family:var(--mono);font-size:20px;font-weight:700;color:#10B981">${days14[13]?.dn||0}</div></div>
          <div><div style="font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px">완료율</div><div style="font-family:var(--mono);font-size:20px;font-weight:700;color:${doneRate>=70?"#10B981":"#F59E0B"}">${doneRate}%</div></div>
          <div><div style="font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px">실수율</div><div style="font-family:var(--mono);font-size:20px;font-weight:700;color:${errRate<=5?"#10B981":"#EF4444"}">${errRate}%</div></div>
        </div>
      </div>
    </div>
    <div class="card">
      <div class="card-hd"><span class="card-title">QA 상태 분포</span></div>
      <div class="card-body">
        <div style="display:flex;align-items:center;gap:14px;margin-bottom:12px">
          <div class="ring-wrap"><svg width="80" height="80" viewBox="0 0 80 80">${dPaths}</svg><div class="ring-center"><div class="ring-val" style="font-size:16px">${doneRate}%</div><div class="ring-lbl">완료율</div></div></div>
          <div style="flex:1">${qSegs.map(d=>`<div style="display:flex;align-items:center;justify-content:space-between;font-size:12px;padding:3px 0"><span style="display:flex;align-items:center;gap:5px;color:var(--t2)"><span style="width:7px;height:7px;border-radius:2px;background:${d.c};display:inline-block"></span>${d.l}</span><span style="font-family:var(--mono);font-weight:600;color:var(--t1)">${d.v}</span></div>`).join("")}</div>
        </div>

  </div>

  <div class="dg2">
    <div class="vs-card" onclick="goPane('analytics');setAnTab('compare')" style="cursor:pointer">
      <div class="vs-hd">
        <div class="vs-team"><span style="font-size:18px">🇰🇷</span><div><div class="vs-name" style="color:var(--blue)">한국팀 (KR)</div><div class="vs-sub">기획·디자인·개발</div></div></div>
        <div class="vs-divider">VS</div>

      </div>
      ${cmpRow("총 티켓",kr.total,vn.total,"건")}
      ${cmpRow("완료율",kr.doneRate,vn.doneRate,"%")}
      ${cmpRow("SLA 준수율",kr.slaRate,vn.slaRate,"%")}
      ${cmpRow("평균 처리",durStr(kr.avgDur),durStr(vn.avgDur),"",false)}
      ${cmpRow("실수율",kr.errRate,vn.errRate,"%",false)}
    </div>

    <div class="card">
      <div class="card-hd"><span class="card-title">최근 활동</span><button class="btn-ghost" style="font-size:12px" onclick="goPane('tickets')">전체 →</button></div>
      <div class="card-body">
        ${recent.map(t=>{const tp=TYPE[t.type]||TYPE.enhance;const qm=QA[t.qa]||QA["신규"];return`<div class="mini-tk" onclick="goPane('tickets');selectTk('${t.id}')"><span class="mini-id">${t.id}</span><span class="mini-title">${esc(t.title)}</span><div class="mini-right"><span class="bdg ${qm.cls}" style="font-size:10px">${qm.label}</span><span class="bdg ${tp.cls}" style="font-size:10px">${tp.icon}</span></div></div>`;}).join("")}
      </div>
    </div>
  </div>`;
}

function renderAnalytics(){
  const fns={compare:buildCompare,quality:buildQuality,productivity:buildProductivity,members:buildMembers};
  const el=document.getElementById("an-body");if(!el)return;
  el.innerHTML=(fns[anTab]||buildCompare)();
}

function tStats(team){
  const t=tickets.filter(x=>x.team===team);const d=t.filter(x=>x.qa==="완료");const wd=d.filter(x=>x.dur_min>0);const ws=d.filter(x=>x.sla_met!==null);const rated=d.filter(x=>x.result);
  return{total:t.length,done:d.length,doneRate:pct(d.length,t.length),avgDur:avg(wd.map(x=>x.dur_min)),slaRate:pct(ws.filter(x=>x.sla_met).length,ws.length),errRate:pct(t.filter(x=>x.has_error).length,t.length),avgRev:t.length?Math.round(t.reduce((s,x)=>s+x.revisions,0)/t.length*10)/10:0,goodRate:pct(rated.filter(x=>x.result==="good").length,rated.length),incDone:t.filter(x=>x.is_incident&&x.qa==="완료").length};
}
function grade(s){const sc=s.doneRate*.35+Math.max(0,100-s.avgRev*20)*.35+(s.avgDur>0?Math.max(0,100-s.avgDur/3)*.3:0);return sc>=82?"A":sc>=65?"B":sc>=48?"C":"D";}
function kbox(lbl,val,sub,color,link=""){return`<div class="kbox" onclick="${link}" style="${link?"cursor:pointer":""}"><div class="kbox-bar" style="background:${color}"></div><div class="kbox-lbl">${lbl}</div><div class="kbox-val" style="color:${color}">${val}</div><div class="kbox-sub">${sub}</div></div>`;}

function buildCompare(){
  const kr=tStats("KR"),vn=tStats("VN");
  function cmp(m,kv,vv,u="",hi=true){const kw=hi?kv>vv:kv<vv,vw=hi?vv>kv:vv<kv;return`<div class="vs-row"><div class="vs-val ${kw?"win-kr":""}">${kv}${u}</div><div class="vs-metric">${m}</div><div class="vs-val vs-val-r ${vw?"win-vn":""}">${vv}${u}</div></div>`;}
  const d7=Array.from({length:7},(_,i)=>{const d=new Date(Date.now()-(6-i)*86400000);const ds=d.toISOString().split("T")[0];return{lbl:["일","월","화","수","목","금","토"][d.getDay()],kr:tickets.filter(t=>t.team==="KR"&&t.end_at?.startsWith(ds)).length,vn:tickets.filter(t=>t.team==="VN"&&t.end_at?.startsWith(ds)).length};});
  const maxD=Math.max(...d7.map(d=>Math.max(d.kr,d.vn)),1);
  return`
  <div class="kpi-strip ks4">${kbox("KR 처리 건수",kr.total+"건",`완료 ${kr.done}건`,"#3B82F6","goPane('analytics');setAnTab('compare')")}${kbox("VN 처리 건수",vn.total+"건",`완료 ${vn.done}건`,"#10B981","goPane('analytics');setAnTab('compare')")}${kbox("KR 평균 소요",durStr(kr.avgDur),`SLA ${kr.slaRate}%`,"#3B82F6")}${kbox("VN 평균 소요",durStr(vn.avgDur),`SLA ${vn.slaRate}%`,"#10B981")}</div>
  <div style="margin-bottom:14px"><div class="vs-card">
    <div class="vs-hd"><div class="vs-team"><span style="font-size:18px">🇰🇷</span><div><div class="vs-name" style="color:var(--blue)">한국팀 (KR)</div><div class="vs-sub">기획·디자인·개발</div></div></div><div class="vs-divider">VS</div><div class="vs-team vs-team-r"><span style="font-size:18px">🇻🇳</span><div><div class="vs-name" style="color:var(--green)">베트남팀 (VN)</div><div class="vs-sub">핸들링·개발</div></div></div></div>
    ${cmp("총 담당",kr.total,vn.total,"건")}${cmp("완료율",kr.doneRate,vn.doneRate,"%")}${cmp("SLA 준수율",kr.slaRate,vn.slaRate,"%")}${cmp("평균 소요",durStr(kr.avgDur),durStr(vn.avgDur),"",false)}${cmp("실수율",kr.errRate,vn.errRate,"%",false)}${cmp("평균 수정",kr.avgRev+"회",vn.avgRev+"회","",false)}${cmp("Good율",kr.goodRate,vn.goodRate,"%")}
  </div></div>
  <div class="dg2">
    <div class="card"><div class="card-hd"><span class="card-title">일별 완료 비교</span><span class="card-sub">최근 7일</span></div><div class="card-body"><div class="spark">${d7.map(d=>`<div class="sc"><div class="sc-bars"><div class="sc-b" style="height:${d.kr/maxD*54}px;background:#60A5FA" title="KR:${d.kr}"></div><div class="sc-b" style="height:${d.vn/maxD*54}px;background:rgba(16,185,129,.7)" title="VN:${d.vn}"></div></div><div class="sc-lbl">${d.lbl}</div></div>`).join("")}</div><div class="leg" style="margin-top:8px"><div class="leg-item"><div class="leg-dot" style="background:#3B82F6"></div>KR</div><div class="leg-item"><div class="leg-dot" style="background:#10B981"></div>VN</div></div></div></div>
    <div class="dg2" style="margin:0">
      ${[{key:"KR",flag:"🇰🇷",color:"var(--blue)",bg:"rgba(59,130,246,.08)",s:kr},{key:"VN",flag:"🇻🇳",color:"var(--green)",bg:"rgba(16,185,129,.08)",s:vn}].map(tm=>`<div class="card" style="background:${tm.bg};"><div class="card-hd"><div style="display:flex;align-items:center;gap:6px"><span style="font-size:16px">${tm.flag}</span><div><div style="font-size:13px;font-weight:800;color:${tm.color}">${tm.key}팀</div></div></div><span class="grade gr-${grade(tm.s)}">${grade(tm.s)}</span></div><div class="card-body">${[{l:"완료율",v:tm.s.doneRate+"%"},{l:"SLA",v:tm.s.slaRate+"%"},{l:"평균 소요",v:durStr(tm.s.avgDur)},{l:"실수율",v:tm.s.errRate+"%"},{l:"Good율",v:tm.s.goodRate+"%"}].map(f=>`<div style="display:flex;justify-content:space-between;font-size:12px;padding:5px 0;border-bottom:1px solid var(--bd)"><span style="color:var(--t3)">${f.l}</span><span style="font-weight:600;font-family:var(--mono);color:${tm.color}">${f.v}</span></div>`).join("")}</div></div>`).join("")}
    </div>
  </div>`;
}

function buildQuality(){
  const t=tickets,errors=t.filter(x=>x.has_error);
  const rated=t.filter(x=>x.result);
  const goodRate=pct(rated.filter(x=>x.result==="good").length,rated.length);
  const errRate=pct(errors.length,t.length);
  const avgRev=t.length?Math.round(t.reduce((s,x)=>s+x.revisions,0)/t.length*10)/10:0;
  const rcDist=["REQ","DEV","QA","OPS","EXT"].map(k=>({k,cnt:errors.filter(x=>x.root_cause===k).length})).filter(x=>x.cnt>0).sort((a,b)=>b.cnt-a.cnt);
  const maxRC=Math.max(...rcDist.map(x=>x.cnt),1);
  const revDist=[{l:"0회",n:0,c:"#10B981"},{l:"1회",n:1,c:"#F59E0B"},{l:"2회",n:2,c:"#EF4444"},{l:"3+",n:99,c:"#B91C1C"}];
  const maxRev=Math.max(...revDist.map(d=>d.n===99?t.filter(x=>x.revisions>=3).length:t.filter(x=>x.revisions===d.n).length),1);
  const ownerMap={};errors.forEach(x=>{const n=x.error_owner||x.assignee;if(!n)return;if(!ownerMap[n])ownerMap[n]={name:n,team:x.team,cnt:0};ownerMap[n].cnt++;});
  const owners=Object.values(ownerMap).sort((a,b)=>b.cnt-a.cnt).slice(0,6);
  const maxOwner=Math.max(...owners.map(o=>o.cnt),1);
  return`
  <div class="kpi-strip ks4">${kbox("전체 실수율",errRate+"%",`${errors.length}건 / 전체 ${t.length}건`,"#EF4444")}${kbox("평균 수정횟수",avgRev+"회","작업당 평균",avgRev>2?"#EF4444":avgRev>1?"#F59E0B":"#10B981")}${kbox("Good율",goodRate+"%",`${rated.length}건 평가 기준`,goodRate>=80?"#10B981":"#F59E0B")}${kbox("3회↑ 수정",t.filter(x=>x.revisions>=3).length+"건","품질 위험",t.filter(x=>x.revisions>=3).length>0?"#EF4444":"#10B981")}</div>
  <div class="dg2">
    <div class="card"><div class="card-hd"><span class="card-title">Root Cause 분포</span><span class="card-sub">실수 ${errors.length}건</span></div><div class="card-body">${rcDist.length?rcDist.map(d=>`<div class="hbar-row"><div class="hbar-lbl"><span class="bdg rc-${d.k}">${d.k}</span> <span style="font-size:11px;color:var(--t3)">${RC[d.k]||""}</span></div><div class="hbar-track"><div class="hbar-fill" style="width:${pct(d.cnt,maxRC)}%;background:var(--red)"></div></div><div class="hbar-val">${d.cnt}건</div></div>`).join(""):`<div style="color:var(--t3);font-size:13px;padding:12px 0">실수 없음 ✓</div>`}</div></div>
    <div class="card"><div class="card-hd"><span class="card-title">수정 횟수 분포</span></div><div class="card-body">
      <div class="spark">${revDist.map(d=>{const cnt=d.n===99?t.filter(x=>x.revisions>=3).length:t.filter(x=>x.revisions===d.n).length;return`<div class="sc"><div style="font-size:11px;font-weight:600;color:${d.c};margin-bottom:3px">${cnt}</div><div class="sc-bars"><div class="sc-b" style="height:${cnt/maxRev*54}px;background:${d.c};width:60%"></div></div><div class="sc-lbl">${d.l}</div></div>`;}).join("")}</div>

function buildProductivity(){
  const done=tickets.filter(t=>t.qa==="완료");const wd=done.filter(t=>t.dur_min>0);
  const avgDur=avg(wd.map(t=>t.dur_min));
  const ws=done.filter(t=>t.sla_met!==null);const slaRate=pct(ws.filter(t=>t.sla_met).length,ws.length);
  function tAvg(team){const td=wd.filter(t=>t.team===team);return avg(td.map(t=>t.dur_min));}
  const krAvg=tAvg("KR"),vnAvg=tAvg("VN");
  const dist=[{l:"30분↓",cnt:wd.filter(t=>t.dur_min<=30).length,c:"#10B981"},{l:"1시간",cnt:wd.filter(t=>t.dur_min>30&&t.dur_min<=60).length,c:"#06B6D4"},{l:"2시간",cnt:wd.filter(t=>t.dur_min>60&&t.dur_min<=120).length,c:"#3B82F6"},{l:"4시간",cnt:wd.filter(t=>t.dur_min>120&&t.dur_min<=240).length,c:"#F59E0B"},{l:"4h+",cnt:wd.filter(t=>t.dur_min>240).length,c:"#EF4444"}];
  const maxDist=Math.max(...dist.map(d=>d.cnt),1);
  const typeAvg=Object.keys(TYPE).map(k=>{const td=wd.filter(t=>t.type===k);return{k,label:TYPE[k].label,icon:TYPE[k].icon,avg:avg(td.map(t=>t.dur_min)),cnt:td.length};}).filter(d=>d.cnt>0).sort((a,b)=>b.avg-a.avg);
  const maxTA=Math.max(...typeAvg.map(d=>d.avg),1);
  const weeks=Array.from({length:8},(_,i)=>{const from=new Date(Date.now()-(7-i)*7*86400000);const to=new Date(from.getTime()+7*86400000);return{lbl:i===7?"이번":i===6?"지난":`${7-i}주전`,cnt:done.filter(t=>t.end_at&&new Date(t.end_at)>=from&&new Date(t.end_at)<to).length};});
  const maxW=Math.max(...weeks.map(w=>w.cnt),1);
  return`
  <div class="kpi-strip ks4">${kbox("SLA 준수율",slaRate+"%","목표 95%",slaRate>=95?"#10B981":"#EF4444")}${kbox("전체 평균",durStr(avgDur),`완료 ${wd.length}건`,"#8B5CF6")}${kbox("KR 평균",durStr(krAvg),`${wd.filter(t=>t.team==="KR").length}건`,"#3B82F6")}${kbox("VN 평균",durStr(vnAvg),`${wd.filter(t=>t.team==="VN").length}건`,"#10B981")}</div>
  <div class="dg2">
    <div class="card"><div class="card-hd"><span class="card-title">처리시간 분포</span></div><div class="card-body"><div class="spark">${dist.map(d=>`<div class="sc"><div style="font-size:11px;font-weight:600;color:${d.c};margin-bottom:3px">${d.cnt}</div><div class="sc-bars"><div class="sc-b" style="height:${d.cnt/maxDist*54}px;background:${d.c};width:60%"></div></div><div class="sc-lbl">${d.l}</div></div>`).join("")}</div></div></div>
    <div class="card"><div class="card-hd"><span class="card-title">유형별 평균 소요시간</span></div><div class="card-body">${typeAvg.map(d=>`<div class="hbar-row"><div class="hbar-lbl">${d.icon} ${d.label}</div><div class="hbar-track"><div class="hbar-fill" style="width:${pct(d.avg,maxTA)}%;background:${TYPE[d.k].dot}"></div></div><div class="hbar-val">${durStr(d.avg)}</div></div>`).join("")}</div></div>
  </div>
  <div class="dg2">
    <div class="card"><div class="card-hd"><span class="card-title">주간 완료 추이</span></div><div class="card-body"><div class="spark">${weeks.map(w=>`<div class="sc"><div class="sc-bars"><div class="sc-b" style="height:${w.cnt/maxW*54}px;background:var(--blue-m);width:60%"></div></div><div class="sc-lbl" style="font-size:9px">${w.lbl}</div></div>`).join("")}</div></div></div>
    <div class="card"><div class="card-hd"><span class="card-title">KR vs VN 처리속도</span></div><div class="card-body"><div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">${[{lbl:"KR팀",color:"var(--blue)",bg:"rgba(59,130,246,.08)",avg:krAvg,cnt:wd.filter(t=>t.team==="KR").length},{lbl:"VN팀",color:"var(--green)",bg:"rgba(16,185,129,.08)",avg:vnAvg,cnt:wd.filter(t=>t.team==="VN").length}].map(t=>`<div style="text-align:center;padding:14px;background:${t.bg};border:1px solid var(--bd);border-radius:var(--r)"><div style="font-size:12px;font-weight:700;color:${t.color};margin-bottom:6px">${t.lbl}</div><div style="font-family:var(--mono);font-size:24px;font-weight:700;color:${t.color}">${durStr(t.avg)}</div><div style="font-size:11px;color:var(--t3);margin-top:4px">${t.cnt}건 기준</div></div>`).join("")}</div></div></div>
  </div>`;
}

function buildMembers(){
  const rows=members.map(m=>{const mine=tickets.filter(t=>t.assignee===m.name);const d=mine.filter(t=>t.qa==="완료");const wd=d.filter(t=>t.dur_min>0);const avgDur=avg(wd.map(t=>t.dur_min));const avgRev=mine.length?Math.round(mine.reduce((s,t)=>s+t.revisions,0)/mine.length*10)/10:0;const doneRate=pct(d.length,mine.length);const g=grade({doneRate,avgRev,avgDur});return{...m,total:mine.length,done:d.length,doneRate,avgDur,avgRev,grade:g};}).filter(m=>m.total>0).sort((a,b)=>b.total-a.total);
  const maxT=Math.max(...rows.map(r=>r.total),1);
  return`
  <div class="tbl-wrap" style="margin-bottom:14px"><table><thead><tr><th>담당자</th><th>팀</th><th>역할</th><th>총 작업</th><th>완료</th><th>완료율</th><th>평균 소요</th><th>평균 수정</th><th>등급</th></tr></thead><tbody>
    ${rows.map(r=>`<tr><td><div style="display:flex;align-items:center;gap:8px">${avHtml(r.name,r.team,26,"8px")}<span style="font-size:13px;font-weight:600;color:var(--t1)">${r.name.split(" ")[0]}</span></div></td><td><span class="bdg ${r.team==="KR"?"tm-kr":"tm-vn"}">${r.team}</span></td><td style="color:var(--t3)">${r.role}</td><td><div style="font-weight:600">${r.total}건</div><div style="height:3px;background:var(--bg3);border-radius:99px;overflow:hidden;margin-top:4px;width:60px"><div style="height:100%;background:${r.color};border-radius:99px;width:${pct(r.total,maxT)}%"></div></div></td><td style="font-weight:600;color:var(--green)">${r.done}건</td><td style="font-weight:700;color:${r.doneRate>=80?"var(--green)":r.doneRate>=60?"var(--amber)":"var(--red)"}">${r.doneRate}%</td><td style="font-family:var(--mono);font-weight:600">${durStr(r.avgDur)}</td><td style="font-weight:700;color:${r.avgRev>2?"var(--red)":r.avgRev>1?"var(--amber)":"var(--green)"}">${r.avgRev}회</td><td><span class="grade gr-${r.grade}">${r.grade}</span></td></tr>`).join("")}
    ${rows.length===0?`<tr><td colspan="9" style="text-align:center;padding:32px;color:var(--t3)">데이터 없음</td></tr>`:""}
  </tbody></table></div>`;
}

// ROUTINE - 체크리스트 + 완료/미완료 처리 + 기록 누적

function getRtRun(templateId,date){return rt_runs.find(x=>x.templateId===templateId&&x.date===date);}
function setRtRun(templateId,date,status,note=""){
  const existing=rt_runs.findIndex(x=>x.templateId===templateId&&x.date===date);
  const run={id:`run_${templateId}_${date}`,templateId,date,status,note,at:new Date().toISOString()};
  if(existing>=0)rt_runs[existing]=run;else rt_runs.push(run);
  saveRt();
}

function renderRt(){
  const el=document.getElementById("rt-wrap");if(!el)return;
  const todayKey=today();
  const allItems=[...(routines.weekly||[]),...(routines.monthly||[])];
  const doneToday=allItems.filter(r=>getRtRun(r.id,todayKey)?.status==="done").length;
  const pctVal=allItems.length?Math.round(doneToday/allItems.length*100):0;

  const SECS=[{key:"weekly",label:"주간 점검"},{key:"monthly",label:"월간 점검"}];

  el.innerHTML=`
  <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px;gap:12px">
    <div>
      <div style="font-size:18px;font-weight:800;color:var(--t1)">루틴 점검</div>
      <div style="font-size:13px;color:var(--t3);margin-top:3px">루틴 업무 체크리스트 · 완료 기록이 날짜별로 누적됩니다</div>
      <div style="display:flex;align-items:center;gap:8px;margin-top:8px">
        <div class="rt-prog-bar"><div class="rt-prog-fill" style="width:${pctVal}%"></div></div>
        <span style="font-size:13px;font-weight:600;color:var(--green)">${doneToday} / ${allItems.length} 완료 (${pctVal}%)</span>
      </div>
    </div>
    <div style="display:flex;gap:7px">
      <button class="btn-s" onclick="resetTodayRt()">오늘 초기화</button>
      <button class="btn-p" onclick="openRtModal()"><svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="8" y1="2" x2="8" y2="14"/><line x1="2" y1="8" x2="14" y2="8"/></svg> 항목 추가</button>
    </div>
  </div>

  ${SECS.map(sec=>{
    const items=routines[sec.key]||[];
    const dc=items.filter(r=>getRtRun(r.id,todayKey)?.status==="done").length;
    const allDone=dc===items.length&&items.length>0;
    return`<div class="rt-section">
      <div class="rt-sec-hd">
        <span class="rt-sec-lbl">${sec.label}</span>
        <span class="rt-sec-cnt${allDone?" all":""}">${dc}/${items.length}</span>
        <div class="rt-sec-line"></div>
        <button class="btn-s" style="font-size:11px;padding:4px 10px" onclick="allDoneSection('${sec.key}')">전체 완료</button>
        <button style="display:flex;align-items:center;gap:4px;padding:4px 9px;border:1px solid var(--bd2);border-radius:var(--r);background:transparent;font-size:11px;color:var(--t3);cursor:pointer" onclick="copyRt('${sec.key}')"><svg width="11" height="11" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><rect x="5" y="2" width="9" height="12" rx="1"/><path d="M3 4H2a1 1 0 0 0-1 1v9a1 1 0 0 0 1 1h9a1 1 0 0 0 1-1v-1"/></svg>복사</button>
      </div>
      <div class="rt-list">
        ${items.length?items.map(item=>{
          const run=getRtRun(item.id,todayKey);
          const isDone=run?.status==="done";
          const isSkip=run?.status==="skip";
          const krM=memberByName(item.kr);
          const vnM=memberByName(item.vn);
          return`<div class="rt-item${isDone?" done":""}">
            <div class="rt-chk${isDone?" on":""}" onclick="toggleRtItem('${sec.key}','${item.id}')">
              ${isDone?`<svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="2,6 5,9 10,3"/></svg>`:""}
            </div>
            <div class="rt-item-body">
              <div class="rt-item-text">${esc(item.text)}</div>
              <div class="rt-item-meta">
                ${krM?`${avHtml(krM.name,"KR",14)}<span class="rt-item-who">${krM.name.split(" ")[0]}</span>`:""}
                ${vnM?`${avHtml(vnM.name,"VN",14)}<span class="rt-item-who">${vnM.name.split(" ")[0]}</span>`:""}
              </div>
            </div>
            <div class="rt-item-actions">
              ${isDone
                ? `<button class="rt-done-btn undone" onclick="unDoneRtItem('${sec.key}','${item.id}')">✓ 완료됨 · 취소</button>`
                : `<button class="rt-done-btn" onclick="completeRtItem('${sec.key}','${item.id}')">완료 처리</button>
                   <button class="rt-done-btn undone" onclick="skipRtItem('${sec.key}','${item.id}')" title="건너뛰기" style="${isSkip?'color:var(--amber);border-color:var(--amber)':''}">미완료</button>`
              }
              <button class="rt-del" onclick="delRtItem('${sec.key}','${item.id}')"><svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><line x1="2" y1="2" x2="10" y2="10"/><line x1="10" y1="2" x2="2" y2="10"/></svg></button>
            </div>
          </div>`;
        }).join(""):`<div style="padding:16px;text-align:center;color:var(--t3);font-size:13px">항목 없음</div>`}
      </div>
      ${items.length>0?`<div class="rt-hist">
        <div class="rt-hist-title">최근 완료 기록</div>
        ${(()=>{
          const hist=[];
          for(let i=0;i<7;i++){
            const d=new Date(Date.now()-i*86400000).toISOString().split("T")[0];
            const done=items.filter(r=>getRtRun(r.id,d)?.status==="done").length;
            const skip=items.filter(r=>getRtRun(r.id,d)?.status==="skip").length;
            if(done>0||skip>0)hist.push({date:d,done,skip,total:items.length});
          }
          return hist.length?hist.slice(0,5).map(h=>`<div class="rt-run-item"><span class="rt-run-date">${h.date}</span><span class="rt-run-status${h.done===h.total?" rt-run-done":" rt-run-skip"}">${h.done}/${h.total} 완료${h.skip>0?" · "+h.skip+"건 미완료":""}</span></div>`).join(""):`<div style="color:var(--t3);font-size:12px;padding:6px 0">기록 없음</div>`;
        })()}
      </div>`:""}
    </div>`;
  }).join("")}`;
  updateBadges();
}

function toggleRtItem(sec,id){
  const todayKey=today();
  const run=getRtRun(id,todayKey);
  if(run?.status==="done")setRtRun(id,todayKey,"pending");
  else setRtRun(id,todayKey,"done");
  renderRt();
}
function completeRtItem(sec,id){setRtRun(id,today(),"done");renderRt();toast("완료 처리됐습니다 ✓");}
function unDoneRtItem(sec,id){setRtRun(id,today(),"pending");renderRt();toast("완료 취소됐습니다");}
function skipRtItem(sec,id){setRtRun(id,today(),"skip");renderRt();toast("미완료 처리됐습니다");}
function allDoneSection(sec){const todayKey=today();(routines[sec]||[]).forEach(r=>setRtRun(r.id,todayKey,"done"));renderRt();toast("전체 완료 처리됐습니다 ✓");}
function resetTodayRt(){if(!confirm("오늘 체크를 모두 초기화할까요?"))return;const todayKey=today();rt_runs=rt_runs.filter(x=>x.date!==todayKey);saveRt();renderRt();toast("초기화됐습니다");}
function copyRt(sec){const label={weekly:"주간 점검",monthly:"월간 점검"}[sec];const todayKey=today();const text=label+"\n"+(routines[sec]||[]).map(r=>{const done=getRtRun(r.id,todayKey)?.status==="done";return`${done?"[x]":"[ ]"} ${r.text}`;}).join("\n");navigator.clipboard?.writeText(text).then(()=>toast("복사됐습니다 ✓")).catch(()=>toast("복사 실패",false));}
function delRtItem(sec,id){if(!confirm("삭제할까요?"))return;routines[sec]=(routines[sec]||[]).filter(r=>r.id!==id);saveRt();renderRt();toast("삭제됐습니다");}

let rtModalFreq="weekly";
function setRtFreq(f,el){rtModalFreq=f;document.querySelectorAll(".chip[id^='rtf-']").forEach(b=>b.classList.remove("on"));el.classList.add("on");}
function fillRtSelects(){
  const krSel=document.getElementById("rt-kr");const vnSel=document.getElementById("rt-vn");
  krSel.innerHTML=`<option value="">미지정</option>`+KR().map(m=>`<option value="${m.name}">${m.name}</option>`).join("");
  vnSel.innerHTML=`<option value="">미지정</option>`+VN().map(m=>`<option value="${m.name}">${m.name}</option>`).join("");
}
function openRtModal(){fillRtSelects();document.getElementById("rt-name").value="";rtModalFreq="weekly";document.getElementById("rtf-weekly").classList.add("on");document.getElementById("rtf-monthly").classList.remove("on");document.getElementById("m-routine").classList.add("on");}
function saveRtItem(){
  const text=document.getElementById("rt-name").value.trim();if(!text){document.getElementById("rt-name").focus();return;}
  if(!routines[rtModalFreq])routines[rtModalFreq]=[];
  routines[rtModalFreq].push({id:"rt_"+Date.now(),text,kr:document.getElementById("rt-kr").value,vn:document.getElementById("rt-vn").value});
  saveRt();cm("m-routine");renderRt();toast("추가됐습니다 ✓");
}

function requesterRow(r,i){

  return`<tr>
