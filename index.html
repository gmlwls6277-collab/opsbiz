    <td><span style="font-size:12px;color:var(--t3)">${esc(r.dept||"—")}</span></td>
    <td style="font-family:var(--mono);font-size:12px">${cnt}건</td>
    <td><div style="display:flex;gap:5px">
      <button class="mem-btn" onclick="event.stopPropagation();openEditRequester('${r.id}')"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M11 2l3 3-9 9H2v-3L11 2Z"/></svg></button>
      <button class="mem-btn danger" onclick="event.stopPropagation();deleteRequester('${r.id}')"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><polyline points="3,4 13,4"/><path d="M6,4V3h4v1"/><path d="M5,4l.7,9h4.6L11,4"/></svg></button>
    </div></td>
  </tr>`;
}

    `<div class="add-member-card" onclick="openAddMember('KR')"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><line x1="8" y1="2" x2="8" y2="14"/><line x1="2" y1="8" x2="14" y2="8"/></svg>한국팀 담당자 추가</div>`;

  const vnCards = vnM.map(m=>memberCard(m)).join("") +
    `<div class="add-member-card" onclick="openAddMember('VN')"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><line x1="8" y1="2" x2="8" y2="14"/><line x1="2" y1="8" x2="14" y2="8"/></svg>베트남팀 담당자 추가</div>`;

  const reqRows = requesters.map((r,i)=>requesterRow(r,i)).join("") ||
    `<tr><td colspan="5" style="text-align:center;padding:32px;color:var(--t3)">등록된 요청자 없음</td></tr>`;

  el.innerHTML=`
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
    <div>
      <div style="font-size:18px;font-weight:800;color:var(--t1)">인력 관리</div>
      <div style="font-size:13px;color:var(--t3);margin-top:3px">담당자 및 요청자 등록 · 수정 · 삭제</div>
    </div>
  </div>

  <div style="font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--t3);margin-bottom:10px;display:flex;align-items:center;gap:8px">
    🇰🇷 한국팀 (KR) <span class="bdg tm-kr">${krM.length}명</span>
    <div style="flex:1;height:1px;background:var(--bd)"></div>
    <button class="btn-p" style="font-size:12px;padding:5px 12px" onclick="openAddMember('KR')">+ 담당자 추가</button>
  </div>
  <div class="admin-grid" style="margin-bottom:20px">${krCards}</div>

  <div style="font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--t3);margin-bottom:10px;display:flex;align-items:center;gap:8px">
    🇻🇳 베트남팀 (VN) <span class="bdg tm-vn">${vnM.length}명</span>
    <div style="flex:1;height:1px;background:var(--bd)"></div>
    <button class="btn-p" style="font-size:12px;padding:5px 12px" onclick="openAddMember('VN')">+ 담당자 추가</button>
  </div>
  <div class="admin-grid" style="margin-bottom:24px">${vnCards}</div>

  <div style="font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--t3);margin-bottom:10px;display:flex;align-items:center;gap:8px">
    📋 요청자 목록 <span class="bdg" style="background:var(--bg3);color:var(--t2)">${requesters.length}명</span>
    <div style="flex:1;height:1px;background:var(--bd)"></div>
    <button class="btn-p" style="font-size:12px;padding:5px 12px" onclick="openAddRequester()">+ 요청자 추가</button>
  </div>
  <div class="tbl-wrap">
    <table>
      <thead><tr><th>#</th><th>요청자명</th><th>소속</th><th>티켓 수</th><th>관리</th></tr></thead>

// Member CRUD
function buildColorPicker(selected){
  return COLORS.map((c,i)=>`<div class="color-swatch${c===selected?" on":""}" style="background:${c}" onclick="selectColor('${c}',this)"></div>`).join("");
}
function selectColor(c,el){memColor=c;document.querySelectorAll(".color-swatch").forEach(s=>s.classList.remove("on"));el.classList.add("on");}

function openAddMember(team="KR"){
  editMemberId=null;memTeam=team;memColor=COLORS[0];
  document.getElementById("m-member-title").textContent="담당자 추가";
  document.getElementById("mem-name").value="";
  document.getElementById("mem-role").value="";
  document.getElementById("mem-role").value="";
  document.getElementById("mem-colors").innerHTML=buildColorPicker(memColor);
  document.getElementById("mem-team-kr").classList.toggle("on",team==="KR");
  document.getElementById("mem-team-vn").classList.toggle("on",team==="VN");
  document.getElementById("m-mem-del").innerHTML="";
  document.getElementById("m-member").classList.add("on");
}
function openEditMember(id){
  const m=members.find(m=>m.id===id);if(!m)return;
  editMemberId=id;memTeam=m.team;memColor=m.color||COLORS[0];
  document.getElementById("m-member-title").textContent="담당자 수정";
  document.getElementById("mem-name").value=m.name;
  document.getElementById("mem-role").value=m.role;
  document.getElementById("mem-colors").innerHTML=buildColorPicker(memColor);
  document.getElementById("mem-team-kr").classList.toggle("on",m.team==="KR");
  document.getElementById("mem-team-vn").classList.toggle("on",m.team==="VN");
  document.getElementById("m-mem-del").innerHTML=`<button class="btn-danger" onclick="event.stopPropagation();cm('m-member');deleteMember('${id}')">삭제</button>`;
  document.getElementById("m-member").classList.add("on");
}
function setMemTeam(team,el){memTeam=team;document.getElementById("mem-team-kr").classList.toggle("on",team==="KR");document.getElementById("mem-team-vn").classList.toggle("on",team==="VN");}
function saveMember(){
  const name=document.getElementById("mem-name").value.trim();
  const role=document.getElementById("mem-role").value;
  if(!name){toast("이름을 입력하세요",false);return;}
  if(!role){toast("역할을 선택하세요",false);return;}
  if(editMemberId){
    const i=members.findIndex(m=>m.id===editMemberId);
    if(i>-1)members[i]={...members[i],name,role,team:memTeam,color:memColor};
    toast("수정됐습니다 ✓");
  }else{
    members.push({id:"m_"+Date.now(),name,role,team:memTeam,color:memColor});
    toast("담당자가 추가됐습니다 ✓");
  }
  saveMembers();cm("m-member");renderAdmin();updateBadges();
}
function deleteMember(id){
  const m=members.find(x=>x.id===id);
  if(!m)return;
  // confirm 대신 인라인 확인 UI 사용 (iframe 환경 호환)
  showConfirm(`"${m.name}" 담당자를 삭제할까요?`, ()=>{
    members=members.filter(x=>x.id!==id);
    saveMembers();renderAdmin();updateBadges();toast("삭제됐습니다");
  });
}

// Requester CRUD
function openAddRequester(){
  editRequesterId=null;
  document.getElementById("m-req-title").textContent="요청자 추가";
  document.getElementById("req-name").value="";document.getElementById("req-dept").value="";
  document.getElementById("m-req-del").innerHTML="";
  document.getElementById("m-requester").classList.add("on");
}
function openEditRequester(id){
  const r=requesters.find(r=>r.id===id);if(!r)return;
  editRequesterId=id;
  document.getElementById("m-req-title").textContent="요청자 수정";
  document.getElementById("req-name").value=r.name;document.getElementById("req-dept").value=r.dept||"";
  document.getElementById("m-req-del").innerHTML=`<button class="btn-danger" onclick="event.stopPropagation();cm('m-requester');deleteRequester('${id}')">삭제</button>`;
  document.getElementById("m-requester").classList.add("on");
}
function saveRequester(){
  const name=document.getElementById("req-name").value.trim();if(!name){document.getElementById("req-name").focus();return;}
  const dept=document.getElementById("req-dept").value.trim();
  if(editRequesterId){const i=requesters.findIndex(r=>r.id===editRequesterId);if(i>-1)requesters[i]={...requesters[i],name,dept};toast("수정됐습니다 ✓");}
  else{requesters.push({id:"r_"+Date.now(),name,dept});toast("요청자가 추가됐습니다 ✓");}
  saveRequesters();cm("m-requester");renderAdmin();
}
function deleteRequester(id){
  const r=requesters.find(x=>x.id===id);
  if(!r)return;
  showConfirm(`"${r.name}" 요청자를 삭제할까요?`, ()=>{
    requesters=requesters.filter(x=>x.id!==id);
    saveRequesters();renderAdmin();toast("삭제됐습니다");
  });
}

// CONFIRM DIALOG (confirm() 대신 사용 - iframe 환경 호환)
// ═══════════════════════════════════════════════════════
function showConfirm(msg, onOk){
  document.getElementById("confirm-msg").textContent = msg;
  document.getElementById("confirm-dialog").style.display = "flex";
  document.getElementById("confirm-ok-btn").onclick = function(e){
    e.stopPropagation();
    closeConfirmDialog();
    onOk();
  };
}
function closeConfirmDialog(){
  document.getElementById("confirm-dialog").style.display = "none";
}
