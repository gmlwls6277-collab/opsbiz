<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>OPSbiz</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet">
<style>
/* ── DESIGN TOKENS ────────────────────────────────── */
:root {
  --font: 'Pretendard', -apple-system, 'Apple SD Gothic Neo', sans-serif;
  --mono: 'Pretendard', monospace;

  --white:    #fff;
  --bg:       #F4F6FA;
  --sb1-bg:   #1B2538;

  --gray-50:  #F9FAFB;
  --gray-100: #F3F4F6;
  --gray-200: #E5E7EB;
  --gray-300: #D1D5DB;
  --gray-400: #9CA3AF;
  --gray-500: #6B7280;
  --gray-600: #4B5563;
  --gray-700: #374151;
  --gray-800: #1F2937;
  --gray-900: #111827;

  --blue:      #2563EB;
  --blue-50:   #EFF6FF;
  --blue-100:  #DBEAFE;
  --blue-600:  #2563EB;
  --blue-700:  #1D4ED8;

  --mint:      #0D9488;
  --mint-50:   #F0FDFA;
  --mint-100:  #CCFBF1;

  --red:       #DC2626;
  --red-50:    #FEF2F2;
  --red-100:   #FEE2E2;

  --amber:     #D97706;
  --amber-50:  #FFFBEB;
  --amber-100: #FEF3C7;

  --green:     #16A34A;
  --green-50:  #F0FDF4;
  --green-100: #DCFCE7;

  --purple:    #7C3AED;
  --purple-50: #F5F3FF;

  --r-sm: 5px;
  --r:    8px;
  --r-lg: 12px;
  --r-xl: 16px;

  --shadow-sm: 0 1px 2px rgba(0,0,0,.05);
  --shadow:    0 1px 3px rgba(0,0,0,.07), 0 4px 12px rgba(0,0,0,.04);
  --shadow-lg: 0 4px 24px rgba(0,0,0,.09), 0 1px 4px rgba(0,0,0,.04);
}

/* ── RESET ────────────────────────────────────────── */
*,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 14px; }
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--gray-800);
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
}
button, input, select, textarea { font-family: var(--font); font-size: 13px; }
button { cursor: pointer; border: none; background: none; }
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--gray-200); border-radius: 99px; }

/* ── APP SHELL ────────────────────────────────────── */
.app { display: flex; height: 100vh; overflow: hidden; }

/* ── ICON SIDEBAR ─────────────────────────────────── */
.sb1 {
  width: 52px; flex-shrink: 0;
  background: var(--sb1-bg);
  display: flex; flex-direction: column; align-items: center;
  padding: 14px 0; gap: 3px; z-index: 30;
}
.sb1-logo {
  width: 30px; height: 30px; background: var(--blue);
  border-radius: var(--r); display: flex; align-items: center; justify-content: center;
  margin-bottom: 14px;
}
.sb1-logo svg { width: 14px; height: 14px; }
.sb1-btn {
  width: 34px; height: 34px; border-radius: var(--r);
  display: flex; align-items: center; justify-content: center;
  color: rgba(255,255,255,.4); transition: all .15s; position: relative;
}
.sb1-btn svg { width: 16px; height: 16px; }
.sb1-btn:hover { background: rgba(255,255,255,.09); color: rgba(255,255,255,.85); }
.sb1-btn.on { background: var(--blue); color: #fff; }
.sb1-btn .dot {
  position: absolute; top: 5px; right: 5px;
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--red); border: 1.5px solid var(--sb1-bg);
}
.sb1-sep { width: 22px; height: 1px; background: rgba(255,255,255,.1); margin: 5px 0; }
.sb1-bottom { margin-top: auto; display: flex; flex-direction: column; align-items: center; gap: 3px; }

/* ── TEXT SIDEBAR ─────────────────────────────────── */
.sb2 {
  width: 192px; flex-shrink: 0;
  background: var(--white); border-right: 1px solid var(--gray-200);
  display: flex; flex-direction: column; overflow: hidden;
}
.sb2-head {
  padding: 13px 14px 10px;
  border-bottom: 1px solid var(--gray-100);
  font-size: 11px; font-weight: 700; letter-spacing: .07em;
  text-transform: uppercase; color: var(--gray-400);
}
.sb2-nav { flex: 1; overflow-y: auto; padding: 7px; }
.sn {
  display: flex; align-items: center; gap: 8px;
  height: 34px; padding: 0 9px; border-radius: var(--r);
  font-size: 13px; font-weight: 400; color: var(--gray-600);
  width: 100%; text-align: left; transition: all .12s;
}
.sn svg { width: 14px; height: 14px; flex-shrink: 0; color: var(--gray-400); }
.sn:hover { background: var(--gray-50); color: var(--gray-900); }
.sn:hover svg { color: var(--gray-600); }
.sn.on { background: var(--blue-50); color: var(--blue); font-weight: 500; }
.sn.on svg { color: var(--blue); }
.sn-sec { font-size: 10px; font-weight: 700; letter-spacing: .07em; text-transform: uppercase; color: var(--gray-300); padding: 8px 9px 3px; margin-top: 4px; }
.nb {
  margin-left: auto; font-size: 11px; font-weight: 600;
  min-width: 18px; height: 18px; padding: 0 5px;
  border-radius: 99px; background: var(--gray-100); color: var(--gray-500);
  display: flex; align-items: center; justify-content: center;
}
.sn.on .nb { background: var(--blue-100); color: var(--blue); }
.nb-red { background: var(--red-100) !important; color: var(--red) !important; }
.sb2-footer { padding: 10px 12px; border-top: 1px solid var(--gray-100); }
.team-pips { display: flex; flex-wrap: wrap; gap: 4px; }
.tp { display: flex; align-items: center; gap: 3px; padding: 2px 6px 2px 3px; background: var(--gray-50); border: 1px solid var(--gray-200); border-radius: 99px; font-size: 11px; color: var(--gray-600); }
.tp-av { width: 14px; height: 14px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 6px; font-weight: 700; color: #fff; }

/* ── MAIN ─────────────────────────────────────────── */
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }

/* ── TOPBAR ───────────────────────────────────────── */
.topbar {
  height: 50px; background: var(--white);
  border-bottom: 1px solid var(--gray-200);
  display: flex; align-items: center; padding: 0 20px; gap: 10px;
  flex-shrink: 0; box-shadow: var(--shadow-sm);
}
.tb-title { font-size: 14px; font-weight: 600; color: var(--gray-900); }
.tb-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }
.btn-p {
  display: flex; align-items: center; gap: 5px;
  height: 32px; padding: 0 14px;
  background: var(--blue); color: #fff;
  border-radius: var(--r); font-size: 12px; font-weight: 500;
  transition: background .14s, transform .1s;
}
.btn-p:hover { background: var(--blue-700); }
.btn-p:active { transform: scale(.98); }
.btn-p svg { width: 12px; height: 12px; }
.btn-s {
  display: flex; align-items: center; gap: 5px;
  height: 32px; padding: 0 12px;
  background: var(--white); color: var(--gray-600);
  border: 1px solid var(--gray-200); border-radius: var(--r);
  font-size: 12px; transition: all .13s;
}
.btn-s:hover { border-color: var(--gray-300); color: var(--gray-900); background: var(--gray-50); }
.btn-s svg { width: 12px; height: 12px; }
.tb-search { position: relative; }
.tb-search svg { position: absolute; left: 9px; top: 50%; transform: translateY(-50%); width: 13px; height: 13px; color: var(--gray-400); pointer-events: none; }
.tb-search input {
  height: 32px; width: 200px;
  background: var(--gray-50); border: 1px solid var(--gray-200);
  border-radius: var(--r); padding: 0 10px 0 28px;
  font-size: 12px; color: var(--gray-800); outline: none; transition: border-color .14s;
}
.tb-search input:focus { border-color: var(--blue); background: #fff; box-shadow: 0 0 0 3px var(--blue-50); }
.tb-search input::placeholder { color: var(--gray-400); }

/* ── PANES ────────────────────────────────────────── */
.pane { display: none; flex: 1; flex-direction: column; overflow: hidden; min-height: 0; }
.pane.on { display: flex; animation: fadeUp .17s ease; }
@keyframes fadeUp { from { opacity:0; transform:translateY(5px); } to { opacity:1; transform:translateY(0); } }
.scroll { flex: 1; overflow-y: auto; padding: 20px; }

/* ── INCIDENT BANNER ─────────────────────────────── */
.inc-banner {
  display: flex; align-items: center; gap: 12px;
  padding: 7px 16px; margin-bottom: 14px;
  background: var(--red-50); border: 1px solid #FECACA;
  border-radius: var(--r-lg); cursor: pointer;
  transition: background .15s, box-shadow .15s;
  text-decoration: none;
}
.inc-banner:hover { background: #FEE2E2; box-shadow: 0 2px 8px rgba(220,38,38,.15); }
.inc-pulse { width: 7px; height: 7px; border-radius: 50%; background: var(--red); flex-shrink: 0; animation: pulse 1.6s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(.85)} }
.inc-text { flex: 1; font-size: 12px; font-weight: 600; color: #991B1B; }
.inc-sub { font-size: 11px; color: #B91C1C; font-weight: 400; margin-left: 6px; }
.inc-count { font-size: 13px; font-weight: 700; color: var(--red); flex-shrink: 0; }
.inc-arrow { font-size: 11px; color: var(--red); opacity: .6; flex-shrink: 0; }

/* ── KPI STRIP ────────────────────────────────────── */
.kpi-strip {
  display: grid; grid-template-columns: repeat(4,1fr);
  gap: 0; margin-bottom: 16px;
  background: var(--white); border: 1px solid var(--gray-200);
  border-radius: var(--r-xl); box-shadow: var(--shadow-sm); overflow: hidden;
}
.kpi-cell {
  padding: 16px 20px; border-right: 1px solid var(--gray-200);
  cursor: pointer; transition: background .12s;
}
.kpi-cell:last-child { border-right: none; }
.kpi-cell:hover { background: var(--gray-50); }
.kpi-lbl { font-size: 11px; font-weight: 500; color: var(--gray-500); letter-spacing: .02em; margin-bottom: 7px; }
.kpi-val { font-size: 26px; font-weight: 700; line-height: 1; margin-bottom: 5px; color: var(--gray-900); letter-spacing: -.02em; }
.kpi-val.c-blue  { color: var(--blue); }
.kpi-val.c-mint  { color: var(--mint); }
.kpi-val.c-red   { color: var(--red); }
.kpi-val.c-amber { color: var(--amber); }
.kpi-sub { font-size: 11px; color: var(--gray-400); }
.kpi-sub.up   { color: var(--mint); font-weight: 500; }
.kpi-sub.warn { color: var(--red); font-weight: 600; }

/* ── DASHBOARD GRID ───────────────────────────────── */
/* ≥1280: 3-col, 768-1279: 2-col, ≤767: 1-col */
.dash-grid-top {
  display: grid;
  grid-template-columns: 2fr 1fr;
  gap: 14px; margin-bottom: 14px;
}
.dash-grid-bot {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px; margin-bottom: 14px;
}
.dash-grid-perf {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 14px; margin-bottom: 14px;
}

/* ── CARD ─────────────────────────────────────────── */
.card { background: var(--white); border: 1px solid var(--gray-200); border-radius: var(--r-xl); box-shadow: var(--shadow-sm); }
.card-hd { display: flex; align-items: center; justify-content: space-between; padding: 13px 18px; border-bottom: 1px solid var(--gray-100); gap: 8px; }
.card-title { font-size: 13px; font-weight: 600; color: var(--gray-800); }
.card-sub { font-size: 11px; color: var(--gray-400); }
.card-link { font-size: 12px; color: var(--blue); font-weight: 500; padding: 0; }
.card-body { padding: 16px 18px; }

/* ── SYSTEM FILTER TABS ───────────────────────────── */
.sys-tabs { display: flex; gap: 5px; flex-wrap: wrap; }
.sys-tab {
  height: 26px; padding: 0 11px;
  border-radius: 99px; font-size: 11px; font-weight: 500;
  border: 1px solid var(--gray-200); background: transparent;
  color: var(--gray-500); cursor: pointer; transition: all .12s;
}
.sys-tab:hover { border-color: var(--gray-300); color: var(--gray-700); background: var(--gray-50); }
.sys-tab.on { background: var(--blue-50); border-color: var(--blue-100); color: var(--blue); font-weight: 600; }

/* ── LINE CHART ───────────────────────────────────── */
.chart-wrap { position: relative; height: 180px; }
.chart-wrap svg { width: 100%; height: 100%; }
.chart-x-labels { display: flex; justify-content: space-between; margin-top: 4px; }
.chart-x-labels span { font-size: 10px; color: var(--gray-400); }
.chart-legend { display: flex; gap: 12px; margin-bottom: 8px; }
.chart-legend-item { display: flex; align-items: center; gap: 4px; font-size: 11px; color: var(--gray-500); }
.chart-legend-dot { width: 10px; height: 2px; border-radius: 1px; }
.chart-stats { display: flex; gap: 14px; padding-top: 10px; margin-top: 10px; border-top: 1px solid var(--gray-100); }
.chart-stat-item { display: flex; flex-direction: column; gap: 3px; }
.chart-stat-lbl { font-size: 10px; font-weight: 500; text-transform: uppercase; letter-spacing: .04em; color: var(--gray-400); }
.chart-stat-val { font-size: 18px; font-weight: 700; }

/* ── PRIORITY LIST ────────────────────────────────── */
.prio-item {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 14px; border-bottom: 1px solid var(--gray-100);
  cursor: pointer; transition: background .1s;
}
.prio-item:last-child { border: none; }
.prio-item:hover { background: var(--gray-50); }
.prio-num { font-size: 11px; font-weight: 600; color: var(--gray-400); width: 14px; flex-shrink: 0; }
.prio-av { width: 32px; height: 32px; border-radius: var(--r); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: #fff; flex-shrink: 0; }
.prio-body { flex: 1; min-width: 0; }
.prio-title { font-size: 12px; font-weight: 500; color: var(--gray-800); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.prio-meta { font-size: 11px; color: var(--gray-400); margin-top: 1px; }
.dday { font-size: 11px; font-weight: 700; flex-shrink: 0; }
.dday-urgent { color: var(--red); }
.dday-warn   { color: var(--amber); }
.dday-ok     { color: var(--gray-400); }
.dday-over   { color: var(--red); background: var(--red-50); padding: 1px 6px; border-radius: 99px; }

/* ── PROGRESS TABLE ───────────────────────────────── */
.prog-table { width: 100%; border-collapse: collapse; table-layout: fixed; }
.prog-table colgroup col:nth-child(1) { width: 34%; }
.prog-table colgroup col:nth-child(2) { width: 18%; }
.prog-table colgroup col:nth-child(3) { width: 30%; }
.prog-table colgroup col:nth-child(4) { width: 18%; }
.prog-table th {
  font-size: 10px; font-weight: 600; letter-spacing: .05em; text-transform: uppercase;
  color: var(--gray-400); padding: 9px 12px; text-align: left;
  border-bottom: 1px solid var(--gray-200); background: var(--gray-50);
  white-space: nowrap; overflow: hidden;
}
.prog-table td {
  padding: 0 12px; font-size: 12px; color: var(--gray-600);
  border-bottom: 1px solid var(--gray-100);
  vertical-align: middle; height: 52px;
  overflow: hidden;
}
.prog-table tbody tr:last-child td { border: none; }
.prog-table tbody tr:hover { background: var(--gray-50); cursor: pointer; }
.prog-bar { width: 100%; height: 5px; background: var(--gray-100); border-radius: 99px; overflow: hidden; min-width: 50px; max-width: 100px; }
.prog-fill { height: 100%; border-radius: 99px; transition: width .5s ease; }
.prog-cell-inner { display: flex; align-items: center; gap: 6px; height: 52px; }
.prog-name-cell { display: flex; align-items: center; gap: 7px; height: 52px; min-width: 0; }
.prog-name-text { min-width: 0; overflow: hidden; }
.prog-name-main { font-weight: 500; color: var(--gray-800); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-size: 12px; }
.prog-name-sub { font-size: 10px; color: var(--gray-400); white-space: nowrap; }
.prog-task-cell { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.td-s { font-weight: 500; color: var(--gray-800); }
.td-d { color: var(--gray-400); font-size: 11px; }
.deadline { font-size: 11px; font-weight: 500; }
.dl-over { color: var(--red); font-weight: 700; }
.dl-warn { color: var(--amber); }
.dl-ok   { color: var(--gray-500); }

/* ── VS COMPARE (3fr/7fr) ─────────────────────────── */
.vs-wrap { display: grid; grid-template-columns: 3fr 7fr; gap: 0; }
.vs-table { border-right: 1px solid var(--gray-100); }
.vs-table-head {
  display: grid; grid-template-columns: 1fr 56px 1fr;
  background: var(--gray-50); border-bottom: 1px solid var(--gray-200);
}
.vs-team { padding: 10px 12px; display: flex; flex-direction: column; align-items: center; text-align: center; }
.vs-team-name { font-size: 12px; font-weight: 700; margin-top: 3px; }
.vs-team-sub  { font-size: 10px; color: var(--gray-400); }
.vs-mid { display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: var(--gray-400); border-left: 1px solid var(--gray-200); border-right: 1px solid var(--gray-200); }
.vs-row { display: grid; grid-template-columns: 1fr 56px 1fr; border-bottom: 1px solid var(--gray-100); }
.vs-row:last-child { border: none; }
.vs-val { padding: 9px 12px; font-size: 12px; font-weight: 600; color: var(--gray-800); display: flex; align-items: center; justify-content: center; }
.vs-metric { padding: 9px 4px; text-align: center; font-size: 10px; color: var(--gray-400); background: var(--gray-50); border-left: 1px solid var(--gray-100); border-right: 1px solid var(--gray-100); display: flex; align-items: center; justify-content: center; line-height: 1.3; }
.win-kr { color: var(--blue); font-weight: 700; }
.win-vn { color: var(--mint); font-weight: 700; }
/* trend chart in vs */
.vs-chart { padding: 14px 18px; }
.vs-chart-title { font-size: 11px; font-weight: 600; color: var(--gray-600); margin-bottom: 10px; }
.vs-spark { display: flex; align-items: flex-end; gap: 5px; height: 80px; }
.vs-spark-group { display: flex; gap: 2px; align-items: flex-end; flex: 1; }
.vs-spark-bar { border-radius: 3px 3px 0 0; min-width: 8px; flex: 1; transition: height .4s ease; }
.vs-spark-lbl { font-size: 10px; color: var(--gray-400); text-align: center; margin-top: 4px; }
.vs-spark-col { display: flex; flex-direction: column; align-items: center; flex: 1; }

/* ── BADGES ───────────────────────────────────────── */
.bdg { display: inline-flex; align-items: center; gap: 3px; font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 99px; white-space: nowrap; }
.qa-open     { background: var(--blue-50);   color: var(--blue); }
.qa-progress { background: var(--blue-50);   color: var(--blue); }
.qa-review   { background: var(--amber-50);  color: var(--amber); }
.qa-done     { background: var(--green-50);  color: var(--green); }
.qa-hold     { background: var(--gray-100);  color: var(--gray-500); }
.tp-routine  { background: var(--mint-50);   color: var(--mint); }
.tp-maint    { background: var(--blue-50);   color: var(--blue); }
.tp-enhance  { background: var(--purple-50); color: var(--purple); }
.tp-bug      { background: var(--amber-50);  color: var(--amber); }
.tp-incident { background: var(--red-50);    color: var(--red); font-weight: 700; }
.tm-kr { background: var(--blue-50);  color: var(--blue); }
.tm-vn { background: var(--mint-50);  color: var(--mint); }
.rc-REQ { background: var(--amber-50);  color: var(--amber); }
.rc-DEV { background: var(--red-50);    color: var(--red); }
.rc-QA  { background: var(--purple-50); color: var(--purple); }
.rc-OPS { background: var(--mint-50);   color: var(--mint); }
.rc-EXT { background: var(--gray-100);  color: var(--gray-500); }

/* ── TICKET LIST ──────────────────────────────────── */
.tk-layout { display: grid; grid-template-columns: 30% 70%; flex: 1; overflow: hidden; min-height: 0; }
.tk-list { border-right: 1px solid var(--gray-200); display: flex; flex-direction: column; background: var(--white); overflow: hidden; }
.tk-hd { padding: 12px 12px 9px; border-bottom: 1px solid var(--gray-100); flex-shrink: 0; }
.tk-hd-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 9px; }
.tk-hd-title { font-size: 13px; font-weight: 600; color: var(--gray-900); }
.tk-cnt { font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 99px; background: var(--blue-50); color: var(--blue); }
.tk-search { position: relative; margin-bottom: 7px; }
.tk-search svg { position: absolute; left: 8px; top: 50%; transform: translateY(-50%); width: 12px; height: 12px; color: var(--gray-400); pointer-events: none; }
.tk-search input { width: 100%; height: 30px; background: var(--gray-50); border: 1px solid var(--gray-200); border-radius: var(--r-sm); padding: 0 8px 0 26px; font-size: 12px; color: var(--gray-800); outline: none; transition: border-color .12s; }
.tk-search input:focus { border-color: var(--blue); background: #fff; }
.tk-search input::placeholder { color: var(--gray-400); }
.chips { display: flex; gap: 3px; flex-wrap: wrap; margin-bottom: 5px; }
.chip { height: 24px; padding: 0 9px; border-radius: 99px; border: 1px solid var(--gray-200); background: transparent; font-size: 11px; font-weight: 400; color: var(--gray-500); cursor: pointer; transition: all .11s; }
.chip:hover { border-color: var(--gray-300); color: var(--gray-700); }
.chip.on { background: var(--blue-50); border-color: var(--blue-100); color: var(--blue); font-weight: 500; }
.tk-items { flex: 1; overflow-y: auto; padding: 7px; }
.tki { padding: 10px 11px; border-radius: var(--r-sm); border: 1px solid transparent; margin-bottom: 4px; cursor: pointer; transition: all .11s; border-left: 2px solid transparent; }
.tki:hover { background: var(--gray-50); }
.tki.on { background: var(--blue-50); border-color: var(--blue-100); border-left-color: var(--blue); }
.tki.inc-item { border-left-color: var(--red) !important; }
.tki-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; gap: 5px; }
.tki-id { font-size: 10px; color: var(--gray-400); }
.tki-title { font-size: 12px; font-weight: 500; color: var(--gray-800); line-height: 1.4; margin-bottom: 5px; }
.tki-meta { display: flex; align-items: center; gap: 4px; flex-wrap: wrap; }
.tki-deadline { font-size: 10px; margin-left: auto; flex-shrink: 0; font-weight: 600; }

/* ── TICKET DETAIL ────────────────────────────────── */
.tk-detail { overflow-y: auto; background: var(--bg); display: flex; flex-direction: column; min-width: 0; }
.tk-empty { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--gray-400); font-size: 13px; gap: 10px; }
.tk-empty svg { width: 40px; height: 40px; opacity: .18; }
.td-inner { padding: 16px 20px; max-width: 100%; width: 100%; }
.td-id-row { display: flex; align-items: center; gap: 6px; margin-bottom: 7px; flex-wrap: wrap; }
.td-title { font-size: 16px; font-weight: 700; color: var(--gray-900); line-height: 1.35; margin-bottom: 9px; letter-spacing: -.01em; }
.td-badges { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 12px; }
.td-sec { background: var(--white); border: 1px solid var(--gray-200); border-radius: var(--r-lg); padding: 11px 13px; margin-bottom: 9px; }
.td-sec-title { font-size: 10px; font-weight: 600; letter-spacing: .07em; text-transform: uppercase; color: var(--gray-400); margin-bottom: 9px; }
.td-g2 { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; }
.td-g3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 9px; }
.td-field { display: flex; flex-direction: column; gap: 4px; }
.td-fl { font-size: 10px; font-weight: 600; color: var(--gray-400); text-transform: uppercase; letter-spacing: .04em; }
.td-fv { font-size: 13px; font-weight: 500; color: var(--gray-800); display: flex; align-items: center; gap: 5px; }
.td-fv-mono { font-size: 14px; font-weight: 700; }
.qa-steps { display: flex; gap: 4px; flex-wrap: wrap; }
.qa-step { padding: 5px 11px; border-radius: var(--r-sm); border: 1px solid var(--gray-200); background: var(--white); font-size: 12px; font-weight: 400; color: var(--gray-500); cursor: pointer; transition: all .11s; }
.qa-step:hover { border-color: var(--blue); color: var(--blue); }
.qa-step.on { border-color: var(--blue); background: var(--blue-50); color: var(--blue); font-weight: 500; }
.dur-box { display: flex; align-items: center; gap: 10px; padding: 8px 11px; background: var(--gray-50); border-radius: var(--r-sm); border: 1px solid var(--gray-200); margin-top: 7px; }
.dur-val { font-size: 20px; font-weight: 700; }
.dur-lbl { font-size: 10px; color: var(--gray-400); margin-top: 2px; }
.td-actions { display: flex; gap: 7px; align-items: center; padding: 10px 16px; border-top: 1px solid var(--gray-200); background: var(--white); flex-shrink: 0; }
.btn-ghost { padding: 6px 12px; border: 1px solid var(--gray-200); border-radius: var(--r-sm); background: transparent; color: var(--gray-600); font-size: 12px; font-weight: 400; transition: all .11s; }
.btn-ghost:hover { border-color: var(--gray-300); color: var(--gray-900); background: var(--gray-50); }
.btn-danger { padding: 6px 12px; border: 1px solid #FECACA; border-radius: var(--r-sm); background: var(--red-50); color: var(--red); font-size: 12px; font-weight: 500; transition: all .11s; margin-left: auto; }
.btn-danger:hover { background: var(--red); color: #fff; }
.btn-done { display: flex; align-items: center; gap: 4px; padding: 6px 12px; border: 1px solid #BBF7D0; border-radius: var(--r-sm); background: var(--green-50); color: var(--green); font-size: 12px; font-weight: 500; transition: all .11s; }
.btn-done:hover { background: var(--green); color: #fff; }
.btn-done svg { width: 11px; height: 11px; }
.av { border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; color: #fff; flex-shrink: 0; }

/* ── ANALYTICS ────────────────────────────────────── */
.an-tabs { display: flex; gap: 2px; padding: 0 20px; background: var(--white); border-bottom: 1px solid var(--gray-200); flex-shrink: 0; }
.an-tab { height: 42px; padding: 0 13px; font-size: 13px; font-weight: 400; color: var(--gray-500); background: none; border: none; border-bottom: 2px solid transparent; cursor: pointer; transition: all .12s; }
.an-tab:hover { color: var(--gray-800); }
.an-tab.on { color: var(--blue); font-weight: 500; border-bottom-color: var(--blue); }
.kpi-row4 { display: grid; grid-template-columns: repeat(4,1fr); gap: 11px; margin-bottom: 14px; }
.kpi-s { background: var(--white); border: 1px solid var(--gray-200); border-radius: var(--r-lg); padding: 13px 15px; position: relative; overflow: hidden; cursor: pointer; transition: box-shadow .14s; }
.kpi-s:hover { box-shadow: var(--shadow); }
.kpi-s::before { content:''; position:absolute;top:0;left:0;right:0;height:2px; }
.kpi-s.c-blue::before{background:var(--blue)} .kpi-s.c-mint::before{background:var(--mint)} .kpi-s.c-amber::before{background:var(--amber)} .kpi-s.c-red::before{background:var(--red)}
.ks-lbl { font-size: 10px; font-weight: 600; letter-spacing: .05em; text-transform: uppercase; color: var(--gray-400); margin-bottom: 6px; }
.ks-val { font-size: 20px; font-weight: 700; line-height: 1; margin-bottom: 4px; }
.kpi-s.c-blue .ks-val{color:var(--blue)} .kpi-s.c-mint .ks-val{color:var(--mint)} .kpi-s.c-amber .ks-val{color:var(--amber)} .kpi-s.c-red .ks-val{color:var(--red)}
.ks-sub { font-size: 11px; color: var(--gray-400); }
.hbar-row { display: flex; align-items: center; gap: 9px; margin-bottom: 8px; }
.hbar-lbl { font-size: 12px; color: var(--gray-600); min-width: 88px; flex-shrink: 0; font-weight: 500; display: flex; align-items: center; gap: 5px; }
.hbar-track { flex: 1; height: 5px; background: var(--gray-100); border-radius: 99px; overflow: hidden; }
.hbar-fill { height: 100%; border-radius: 99px; transition: width .5s; }
.hbar-val { font-size: 11px; font-weight: 600; color: var(--gray-600); width: 36px; text-align: right; flex-shrink: 0; }
.spark { display: flex; align-items: flex-end; gap: 4px; height: 70px; }
.sc { display: flex; flex-direction: column; align-items: center; gap: 3px; flex: 1; }
.sc-bars { display: flex; gap: 2px; align-items: flex-end; height: 52px; width: 100%; justify-content: center; }
.sc-b { border-radius: 3px 3px 0 0; min-width: 5px; flex: 1; }
.sc-lbl { font-size: 9px; color: var(--gray-400); }
.grade { font-size: 12px; font-weight: 700; padding: 3px 9px; border-radius: var(--r-sm); display: inline-flex; align-items: center; }
.gr-A{background:var(--green-50);color:var(--green)} .gr-B{background:var(--blue-50);color:var(--blue)} .gr-C{background:var(--amber-50);color:var(--amber)} .gr-D{background:var(--red-50);color:var(--red)}

/* ── ROUTINE ──────────────────────────────────────── */
.rt-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 14px; gap: 12px; }
.rt-prog-bar { width: 160px; height: 4px; background: var(--gray-200); border-radius: 99px; overflow: hidden; }
.rt-prog-fill { height: 100%; background: var(--mint); border-radius: 99px; transition: width .4s; }
.rt-sec { margin-bottom: 18px; }
.rt-sec-hd { display: flex; align-items: center; gap: 7px; margin-bottom: 7px; }
.rt-sec-lbl { font-size: 12px; font-weight: 600; color: var(--gray-700); }
.rt-sec-cnt { font-size: 11px; font-weight: 600; padding: 1px 7px; border-radius: 99px; background: var(--gray-100); color: var(--gray-500); }
.rt-sec-cnt.all { background: var(--green-50); color: var(--green); }
.rt-sec-line { flex: 1; height: 1px; background: var(--gray-200); }
.rt-list { background: var(--white); border: 1px solid var(--gray-200); border-radius: var(--r-lg); overflow: hidden; }
.rt-item { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border-bottom: 1px solid var(--gray-100); transition: background .1s; }
.rt-item:last-child { border: none; }
.rt-item:hover { background: var(--gray-50); }
.rt-item.done .rt-item-text { text-decoration: line-through; color: var(--gray-400); }
.rt-chk { width: 16px; height: 16px; border-radius: 4px; border: 1.5px solid var(--gray-300); background: transparent; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; transition: all .12s; }
.rt-chk:hover { border-color: var(--mint); }
.rt-chk.on { background: var(--mint); border-color: var(--mint); }
.rt-chk svg { width: 9px; height: 9px; color: #fff; }
.rt-item-body { flex: 1; min-width: 0; }
.rt-item-text { font-size: 13px; font-weight: 400; color: var(--gray-700); }
.rt-item-meta { display: flex; align-items: center; gap: 5px; margin-top: 2px; }
.rt-who { font-size: 11px; color: var(--gray-400); }
.rt-actions { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
.rt-btn { height: 24px; padding: 0 9px; border-radius: 99px; font-size: 11px; font-weight: 500; cursor: pointer; transition: all .11s; border: 1px solid var(--gray-200); background: transparent; color: var(--gray-500); }
.rt-btn:hover { border-color: var(--mint); color: var(--mint); background: var(--mint-50); }
.rt-btn.done-btn { border-color: #BBF7D0; background: var(--green-50); color: var(--green); }
.rt-btn.done-btn:hover { background: var(--green); color: #fff; }
.rt-btn.skip-done { border-color: var(--amber-100); color: var(--amber); background: var(--amber-50); }
.rt-del { width: 22px; height: 22px; border: none; border-radius: 4px; background: transparent; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--gray-300); transition: all .11s; }
.rt-del:hover { background: var(--red-50); color: var(--red); }
.rt-del svg { width: 10px; height: 10px; }
.rt-hist-title { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--gray-400); margin-bottom: 7px; margin-top: 13px; }
.rt-run { display: flex; align-items: center; justify-content: space-between; padding: 5px 11px; background: var(--gray-50); border-radius: var(--r-sm); margin-bottom: 4px; font-size: 12px; }
.rt-run-date { color: var(--gray-400); }
.rt-run-ok { color: var(--green); font-weight: 500; }
.rt-run-partial { color: var(--amber); }

/* ── ADMIN ────────────────────────────────────────── */
.mem-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 11px; margin-bottom: 22px; }
.mem-card { background: var(--white); border: 1px solid var(--gray-200); border-radius: var(--r-lg); padding: 13px; display: flex; align-items: center; gap: 11px; transition: box-shadow .14s; }
.mem-card:hover { box-shadow: var(--shadow-sm); }
.mem-av { width: 36px; height: 36px; border-radius: 9px; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 800; color: #fff; flex-shrink: 0; }
.mem-info { flex: 1; min-width: 0; }
.mem-name { font-size: 13px; font-weight: 600; color: var(--gray-900); }
.mem-role { font-size: 11px; color: var(--gray-400); margin-top: 1px; }
.mem-stats { display: flex; gap: 8px; margin-top: 5px; }
.mem-stat { font-size: 11px; color: var(--gray-400); }
.mem-btns { display: flex; gap: 4px; flex-shrink: 0; }
.mem-btn { width: 26px; height: 26px; border: 1px solid var(--gray-200); border-radius: var(--r-sm); background: transparent; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--gray-400); transition: all .11s; }
.mem-btn:hover { background: var(--gray-50); color: var(--gray-700); border-color: var(--gray-300); }
.mem-btn.del:hover { background: var(--red-50); color: var(--red); border-color: #FECACA; }
.mem-btn svg { width: 11px; height: 11px; }
.add-mem-card { background: transparent; border: 1px dashed var(--gray-300); border-radius: var(--r-lg); padding: 13px; display: flex; align-items: center; justify-content: center; gap: 7px; cursor: pointer; color: var(--gray-400); font-size: 13px; transition: all .14s; }
.add-mem-card:hover { border-color: var(--blue); color: var(--blue); background: var(--blue-50); }
.add-mem-card svg { width: 14px; height: 14px; }
.admin-sec-hd { display: flex; align-items: center; gap: 8px; margin-bottom: 11px; }
.admin-sec-lbl { font-size: 10px; font-weight: 700; letter-spacing: .07em; text-transform: uppercase; color: var(--gray-400); }
.admin-sec-div { flex: 1; height: 1px; background: var(--gray-200); }
.tbl-wrap { background: var(--white); border: 1px solid var(--gray-200); border-radius: var(--r-xl); overflow: hidden; }
table { width: 100%; border-collapse: collapse; }
thead tr { background: var(--gray-50); }
th { font-size: 10px; font-weight: 600; letter-spacing: .05em; text-transform: uppercase; color: var(--gray-400); padding: 9px 13px; text-align: left; border-bottom: 1px solid var(--gray-200); white-space: nowrap; }
td { padding: 10px 13px; font-size: 12px; color: var(--gray-600); border-bottom: 1px solid var(--gray-100); vertical-align: middle; }
tbody tr:last-child td { border: none; }
tbody tr:hover { background: var(--gray-50); cursor: pointer; }

/* ── MODAL ────────────────────────────────────────── */
.mbg { position: fixed; inset: 0; background: rgba(0,0,0,.28); backdrop-filter: blur(3px); z-index: 500; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity .17s; }
.mbg.on { opacity: 1; pointer-events: all; }
.mbox { background: var(--white); border: 1px solid var(--gray-200); border-radius: var(--r-xl); width: 560px; max-width: 96vw; max-height: 92vh; overflow-y: auto; padding: 22px; box-shadow: var(--shadow-lg); transform: scale(.99) translateY(7px); transition: transform .2s; }
.mbg.on .mbox { transform: scale(1) translateY(0); }
.mbox-sm { width: 420px; }
.mhd { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
.mtitle { font-size: 15px; font-weight: 700; color: var(--gray-900); letter-spacing: -.01em; }
.mclose { width: 26px; height: 26px; border-radius: var(--r-sm); border: 1px solid var(--gray-200); background: transparent; display: flex; align-items: center; justify-content: center; color: var(--gray-400); transition: all .12s; }
.mclose:hover { background: var(--gray-50); color: var(--gray-700); }
.mclose svg { width: 11px; height: 11px; }
.fstack { display: flex; flex-direction: column; gap: 11px; }
.f2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.f3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
.fg { display: flex; flex-direction: column; gap: 4px; }
.fl { font-size: 10px; font-weight: 600; letter-spacing: .06em; text-transform: uppercase; color: var(--gray-400); }
.fl-req::after { content: ' *'; color: var(--red); }
.fi,.fs,.fta { background: var(--gray-50); border: 1px solid var(--gray-200); border-radius: var(--r); padding: 8px 10px; font-size: 13px; color: var(--gray-800); outline: none; transition: border-color .13s; width: 100%; }
.fi:focus,.fs:focus,.fta:focus { border-color: var(--blue); background: #fff; box-shadow: 0 0 0 3px var(--blue-50); }
.fi::placeholder,.fta::placeholder { color: var(--gray-400); }
.fta { resize: vertical; min-height: 65px; }
.fs { appearance: none; cursor: pointer; }
.fi-ro { background: var(--gray-100); color: var(--gray-400); }
.sec-box { background: var(--gray-50); border: 1px solid var(--gray-200); border-radius: var(--r-lg); padding: 12px; }
.sec-box-lbl { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .06em; color: var(--gray-400); margin-bottom: 9px; }
.mft { margin-top: 18px; display: flex; justify-content: space-between; align-items: center; padding-top: 14px; border-top: 1px solid var(--gray-100); }
.mft-r { display: flex; gap: 7px; }
.color-row { display: flex; gap: 5px; flex-wrap: wrap; }
.color-sw { width: 25px; height: 25px; border-radius: 6px; cursor: pointer; border: 2px solid transparent; transition: all .12s; }
.color-sw.on { border-color: var(--gray-800); transform: scale(1.1); }
.team-toggle { display: flex; gap: 5px; }
.freq-toggle { display: flex; gap: 5px; }

/* ── TOAST ────────────────────────────────────────── */
.toast { position: fixed; bottom: 18px; right: 18px; z-index: 600; background: var(--gray-900); color: #fff; border-radius: var(--r-lg); padding: 10px 14px; display: flex; align-items: center; gap: 7px; box-shadow: var(--shadow-lg); font-size: 13px; transform: translateY(10px); opacity: 0; transition: all .2s; pointer-events: none; }
.toast.on { opacity: 1; transform: translateY(0); }
.toast svg { width: 13px; height: 13px; color: #4ADE80; flex-shrink: 0; }

/* ── CONFIRM ──────────────────────────────────────── */
#confirm-dialog { position: fixed; inset: 0; background: rgba(0,0,0,.22); backdrop-filter: blur(3px); z-index: 700; align-items: center; justify-content: center; }
.confirm-box { background: var(--white); border: 1px solid var(--gray-200); border-radius: var(--r-xl); padding: 22px; width: 310px; max-width: 92vw; box-shadow: var(--shadow-lg); }
.confirm-title { font-size: 14px; font-weight: 700; color: var(--gray-900); margin-bottom: 5px; }
#confirm-msg { font-size: 13px; color: var(--gray-500); line-height: 1.6; margin-bottom: 18px; }
.confirm-btns { display: flex; justify-content: flex-end; gap: 7px; }

/* ── RESPONSIVE ───────────────────────────────────── */
@media (min-width: 1440px) {
  .tk-layout { grid-template-columns: 30% 70%; }
}
@media (max-width: 1439px) and (min-width: 1280px) {
  .tk-layout { grid-template-columns: 35% 65%; }
}
@media (max-width: 1279px) {
  .dash-grid-top { grid-template-columns: 3fr 2fr; }
  .dash-grid-bot { grid-template-columns: 1fr 1fr; }
  .dash-grid-perf { grid-template-columns: 1fr 1fr; }
  .kpi-strip { grid-template-columns: repeat(2,1fr); }
  .mem-grid { grid-template-columns: repeat(2,1fr); }
  .kpi-row4 { grid-template-columns: repeat(2,1fr); }
  .tk-layout { grid-template-columns: 340px 1fr; }
  .td-inner { padding: 14px 16px; }
}
@media (max-width: 1023px) {
  .tk-layout { grid-template-columns: 300px 1fr; }
  .td-inner { padding: 12px 14px; }
  .td-sec { padding: 9px 11px; }
}
@media (max-width: 767px) {
  .sb1 { display: none; }
  .sb2 { width: 160px; }
  .dash-grid-top, .dash-grid-bot, .dash-grid-perf { grid-template-columns: 1fr; }
  .vs-wrap { grid-template-columns: 1fr; }
  .vs-table { border-right: none; border-bottom: 1px solid var(--gray-200); }
  .kpi-strip { grid-template-columns: 1fr 1fr; }
  .tk-layout { grid-template-columns: 1fr; }
  .tk-detail { display: none; }
  .mem-grid { grid-template-columns: 1fr; }
  .f2, .f3 { grid-template-columns: 1fr; }
}
@media (max-width: 500px) {
  .sb2 { display: none; }
  .kpi-strip { grid-template-columns: 1fr; }
}

/* ── PERFORMANCE DASHBOARD (KR vs VN) ──────────────────── */
.perf-grid-top { display: grid; grid-template-columns: 1fr; gap: 14px; margin-bottom: 14px; }
.perf-grid-mid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 14px; }
.perf-grid-bot { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

/* Radar chart */
.radar-wrap { position: relative; display: flex; align-items: center; justify-content: center; padding: 16px 0 8px; }
.radar-svg { overflow: visible; }
.radar-label { font-size: 11px; font-weight: 600; fill: var(--gray-600); font-family: var(--font); }
.radar-legend { display: flex; justify-content: center; gap: 20px; margin-top: 4px; padding-bottom: 8px; }
.radar-legend-item { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--gray-600); }
.radar-legend-dot { width: 10px; height: 10px; border-radius: 50%; }

/* Score badge */
.score-badge {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 11px; font-weight: 600;
  padding: 3px 9px; border-radius: 99px;
}
.score-high   { background: #F0FDF4; color: #16A34A; }
.score-mid    { background: #EFF6FF; color: #2563EB; }
.score-low    { background: #FEF2F2; color: #DC2626; }
.score-warn   { background: #FFFBEB; color: #D97706; }

/* Throughput chart */
.tp-chart { display: flex; align-items: flex-end; gap: 12px; padding: 12px 0 4px; height: 120px; }
.tp-group { display: flex; flex-direction: column; align-items: center; gap: 4px; flex: 1; }
.tp-bars { display: flex; gap: 6px; align-items: flex-end; height: 90px; width: 100%; justify-content: center; }
.tp-bar-wrap { display: flex; flex-direction: column; align-items: center; gap: 3px; flex: 1; max-width: 40px; }
.tp-bar { border-radius: 4px 4px 0 0; width: 100%; transition: height .4s ease; min-height: 4px; }
.tp-bar-val { font-size: 11px; font-weight: 700; }
.tp-bar-lbl { font-size: 10px; color: var(--gray-400); }
.tp-x-lbl { font-size: 11px; color: var(--gray-500); font-weight: 500; }

/* Rework chart */
.rw-bar-row { display: flex; align-items: center; gap: 8px; margin-bottom: 9px; height: 28px; }
.rw-bar-lbl { font-size: 12px; font-weight: 500; color: var(--gray-700); width: 28px; flex-shrink: 0; }
.rw-stacked { flex: 1; display: flex; height: 18px; border-radius: var(--r-sm); overflow: hidden; }
.rw-seg { height: 100%; transition: width .4s ease; display: flex; align-items: center; justify-content: center; }
.rw-seg-lbl { font-size: 9px; font-weight: 700; color: rgba(255,255,255,.9); white-space: nowrap; padding: 0 4px; }
.rw-total { font-size: 11px; font-weight: 600; color: var(--gray-600); width: 36px; text-align: right; flex-shrink: 0; }

/* Insight card */
.insight-card { background: var(--gray-50); border: 1px solid var(--gray-200); border-radius: var(--r-lg); padding: 12px 14px; }
.insight-tag { display: inline-flex; align-items: center; gap: 4px; font-size: 10px; font-weight: 600; letter-spacing: .04em; text-transform: uppercase; color: var(--gray-400); margin-bottom: 6px; }
.insight-text { font-size: 12px; color: var(--gray-700); line-height: 1.6; }
.insight-highlight { color: var(--blue); font-weight: 600; }
.insight-warn { color: var(--red); font-weight: 600; }

/* Eval dimensions */
.eval-row { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--gray-100); }
.eval-row:last-child { border: none; }
.eval-name { font-size: 12px; font-weight: 500; color: var(--gray-700); width: 90px; flex-shrink: 0; }
.eval-bars { flex: 1; display: flex; flex-direction: column; gap: 4px; }
.eval-bar-item { display: flex; align-items: center; gap: 6px; }
.eval-flag { font-size: 10px; width: 16px; flex-shrink: 0; }
.eval-bar-track { flex: 1; height: 6px; background: var(--gray-100); border-radius: 99px; overflow: hidden; }
.eval-bar-fill { height: 100%; border-radius: 99px; transition: width .5s ease; }
.eval-score { font-size: 11px; font-weight: 700; width: 30px; text-align: right; flex-shrink: 0; }

@media (max-width: 767px) {
  .perf-grid-mid, .perf-grid-bot { grid-template-columns: 1fr; }
}

// derived state helpers
function getFilteredTickets() {
  const sys = STATE.selectedSystem;
  const kw = SYS_KEYWORDS[sys] || [];
  const base = kw.length
    ? tickets.filter(t => kw.some(k => t.title.toLowerCase().includes(k.toLowerCase()) || (t.system||'').toLowerCase().includes(k.toLowerCase())))
    : tickets;
  const q = (document.getElementById('tk-q2')||document.getElementById('tk-q')||{}).value?.trim().toLowerCase()||'';
  return base.filter(t => {
    if(STATE.ticketFilters.type !== 'all' && t.type !== STATE.ticketFilters.type) return false;
    if(STATE.ticketFilters.team !== 'all' && t.team !== STATE.ticketFilters.team) return false;
    if(STATE.ticketFilters.qa   !== 'all' && t.qa   !== STATE.ticketFilters.qa)   return false;
    if(q && !t.title.toLowerCase().includes(q) && !(t.assignee||'').toLowerCase().includes(q)) return false;
    return true;
  }).sort((a,b) => {
    // deadline ascending (마감 임박순), nulls last
    if(a.deadline && b.deadline) return a.deadline.localeCompare(b.deadline);
    if(a.deadline) return -1;
    if(b.deadline) return  1;
    if(a.is_incident && !b.is_incident) return -1;
    if(!a.is_incident && b.is_incident) return  1;
    return new Date(b.created_at) - new Date(a.created_at);
  });
}

function genSample(){
  const titles={
    routine:  ['메인페이지 점검','배너 노출 확인','로그 오류 점검','API 상태 모니터링','DB 백업 확인'],
    maint:    ['서버 로그 정리','캐시 초기화','의존성 업데이트','SSL 갱신 확인'],
    enhance:  ['메인 배너 문구 수정','버튼 컬러 변경','여백 조정','폰트 수정','CTA 개선',
               '칼텍스 배너 업데이트','폴리머 제품 이미지 교체','MyDAX 대시보드 수정','윤활유 카탈로그 수정'],
    bug:      ['로그인 500 에러','결제 버튼 무반응','모바일 이미지 깨짐','API 타임아웃'],
    incident: ['칼텍스 결제 서비스 장애','폴리머 로그인 API 중단','MyDAX CDN 장애','윤활유 배포 롤백','DB 커넥션 소진'],
  };
  const sysMap = {
    '칼텍스':['칼텍스','칼텍스','칼텍스'],
    '폴리머':['폴리머','폴리머'],
    'MyDAX': ['MyDAX','MyDAX'],
    '윤활유':['윤활유','윤활유'],
    '전체':  [''],
  };
  const sysKeys = ['칼텍스','폴리머','MyDAX','윤활유','전체','전체'];
  const qaList=['신규','진행','진행','검수','완료','완료','완료'];
  const now=Date.now(); const data=[]; let idx=1;
  for(const tp of ['routine','maint','enhance','enhance','bug','incident']){
    const n=tp==='incident'?5:tp==='routine'?4:6;
    for(let i=0;i<n&&idx<=36;i++){
      const team=Math.random()>.45?'KR':'VN';
      const pool=team==='KR'?KR():VN();
      const assignee=pool[Math.floor(Math.random()*pool.length)]?.name||'';
      const requester=requesters[Math.floor(Math.random()*requesters.length)]?.name||'';
      const size=['small','small','medium','medium','large'][Math.floor(Math.random()*5)];
      const qa=tp==='incident'?'진행':qaList[Math.floor(Math.random()*qaList.length)];
      const daysAgo=Math.floor(Math.random()*30);
      const reqAt=new Date(now-daysAgo*86400000-Math.floor(Math.random()*8)*3600000).toISOString().slice(0,16);
      const startAt=new Date(new Date(reqAt).getTime()+(Math.floor(Math.random()*120)+10)*60000).toISOString().slice(0,16);
      const durBase={small:[20,90],medium:[60,300],large:[180,720]}[size];
      const dur=Math.floor(Math.random()*(durBase[1]-durBase[0]))+durBase[0];
      const endAt=qa==='완료'?new Date(new Date(startAt).getTime()+dur*60000).toISOString().slice(0,16):null;
      const dur_min=endAt?Math.round((new Date(endAt)-new Date(startAt))/60000):null;
      const rev=qa==='완료'||qa==='검수'?Math.floor(Math.random()*4):0;
      const result=qa==='완료'?['good','good','good','revise','fail'][Math.floor(Math.random()*5)]:null;
      const priority=tp==='incident'?'P1':['P1','P2','P2','P3','P3','P4'][Math.floor(Math.random()*6)];
      const has_error=Math.random()<.18;
      const root_cause=has_error?['REQ','DEV','QA','OPS','EXT'][Math.floor(Math.random()*5)]:null;
      // 마감일: 미래 1~14일
      const deadlineDays=Math.floor(Math.random()*14)-2; // -2~12 (일부 overdue)
      const deadline=new Date(now+deadlineDays*86400000).toISOString().split('T')[0];
      // 시스템 배정
      const sysIdx=Math.floor(Math.random()*sysKeys.length);
      const sys=sysKeys[sysIdx];
      // 타이틀에 시스템명 반영
      const tArr=titles[tp];
      let title=tArr[Math.floor(Math.random()*tArr.length)];
      if(sys&&sys!=='전체'&&!title.includes(sys)){
        const coin=Math.random()<.4;
        if(coin) title=sys+' '+title;
      }
      data.push({
        id:`TK-${String(idx).padStart(3,'0')}`,
        title, type:tp, size, priority, requester, team, assignee,
        req_at:reqAt, start_at:startAt, end_at:endAt, dur_min,
        qa, revisions:rev, result, has_error, root_cause,
        error_owner:has_error?assignee:null,
        is_incident:tp==='incident',
        severity:tp==='incident'?['P1','P2','P2','P3'][Math.floor(Math.random()*4)]:null,
        sla_met:dur_min?(dur_min<=SLA[priority]):null,
        system: sys==='전체'?'':sys,
        deadline,
        desc:'', note:'', created_at:new Date(reqAt).toISOString(),
      });
      idx++;
    }
  }
  return data;
}

// ── Utilities ─────────────────────────────────────────────
function ini(n){if(!n)return'?';const p=n.trim().split(/\s+/);return p.length>1?(p[0][0]+p[1][0]).toUpperCase():n.slice(0,2).toUpperCase();}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function fmtDt(s){if(!s)return'—';const d=new Date(s);return`${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;}
function fmtDate(s){if(!s)return'—';const d=new Date(s);return`${d.getMonth()+1}/${d.getDate()}`;}
function fmtDeadline(s){if(!s)return'—';const d=new Date(s);return`${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;}
function durStr(m){if(!m&&m!==0)return'—';if(m<60)return m+'분';const h=Math.floor(m/60),mn=m%60;return mn?`${h}h ${mn}m`:`${h}h`;}
function calcDur(s,e){if(!s||!e)return null;const m=Math.round((new Date(e)-new Date(s))/60000);return m>0?m:null;}
function pct(a,b){return b?Math.round(a/b*100):0;}
function avg(arr){return arr.length?Math.round(arr.reduce((s,v)=>s+v,0)/arr.length):0;}
function today(){return new Date().toISOString().split('T')[0];}
function deadlineCls(dl){
  if(!dl) return 'dday-ok';
  const diff=Math.ceil((new Date(dl)-Date.now())/86400000);
  if(diff<0)  return 'dday-over';
  if(diff<=2) return 'dday-urgent';
  if(diff<=5) return 'dday-warn';
  return 'dday-ok';
}
function deadlineLabel(dl){
  if(!dl) return '—';
  const diff=Math.ceil((new Date(dl)-Date.now())/86400000);
  if(diff<0)  return `D+${Math.abs(diff)}`;
  if(diff===0) return 'D-Day';
  return `D-${diff}`;
}

function toast(msg,ok=true){
  const e=document.getElementById('toast');
  if(!e) return;
  const s=e.querySelector('svg');
  if(s) s.style.color=ok?'#4ADE80':'#F87171';
  const m=document.getElementById('toast-msg');
  if(m) m.textContent=msg;
  e.classList.add('on');
  setTimeout(()=>e.classList.remove('on'),2500);
}

function goPane(id,navEl,sbEl){
  STATE.curPane=id;
  document.querySelectorAll('.pane').forEach(p=>p.classList.remove('on'));
  document.getElementById('pane-'+id)?.classList.add('on');
  document.querySelectorAll('.sn').forEach(b=>b.classList.remove('on'));
  document.querySelectorAll('.sb1-btn').forEach(b=>b.classList.remove('on'));
  if(navEl) navEl.classList.add('on');
  if(sbEl)  sbEl.classList.add('on');
  // auto-activate by index
  const snIdx  = {dash:0,tickets:1,routine:2,incident:3,analytics:5,admin:6};
  const sb1Idx = {dash:0,tickets:1,routine:2,incident:3,analytics:4,admin:5};
  const snList  = document.querySelectorAll('.sn');
  const sb1List = document.querySelectorAll('.sb1-btn');
  if(snIdx[id]  != null) snList[snIdx[id]]?.classList.add('on');
  if(sb1Idx[id] != null) sb1List[sb1Idx[id]]?.classList.add('on');
  const titles={dash:'대시보드',tickets:'티켓목록',analytics:'생산성/품질',routine:'루틴점검',incident:'장애관리',admin:'인력관리'};
  const tb=document.getElementById('tb-title');
  if(tb) tb.textContent=titles[id]||id;
  updateBadges();
  if(id==='dash')      renderDash();
  if(id==='tickets')   renderList();
  if(id==='analytics') renderAnalytics();
  if(id==='routine')   renderRt();
  if(id==='incident')  renderIncidentPane();
  if(id==='admin')     renderAdmin();
}

function updateBadges(){
  const open=tickets.filter(t=>t.qa!=='완료'&&t.qa!=='보류').length;
  const e1=document.getElementById('sb-open'); if(e1) e1.textContent=open;
  const inc=tickets.filter(t=>t.is_incident&&t.qa!=='완료').length;
  const e2=document.getElementById('sb-inc'); if(e2){e2.textContent=inc;e2.style.display=inc>0?'inline-flex':'none';}
  const dot=document.getElementById('sb1-inc-dot'); if(dot) dot.style.display=inc>0?'block':'none';
  const allRt=[...(routines.weekly||[]),...(routines.monthly||[])];
  const rtDone=allRt.filter(r=>getRtRun(r.id,today())?.status==='done').length;
  const pills=document.getElementById('sb-team-pills');
  if(pills) pills.innerHTML=members.slice(0,5).map(m=>`<div class="tp"><div class="tp-av" style="background:${m.team==='VN'?'#0D9488':'#2563EB'}">${m.team==='KR'?m.name[0]:ini(m.name)}</div>${m.name.split(' ')[0]}</div>`).join('');
  updateRoleUI();
}

function filterByType(tp){
  STATE.ticketFilters.type=tp;
  document.querySelectorAll('#fchip-type .chip').forEach(c=>{c.classList.remove('on');if(c.textContent.trim()===({routine:'🔄',maint:'🛠',enhance:'✨',bug:'🐛',incident:'🚨'}[tp]||'전체')) c.classList.add('on');});
  goPane('tickets');
}

// ── System Filter (Single Source of Truth) ────────────────
function setSystem(sys){
  STATE.selectedSystem = sys;
  // sync UI: all sys-tab buttons
  document.querySelectorAll('.sys-tab').forEach(b=>{
    b.classList.toggle('on', b.dataset.sys===sys);
  });
  // re-render all affected sections
  renderDash();
}

function setF(key,val,el){
  STATE.ticketFilters[key]=val;
  document.querySelectorAll(`#fchip-${key} .chip`).forEach(c=>c.classList.remove('on'));
  if(el) el.classList.add('on');
  renderList();
}

// ── RESET (루틴점검 초기화) ───────────────────────────────
function resetAllFilters(){
  STATE.selectedSystem = '전체';
  STATE.ticketFilters  = {type:'all',team:'all',qa:'all'};
  // reset UI chips
  ['type','team','qa'].forEach(key=>{
    document.querySelectorAll(`#fchip-${key} .chip`).forEach((c,i)=>{c.classList.remove('on');if(i===0)c.classList.add('on');});
  });
  // reset system tabs
  document.querySelectorAll('.sys-tab').forEach(b=>{
    b.classList.toggle('on', b.dataset.sys==='전체');
  });
  // reset search
  const q1=document.getElementById('tk-q'); if(q1) q1.value='';
  const q2=document.getElementById('tk-q2'); if(q2) q2.value='';
  renderDash();
  renderList();
  toast('필터가 초기화됐습니다 ✓');
}

// ══════════════════════════════════════════════════════════
// DASHBOARD
// ══════════════════════════════════════════════════════════
function renderDash(){
  const el=document.getElementById('dash-body'); if(!el) return;
  const sys=STATE.selectedSystem;
  const sysKw=SYS_KEYWORDS[sys]||[];
  const sysTickets=sysKw.length?tickets.filter(t=>sysKw.some(k=>t.title.toLowerCase().includes(k.toLowerCase())||(t.system||'').toLowerCase().includes(k.toLowerCase()))):tickets;

  const t=sysTickets;
  const done=t.filter(x=>x.qa==='완료');
  const open=t.filter(x=>x.qa!=='완료'&&x.qa!=='보류');
  const wd=done.filter(x=>x.dur_min>0);
  const ws=done.filter(x=>x.sla_met!==null);
  const rated=t.filter(x=>x.result);
  const avgDur=avg(wd.map(x=>x.dur_min));
  const slaRate=pct(ws.filter(x=>x.sla_met).length,ws.length);
  const goodRate=pct(rated.filter(x=>x.result==='good').length,rated.length);
  const doneRate=pct(done.length,t.length);
  const activeInc=tickets.filter(x=>x.is_incident&&x.qa!=='완료'); // incidents always from all tickets

  // KR vs VN (from all tickets for comparison)
  function ts(team){
    const tt=tickets.filter(x=>x.team===team);
    const td=tt.filter(x=>x.qa==='완료');
    const tw=td.filter(x=>x.dur_min>0);
    const ts2=td.filter(x=>x.sla_met!==null);
    const rated2=td.filter(x=>x.result);
    return{total:tt.length,done:td.length,doneRate:pct(td.length,tt.length),
      avgDur:avg(tw.map(x=>x.dur_min)),slaRate:pct(ts2.filter(x=>x.sla_met).length,ts2.length),
      errRate:pct(tt.filter(x=>x.has_error).length,tt.length),
      avgRev:tt.length?Math.round(tt.reduce((s,x)=>s+x.revisions,0)/tt.length*10)/10:0,
      goodRate:pct(rated2.filter(x=>x.result==='good').length,rated2.length)};
  }
  const kr=ts('KR'), vn=ts('VN');

  // 12-month data for selected system
  const sc=SYS_COLORS[sys];
  const mdata=Array.from({length:12},(_,i)=>{
    const d=new Date(); d.setMonth(d.getMonth()-11+i);
    const ds=d.toISOString().slice(0,7);
    return{lbl:(d.getMonth()+1)+'월',
      total:t.filter(x=>x.req_at?.startsWith(ds)).length,
      done:t.filter(x=>x.end_at?.startsWith(ds)).length};
  });
  const mmax=Math.max(...mdata.map(d=>Math.max(d.total,d.done)),1);
  const W=100,H=100;
  function mkPts(vals){return vals.map((v,i)=>`${(i/(vals.length-1)*W).toFixed(1)},${(H-v/mmax*H*.82-H*.06).toFixed(1)}`).join(' ');}
  const tPts=mkPts(mdata.map(d=>d.total));
  const dPts=mkPts(mdata.map(d=>d.done));

  // Priority tasks — deadline sorted, open only, filtered by system
  const prioList=getFilteredTickets().filter(x=>x.qa!=='완료'&&x.qa!=='보류')
    .sort((a,b)=>{
      if(a.deadline&&b.deadline) return a.deadline.localeCompare(b.deadline);
      if(a.deadline) return -1; if(b.deadline) return 1;
      return 0;
    }).slice(0,5);

  // Progress table — assignee stats
  const aRows=members.map(m=>{
    const mine=t.filter(x=>x.assignee===m.name);
    const mdone=mine.filter(x=>x.qa==='완료').length;
    // nearest deadline among open
    const openTks=mine.filter(x=>x.qa!=='완료'&&x.deadline);
    const nearestDl=openTks.length?openTks.sort((a,b)=>a.deadline.localeCompare(b.deadline))[0].deadline:null;
    return{...m,total:mine.length,done:mdone,doneRate:pct(mdone,mine.length),nearestDl};
  }).filter(m=>m.total>0).sort((a,b)=>b.total-a.total);
  const maxT=Math.max(...aRows.map(r=>r.total),1);

  // VS sparkline (4 months)
  const sp4=Array.from({length:4},(_,i)=>{
    const d=new Date(); d.setMonth(d.getMonth()-3+i);
    const ds=d.toISOString().slice(0,7);
    return{
      lbl:(d.getMonth()+1)+'월',
      kr:tickets.filter(x=>x.team==='KR'&&x.end_at?.startsWith(ds)).length,
      vn:tickets.filter(x=>x.team==='VN'&&x.end_at?.startsWith(ds)).length,
    };
  });
  const maxSp=Math.max(...sp4.map(d=>Math.max(d.kr,d.vn)),1);

  // ── countryPerformance: 역량 평가 데이터 모델 ─────────
  // 실제 티켓 데이터에서 계산된 지표 + 정성 평가 보정값
  const krT=tickets.filter(x=>x.team==='KR');
  const vnT=tickets.filter(x=>x.team==='VN');
  function calcPerf(teamTickets,headcount){
    const done=teamTickets.filter(t=>t.qa==='완료');
    const wd=done.filter(t=>t.dur_min>0);
    const ws=done.filter(t=>t.sla_met!==null);
    const rework=teamTickets.filter(t=>t.revisions>0);
    const errors=teamTickets.filter(t=>t.has_error);
    const rated=done.filter(t=>t.result);
    return{
      headcount,
      throughput:teamTickets.length,
      throughputPerHead: headcount>0?Math.round(teamTickets.length/headcount*10)/10:0,
      avgCompletionTime: wd.length?Math.round(wd.reduce((s,t)=>s+t.dur_min,0)/wd.length):0,
      slaRate: ws.length?Math.round(ws.filter(t=>t.sla_met).length/ws.length*100):0,
      reworkRate: teamTickets.length?Math.round(rework.length/teamTickets.length*100):0,
      errorRate:  teamTickets.length?Math.round(errors.length/teamTickets.length*100):0,
      goodRate:   rated.length?Math.round(rated.filter(t=>t.result==='good').length/rated.length*100):0,
      avgRevisions: teamTickets.length?Math.round(teamTickets.reduce((s,t)=>s+t.revisions,0)/teamTickets.length*10)/10:0,
      doneRate: teamTickets.length?Math.round(done.length/teamTickets.length*100):0,
    };
  }
  const krPerf=calcPerf(krT, KR().length||4);
  const vnPerf=calcPerf(vnT, VN().length||3);

  // 5개 역량 점수 (0~100): 실제 데이터 + 정성 보정
  function evalScore(perf,team){
    // 언어이해력: goodRate 기반 + 수정률 페널티
    const lang  = Math.min(100, Math.max(0, perf.goodRate - perf.avgRevisions*8 + (team==='KR'?10:0)));
    // 수행능력: 완료율 + SLA
    const exec  = Math.min(100, Math.max(0, perf.doneRate*.6 + perf.slaRate*.4));
    // 프로세스이해도: 오류율 역산 + SLA
    const proc  = Math.min(100, Math.max(0, (100-perf.errorRate)*.5 + perf.slaRate*.5));
    // 협업적응도: 재작업률 역산 (KR 약간 유리)
    const collab= Math.min(100, Math.max(0, (100-perf.reworkRate*1.2) + (team==='KR'?8:0)));
    // 생산성: 처리량/인원 정규화 + SLA
    const maxTP=Math.max(krPerf.throughputPerHead,vnPerf.throughputPerHead,1);
    const prod  = Math.min(100, Math.max(0, perf.throughputPerHead/maxTP*60 + perf.slaRate*.4));
    return{lang:Math.round(lang),exec:Math.round(exec),proc:Math.round(proc),collab:Math.round(collab),prod:Math.round(prod)};
  }
  const krScore=evalScore(krPerf,'KR');
  const vnScore=evalScore(vnPerf,'VN');

  function cmpRow(m,kv,vv,unit='',hi=true){
    const kw=hi?kv>vv:kv<vv, vw=hi?vv>kv:vv<kv;
    return`<div class="vs-row"><div class="vs-val ${kw?'win-kr':''}">${kv}${unit}</div><div class="vs-metric">${m}</div><div class="vs-val ${vw?'win-vn':''}">${vv}${unit}</div></div>`;
  }

  el.innerHTML=`
  ${activeInc.length>0?`
  <div class="inc-banner" onclick="goPane('incident')" title="장애관리 페이지로 이동">
    <div class="inc-pulse"></div>
    <span class="inc-text">장애 ${activeInc.length}건 진행중<span class="inc-sub">${activeInc.slice(0,1).map(x=>x.title).join('')}${activeInc.length>1?` 외 ${activeInc.length-1}건`:''}</span></span>
    <span class="inc-count">${activeInc.length}건</span>
    <span class="inc-arrow">→</span>
  </div>`:''}

  <!-- KPI 4개 -->
  <div class="kpi-strip">
    <div class="kpi-cell" onclick="goPane('tickets')">
      <div class="kpi-lbl">신규 티켓</div>
      <div class="kpi-val c-blue">${open.length.toLocaleString()}</div>
      <div class="kpi-sub">${sys!=='전체'?sys+' · ':''}전체 ${t.length}건</div>
    </div>
    <div class="kpi-cell" onclick="goPane('analytics');setAnTab('productivity')">
      <div class="kpi-lbl">SLA 준수율</div>
      <div class="kpi-val c-mint">${slaRate}%</div>
      <div class="kpi-sub ${slaRate>=95?'up':''}">${slaRate>=95?'목표 달성 ✓':'목표 95%'}</div>
    </div>
    <div class="kpi-cell" onclick="goPane('analytics');setAnTab('productivity')">
      <div class="kpi-lbl">평균처리시간</div>
      <div class="kpi-val c-blue">${durStr(avgDur)}</div>
      <div class="kpi-sub">완료 ${wd.length}건 기준</div>
    </div>
    <div class="kpi-cell" onclick="goPane('incident')">
      <div class="kpi-lbl">장애</div>
      <div class="kpi-val ${activeInc.length>0?'c-red':''}">${activeInc.length}건</div>
      <div class="kpi-sub ${activeInc.length>0?'warn':''}">${activeInc.length>0?'즉시대응필요':'없음'}</div>
    </div>
  </div>

  <!-- 차트 + 우선순위 -->
  <div class="dash-grid-top">
    <div class="card">
      <div class="card-hd">
        <div class="card-title">시스템별 작업 티켓 현황</div>
        <div class="sys-tabs">
          ${SYSTEMS.map(s=>`<button class="sys-tab${s===sys?' on':''}" data-sys="${s}" onclick="setSystem('${s}')">${s}</button>`).join('')}
        </div>
      </div>
      <div class="card-body">
        <div class="chart-legend">
          <div class="chart-legend-item"><div class="chart-legend-dot" style="background:${sc.line}"></div>접수</div>
          <div class="chart-legend-item"><div class="chart-legend-dot" style="background:${sc.done}"></div>완료</div>
          ${sys!=='전체'?`<span style="font-size:11px;color:var(--gray-400);margin-left:4px">${sys} ${t.length}건</span>`:''}
        </div>
        <div class="chart-wrap">
          <svg viewBox="0 0 100 100" preserveAspectRatio="none">
            <defs>
              <linearGradient id="g1" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color="${sc.line}" stop-opacity=".2"/>
                <stop offset="100%" stop-color="${sc.line}" stop-opacity="0"/>
              </linearGradient>
              <linearGradient id="g2" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color="${sc.done}" stop-opacity=".15"/>
                <stop offset="100%" stop-color="${sc.done}" stop-opacity="0"/>
              </linearGradient>
            </defs>
            ${[20,40,60,80].map(y=>`<line x1="0" y1="${y}" x2="100" y2="${y}" stroke="#E5E7EB" stroke-width=".3" vector-effect="non-scaling-stroke"/>`).join('')}
            <polygon points="${tPts} 100,${H} 0,${H}" fill="url(#g1)"/>
            <polygon points="${dPts} 100,${H} 0,${H}" fill="url(#g2)"/>
            <polyline points="${tPts}" fill="none" stroke="${sc.line}" stroke-width="1.3" vector-effect="non-scaling-stroke" stroke-linecap="round" stroke-linejoin="round"/>
            <polyline points="${dPts}" fill="none" stroke="${sc.done}" stroke-width="1.3" vector-effect="non-scaling-stroke" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div class="chart-x-labels">${mdata.map(d=>`<span>${d.lbl}</span>`).join('')}</div>
        <div class="chart-stats">
          <div class="chart-stat-item"><div class="chart-stat-lbl">오늘 접수</div><div class="chart-stat-val" style="color:${sc.line}">${t.filter(x=>x.req_at?.startsWith(today())).length}</div></div>
          <div class="chart-stat-item"><div class="chart-stat-lbl">오늘 완료</div><div class="chart-stat-val" style="color:${sc.done}">${t.filter(x=>x.end_at?.startsWith(today())).length}</div></div>
          <div class="chart-stat-item"><div class="chart-stat-lbl">완료율</div><div class="chart-stat-val" style="color:${doneRate>=70?'#0D9488':'#D97706'}">${doneRate}%</div></div>
          <div class="chart-stat-item"><div class="chart-stat-lbl">Good율</div><div class="chart-stat-val" style="color:${goodRate>=80?'#0D9488':'#D97706'}">${goodRate}%</div></div>
        </div>
      </div>
    </div>

    <!-- 작업 우선순위 (마감임박순) -->
    <div class="card">
      <div class="card-hd">
        <span class="card-title">작업 우선순위</span>
        <span class="card-sub">마감 임박순</span>
      </div>
      ${prioList.length?prioList.map((tk,i)=>{
        const color=tk.team==='VN'?'#0D9488':'#2563EB';
        const m=memberByName(tk.assignee);
        const initial=tk.team==='VN'?ini(tk.assignee||''):(tk.assignee?tk.assignee[0]:'?');
        const dcls=deadlineCls(tk.deadline);
        const dlbl=deadlineLabel(tk.deadline);
        return`<div class="prio-item" onclick="goPane('tickets');selectTk('${tk.id}')">
          <span class="prio-num">${i+1}</span>
          <div class="prio-av" style="background:${color}">${initial}</div>
          <div class="prio-body">
            <div class="prio-title">${esc(tk.title)}</div>
            <div class="prio-meta">${tk.team} · ${esc(tk.assignee||'미배정')}${tk.system?` · ${tk.system}`:''}</div>
          </div>
          <span class="dday ${dcls} ${dcls==='dday-over'?'dl-over':''}">${dlbl}</span>
        </div>`;
      }).join(''):`<div style="padding:20px;text-align:center;color:var(--gray-400);font-size:13px">긴급 작업 없음 ✓</div>`}
    </div>
  </div>

  <!-- Row C: 업무처리 현황 (속도/처리량/품질 요약) -->
  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:14px">

    <!-- 업무 속도 카드 -->
    <div class="card">
      <div class="card-hd">
        <span class="card-title">⚡ 업무 속도</span>
        <span class="card-sub">처리시간 기준</span>
      </div>
      <div class="card-body">
        ${(()=>{
          const done=t.filter(x=>x.qa==='완료'&&x.dur_min>0);
          const fast=done.filter(x=>x.dur_min<=60).length;
          const mid =done.filter(x=>x.dur_min>60&&x.dur_min<=240).length;
          const slow=done.filter(x=>x.dur_min>240).length;
          const total=done.length||1;
          const avgD=avg(done.map(x=>x.dur_min));
          return`
          <div style="display:flex;align-items:baseline;gap:6px;margin-bottom:12px">
            <span style="font-size:28px;font-weight:700;color:var(--blue);letter-spacing:-.02em">${durStr(avgD)}</span>
            <span style="font-size:12px;color:var(--gray-400)">평균 소요</span>
          </div>
          <div style="display:flex;height:8px;border-radius:99px;overflow:hidden;margin-bottom:8px;gap:2px">
            <div style="width:${fast/total*100}%;background:#16A34A;border-radius:99px 0 0 99px" title="1시간↓"></div>
            <div style="width:${mid/total*100}%;background:#2563EB" title="1~4시간"></div>
            <div style="width:${slow/total*100}%;background:#DC2626;border-radius:0 99px 99px 0" title="4시간+"></div>
          </div>
          <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--gray-500)">
            <span style="color:#16A34A">⚡ 빠름 ${fast}건</span>
            <span style="color:#2563EB">• 보통 ${mid}건</span>
            <span style="color:#DC2626">🐢 느림 ${slow}건</span>
          </div>
          <div style="margin-top:12px;padding-top:10px;border-top:1px solid var(--gray-100);display:flex;gap:14px">
            <div>
              <div style="font-size:10px;color:var(--gray-400);text-transform:uppercase;letter-spacing:.04em;margin-bottom:2px">SLA 준수</div>
              <div style="font-size:16px;font-weight:700;color:${slaRate>=95?'#16A34A':'#DC2626'}">${slaRate}%</div>
            </div>
            <div>
              <div style="font-size:10px;color:var(--gray-400);text-transform:uppercase;letter-spacing:.04em;margin-bottom:2px">KR 평균</div>
              <div style="font-size:16px;font-weight:700;color:#2563EB">${durStr(kr.avgDur)}</div>
            </div>
            <div>
              <div style="font-size:10px;color:var(--gray-400);text-transform:uppercase;letter-spacing:.04em;margin-bottom:2px">VN 평균</div>
              <div style="font-size:16px;font-weight:700;color:#0D9488">${durStr(vn.avgDur)}</div>
            </div>
          </div>`;
        })()}
      </div>
    </div>

    <!-- 업무 처리량 카드 -->
    <div class="card">
      <div class="card-hd">
        <span class="card-title">📦 업무 처리량</span>
        <span class="card-sub">금주 기준</span>
      </div>
      <div class="card-body">
        ${(()=>{
          const weekAgo=new Date(Date.now()-7*86400000).toISOString();
          const thisWeek=t.filter(x=>x.created_at>=weekAgo);
          const doneWeek=t.filter(x=>x.end_at&&x.end_at>=weekAgo.slice(0,10));
          const krWeek=t.filter(x=>x.team==='KR');
          const vnWeek=t.filter(x=>x.team==='VN');
          // 일별 완료 (최근 7일)
          const days7=Array.from({length:7},(_,i)=>{
            const d=new Date(Date.now()-(6-i)*86400000);
            const ds=d.toISOString().split('T')[0];
            return{lbl:['일','월','화','수','목','금','토'][d.getDay()],cnt:t.filter(x=>x.end_at?.startsWith(ds)).length};
          });
          const maxDay=Math.max(...days7.map(d=>d.cnt),1);
          return`
          <div style="display:flex;align-items:baseline;gap:6px;margin-bottom:2px">

function renderList(){
  const list=getFilteredTickets();
  const cntEl=document.getElementById('tk-cnt'); if(cntEl) cntEl.textContent=list.length;
  updateBadges();
  const el=document.getElementById('tk-items');
  if(!el) return;
  el.innerHTML=list.length?list.map(t=>{
    const tp=TYPE[t.type]||TYPE.enhance;
    const qm=QA[t.qa]||QA['신규'];
    const dcls=deadlineCls(t.deadline);
    const dlbl=deadlineLabel(t.deadline);
    return`<div class="tki${STATE.selTicketId===t.id?' on':''}${t.is_incident?' inc-item':''}" onclick="selectTk('${t.id}')">
      <div class="tki-top">
        <span class="tki-id">${t.id}${t.system?` · ${t.system}`:''}</span>
        <span class="bdg ${qm.cls}" style="font-size:10px">${qm.label}</span>
      </div>
      <div class="tki-title">${esc(t.title)}</div>
      <div class="tki-meta">
        <span class="bdg ${tp.cls}" style="font-size:10px">${tp.icon}</span>
        <span class="bdg ${t.team==='KR'?'tm-kr':'tm-vn'}" style="font-size:10px">${t.team}</span>
        ${avHtml(t.assignee,t.team,15)}
        ${t.dur_min?`<span style="font-size:10px;color:var(--gray-400)">${durStr(t.dur_min)}</span>`:''}
        ${t.deadline?`<span class="tki-deadline ${dcls==='dday-over'?'dl-over':dcls==='dday-urgent'?'dl-warn':''}">${dlbl}</span>`:''}
      </div>
    </div>`;
  }).join(''):`<div style="padding:32px;text-align:center;color:var(--gray-400);font-size:13px">티켓이 없습니다</div>`;
}

function selectTk(id){STATE.selTicketId=id;renderList();renderDetail(id);}

  const qm=QA[t.qa]||QA['신규'];
  const dur=t.dur_min||calcDur(t.start_at,t.end_at);
  const speed=dur?(dur<=60?'⚡ 빠름':dur<=240?'🔶 보통':'🐢 느림'):'';

  el.innerHTML=`
  <div style="flex:1;overflow-y:auto">
  <div class="td-inner">
    <div class="td-id-row">

      <span class="bdg ${tp.cls}">${tp.icon} ${tp.label}</span>
      ${t.system?`<span class="bdg" style="background:var(--gray-100);color:var(--gray-600)">${t.system}</span>`:''}
      <span class="bdg ${t.team==='KR'?'tm-kr':'tm-vn'}">${t.team==='KR'?'🇰🇷 한국팀':'🇻🇳 베트남팀'}</span>
      ${t.is_incident&&t.severity?`<span class="bdg tp-incident">${t.severity}</span>`:''}
    </div>
    <div class="td-title">${esc(t.title)}</div>
    <div class="td-badges">
      <span class="bdg ${qm.cls}">${qm.label}</span>
      <span class="bdg" style="background:var(--gray-100);color:var(--gray-600)">${t.size||'medium'} · ${t.priority}</span>
      ${t.result?`<span class="bdg" style="background:${t.result==='good'?'var(--green-50)':t.result==='revise'?'var(--amber-50)':'var(--red-50)'};color:${t.result==='good'?'var(--green)':t.result==='revise'?'var(--amber)':'var(--red)'}">${t.result==='good'?'✅ Good':t.result==='revise'?'🔁 Revise':'❌ Fail'}</span>`:''}
      ${t.sla_met===true?`<span class="bdg" style="background:var(--green-50);color:var(--green);font-size:10px">SLA ✓</span>`:t.sla_met===false?`<span class="bdg" style="background:var(--red-50);color:var(--red);font-size:10px">SLA 초과</span>`:''}
    </div>
    <div class="td-sec">
      <div class="td-sec-title">QA 상태</div>
      <div class="qa-steps">${['신규','진행','검수','완료','보류'].map(s=>`<button class="qa-step${t.qa===s?' on':''}" onclick="changeQA('${t.id}','${s}')">${QA[s]?.label||s}</button>`).join('')}</div>
    </div>
    <div class="td-sec">
      <div class="td-sec-title">담당 배정</div>
      <div class="td-g2">
        <div class="td-field"><div class="td-fl">요청자</div><div class="td-fv">${avHtml(t.requester,'KR',18)}<span>${esc(t.requester)||'—'}</span></div></div>
        <div class="td-field"><div class="td-fl">담당자</div><div class="td-fv">${avHtml(t.assignee,t.team,18)}<span>${esc(t.assignee)||'미배정'}</span></div></div>
        <div class="td-field"><div class="td-fl">수정 횟수</div><div class="td-fv td-fv-mono" style="${t.revisions>2?'color:var(--red)':''}">${t.revisions}회</div></div>
        <div class="td-field"><div class="td-fl">마감일</div><div class="td-fv" style="${deadlineCls(t.deadline)==='dday-over'?'color:var(--red)':deadlineCls(t.deadline)==='dday-urgent'?'color:var(--amber)':''}">${fmtDeadline(t.deadline)} <span style="font-size:11px;color:var(--gray-400)">${deadlineLabel(t.deadline)}</span></div></div>
      </div>
    </div>
    <div class="td-sec">
      <div class="td-sec-title">시간 기록</div>
      <div class="td-g3" style="margin-bottom:9px">
        <div class="td-field"><div class="td-fl">요청</div><div class="td-fv" style="font-size:12px">${fmtDt(t.req_at)}</div></div>
        <div class="td-field"><div class="td-fl">시작</div><div class="td-fv" style="font-size:12px">${fmtDt(t.start_at)}</div></div>
        <div class="td-field"><div class="td-fl">완료</div><div class="td-fv" style="font-size:12px">${fmtDt(t.end_at)}</div></div>
      </div>
      <div class="dur-box">
        <div><div style="font-size:10px;color:var(--gray-400);text-transform:uppercase;letter-spacing:.04em;margin-bottom:2px">소요시간</div>
          <div class="dur-val" style="color:${t.team==='KR'?'var(--blue)':'var(--mint)'}">${durStr(dur)}</div></div>
        ${speed?`<span class="bdg" style="background:var(--gray-100);color:var(--gray-600);font-size:11px">${speed}</span>`:''}
        <div style="margin-left:auto;text-align:right"><div style="font-size:10px;color:var(--gray-400);margin-bottom:2px">SLA 목표</div><div style="font-size:13px;font-weight:600;color:var(--gray-400)">${durStr(SLA[t.priority])}</div></div>
      </div>
    </div>
    ${t.has_error||t.root_cause?`<div class="td-sec">
      <div class="td-sec-title">품질 / 오류</div>
      <div class="td-g2">
        <div class="td-field"><div class="td-fl">실수 여부</div><div class="td-fv"><span class="bdg" style="background:var(--red-50);color:var(--red)">⚠ 실수</span></div></div>
        ${t.root_cause?`<div class="td-field"><div class="td-fl">Root Cause</div><div class="td-fv"><span class="bdg rc-${t.root_cause}">${t.root_cause}</span><span style="font-size:11px;color:var(--gray-400)">${RC[t.root_cause]||''}</span></div></div>`:''}
        ${t.error_owner?`<div class="td-field"><div class="td-fl">Error Owner</div><div class="td-fv">${avHtml(t.error_owner,t.team,18)}<span>${esc(t.error_owner)}</span></div></div>`:''}
      </div>
    </div>`:''}
    ${t.desc||t.note?`<div class="td-sec">
      ${t.desc?`<div style="font-size:13px;color:var(--gray-600);line-height:1.7;white-space:pre-wrap">${esc(t.desc)}</div>`:''}
      ${t.note?`<div style="margin-top:9px;padding:9px 12px;background:var(--amber-50);border-radius:var(--r-sm);font-size:12px;color:var(--amber)">📌 ${esc(t.note)}</div>`:''}
