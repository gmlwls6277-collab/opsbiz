    <button class="btn-p" onclick="openCreate()">+ 새 티켓</button>
    <button class="btn-danger" onclick="deleteTk('${t.id}')">삭제</button>
  </div>`;
}

function changeQA(id,qa){
  const t=tickets.find(t=>t.id===id);if(!t)return;
  t.qa=qa;
  if(qa==='완료'&&!t.end_at){t.end_at=new Date().toISOString().slice(0,16);t.dur_min=calcDur(t.start_at,t.end_at);if(t.dur_min)t.sla_met=t.dur_min<=SLA[t.priority||'P3'];}
  if(qa==='진행'&&!t.start_at)t.start_at=new Date().toISOString().slice(0,16);
  save();renderList();renderDetail(id);updateBadges();toast(`QA → ${QA[qa]?.label||qa} ✓`);
}

function deleteTk(id){
  showConfirm('이 티켓을 삭제할까요?',()=>{
    tickets=tickets.filter(t=>t.id!==id);STATE.selTicketId=null;save();renderList();updateBadges();
    const el=document.getElementById('tk-detail');
    if(el) el.innerHTML=`<div class="tk-empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"><rect x="2" y="4" width="20" height="16" rx="2"/></svg>삭제됐습니다</div>`;
    toast('삭제됐습니다');
  });
}

// ── TICKET MODAL ───────────────────────────────────────────
function fillModalSelects(){
  const rs=document.getElementById('f-requester');
  if(rs) rs.innerHTML=requesters.map(r=>`<option value="${r.name}">${r.name}${r.dept?' ('+r.dept+')':''}</option>`).join('');
  const es=document.getElementById('f-error-owner');
  if(es) es.innerHTML=`<option value="">없음</option>`+members.map(m=>`<option value="${m.name}">${m.name}</option>`).join('');
  syncAssignee();
}
function syncAssignee(){
  const team=(document.getElementById('f-team')||{}).value||'KR';
  const pool=team==='KR'?KR():VN();
  const sel=document.getElementById('f-assignee');
  if(sel) sel.innerHTML=`<option value="">미배정</option>`+pool.map(m=>`<option value="${m.name}">${m.name} (${m.role})</option>`).join('');
}
function openCreate(editId){
  STATE.editTicketId=editId||null;
  fillModalSelects();
  const t=editId?tickets.find(t=>t.id===editId):null;
  const mtt=document.getElementById('m-ticket-title'); if(mtt) mtt.textContent=t?'티켓 수정':'티켓 생성';
  const fields=[['f-title',t?.title||''],['f-desc',t?.desc||''],['f-note',t?.note||'']];
  fields.forEach(([id,v])=>{const el=document.getElementById(id);if(el)el.value=v;});
  const selFields=[['f-type',t?.type||'enhance'],['f-size',t?.size||'medium'],['f-priority',t?.priority||'P2'],
    ['f-team',t?.team||'KR'],['f-qa',t?.qa||'신규'],['f-result',t?.result||''],
    ['f-has-error',t?.has_error?'true':'false'],['f-root-cause',t?.root_cause||''],
    ['f-error-owner',t?.error_owner||''],['f-system',t?.system||'']];
  selFields.forEach(([id,v])=>{const el=document.getElementById(id);if(el)el.value=v;});
  syncAssignee();
  setTimeout(()=>{const el=document.getElementById('f-assignee');if(el&&t?.assignee)el.value=t.assignee;},0);
  const dateFields=[['f-req-at',t?.req_at||new Date().toISOString().slice(0,16)],
    ['f-start-at',t?.start_at||''],['f-end-at',t?.end_at||'']];
  dateFields.forEach(([id,v])=>{const el=document.getElementById(id);if(el)el.value=v;});
  const dlEl=document.getElementById('f-deadline'); if(dlEl) dlEl.value=t?.deadline||'';
  const revEl=document.getElementById('f-rev'); if(revEl) revEl.value=t?.revisions||0;
  const durEl=document.getElementById('f-duration'); if(durEl) durEl.value=t?.dur_min?durStr(t.dur_min):'';
  const incBox=document.getElementById('f-incident-box');
  if(incBox){incBox.style.display=(t?.type||'enhance')==='incident'?'block':'none';}
  const ftEl=document.getElementById('f-type');
  if(ftEl) ftEl.onchange=function(){const ib=document.getElementById('f-incident-box');if(ib)ib.style.display=this.value==='incident'?'block':'none';};
  const sevEl=document.getElementById('f-severity'); if(sevEl&&t?.severity) sevEl.value=t.severity;
  const mdb=document.getElementById('m-del-btn');
  if(mdb) mdb.innerHTML=t?`<button class="btn-danger" onclick="showConfirm('삭제할까요?',()=>{deleteTk('${t.id}');cm('m-ticket')})">삭제</button>`:'';
  document.getElementById('m-ticket')?.classList.add('on');
}

document.getElementById('f-start-at')?.addEventListener('change',()=>{
  const s=document.getElementById('f-start-at')?.value, e=document.getElementById('f-end-at')?.value;
  const el=document.getElementById('f-duration'); if(el) el.value=calcDur(s,e)?durStr(calcDur(s,e)):'';
});
document.getElementById('f-end-at')?.addEventListener('change',()=>{
  const s=document.getElementById('f-start-at')?.value, e=document.getElementById('f-end-at')?.value;
  const el=document.getElementById('f-duration'); if(el) el.value=calcDur(s,e)?durStr(calcDur(s,e)):'';
});

function saveTicket(){
  const title=(document.getElementById('f-title')||{}).value?.trim();
  if(!title){document.getElementById('f-title')?.focus();return;}
  const g=id=>(document.getElementById(id)||{}).value;
  const s=g('f-start-at'), e=g('f-end-at'), dur_min=calcDur(s,e);
  const priority=g('f-priority');
  const data={
    title, type:g('f-type'), size:g('f-size'), priority,
    requester:g('f-requester'), team:g('f-team'), assignee:g('f-assignee'),
    req_at:g('f-req-at'), start_at:s||null, end_at:e||null, dur_min,
    qa:g('f-qa'), revisions:parseInt(g('f-rev'))||0, result:g('f-result')||null,
    has_error:g('f-has-error')==='true',
    root_cause:g('f-root-cause')||null, error_owner:g('f-error-owner')||null,
    is_incident:g('f-type')==='incident',
    severity:g('f-type')==='incident'?g('f-severity'):null,
    sla_met:dur_min?(dur_min<=SLA[priority]):null,
    system:g('f-system')||'',
    deadline:g('f-deadline')||null,
    desc:g('f-desc'), note:g('f-note'),
  };
  if(STATE.editTicketId){
    const i=tickets.findIndex(t=>t.id===STATE.editTicketId);
    if(i>-1)tickets[i]={...tickets[i],...data};
    STATE.selTicketId=STATE.editTicketId;
    toast('수정됐습니다 ✓');
  }else{
    const nid=`TK-${String(tickets.length+1).padStart(3,'0')}`;
    tickets.unshift({id:nid,created_at:new Date().toISOString(),...data});
    STATE.selTicketId=nid;
    toast('티켓이 생성됐습니다 ✓');
  }
  save();cm('m-ticket');renderList();updateBadges();
  if(STATE.selTicketId) renderDetail(STATE.selTicketId);
}

function tStats(team){
  const t=tickets.filter(x=>x.team===team);
  const d=t.filter(x=>x.qa==='완료');
  const wd=d.filter(x=>x.dur_min>0);
  const ws=d.filter(x=>x.sla_met!==null);
  const rated=d.filter(x=>x.result);
  return{total:t.length,done:d.length,doneRate:pct(d.length,t.length),
    avgDur:avg(wd.map(x=>x.dur_min)),slaRate:pct(ws.filter(x=>x.sla_met).length,ws.length),
    errRate:pct(t.filter(x=>x.has_error).length,t.length),
    avgRev:t.length?Math.round(t.reduce((s,x)=>s+x.revisions,0)/t.length*10)/10:0,
    goodRate:pct(rated.filter(x=>x.result==='good').length,rated.length),
    incDone:t.filter(x=>x.is_incident&&x.qa==='완료').length};
}
function grade(s){const sc=s.doneRate*.35+Math.max(0,100-s.avgRev*20)*.35+(s.avgDur>0?Math.max(0,100-s.avgDur/3)*.3:0);return sc>=82?'A':sc>=65?'B':sc>=48?'C':'D';}
function kbox(lbl,val,sub,color,link=''){
  return`<div class="kpi-s ${color}" onclick="${link}" style="${link?'cursor:pointer':''}">
    <div class="ks-lbl">${lbl}</div><div class="ks-val">${val}</div><div class="ks-sub">${sub}</div>
  </div>`;
}

function buildQuality(){

function buildProductivity(){
  const done=tickets.filter(t=>t.qa==='완료'), wd=done.filter(t=>t.dur_min>0);

function buildMembers(){
  const rows=members.map(m=>{

    const avgRev=mine.length?Math.round(mine.reduce((s,t)=>s+t.revisions,0)/mine.length*10)/10:0;

        <td><span class="grade gr-${r.grade}">${r.grade}</span></td>

function buildCapability(){
  if(STATE.currentRole!=='admin') return buildCapabilityLocked();

  // 역량 점수 계산
  const krT2=tickets.filter(x=>x.team==='KR');
  const vnT2=tickets.filter(x=>x.team==='VN');
  function calcPerf2(tt,hc){
    const done=tt.filter(t=>t.qa==='완료');
    const wd=done.filter(t=>t.dur_min>0);
    const ws=done.filter(t=>t.sla_met!==null);
    const rated=done.filter(t=>t.result);
    const rework=tt.filter(t=>t.revisions>0);
    const errors=tt.filter(t=>t.has_error);
    return{
      headcount:hc,throughput:tt.length,
      throughputPerHead:hc>0?Math.round(tt.length/hc*10)/10:0,
      avgCompletionTime:wd.length?Math.round(wd.reduce((s,t)=>s+t.dur_min,0)/wd.length):0,
      slaRate:ws.length?Math.round(ws.filter(t=>t.sla_met).length/ws.length*100):0,
      reworkRate:tt.length?Math.round(rework.length/tt.length*100):0,
      errorRate:tt.length?Math.round(errors.length/tt.length*100):0,
      goodRate:rated.length?Math.round(rated.filter(t=>t.result==='good').length/rated.length*100):0,
      avgRevisions:tt.length?Math.round(tt.reduce((s,t)=>s+t.revisions,0)/tt.length*10)/10:0,
      doneRate:tt.length?Math.round(done.length/tt.length*100):0,
    };
  }
  const krP=calcPerf2(krT2,KR().length||4);
  const vnP=calcPerf2(vnT2,VN().length||3);
  function evalScore2(p,team){
    const lang  =Math.min(100,Math.max(0,p.goodRate-p.avgRevisions*8+(team==='KR'?10:0)));
    const exec  =Math.min(100,Math.max(0,p.doneRate*.6+p.slaRate*.4));
    const proc  =Math.min(100,Math.max(0,(100-p.errorRate)*.5+p.slaRate*.5));
    const collab=Math.min(100,Math.max(0,(100-p.reworkRate*1.2)+(team==='KR'?8:0)));
    const maxTP =Math.max(krP.throughputPerHead,vnP.throughputPerHead,1);
    const prod  =Math.min(100,Math.max(0,p.throughputPerHead/maxTP*60+p.slaRate*.4));
    return{lang:Math.round(lang),exec:Math.round(exec),proc:Math.round(proc),collab:Math.round(collab),prod:Math.round(prod)};
  }
  const krScore2=evalScore2(krP,'KR');
  const vnScore2=evalScore2(vnP,'VN');
  const dims=[
    {key:'lang',  label:'언어이해력',icon:'💬'},
    {key:'exec',  label:'수행능력',  icon:'⚡'},
    {key:'proc',  label:'프로세스',  icon:'🔄'},
    {key:'collab',label:'협업적응',  icon:'🤝'},
    {key:'prod',  label:'생산성',    icon:'📊'},
  ];

  // 레이더 SVG (VN 단독)
  const W=200,CX=100,CY=95,R=70,N=5;
  function gPt(score,i){const a=(2*Math.PI/N)*i-Math.PI/2;const r=score/100*R;return{x:CX+r*Math.cos(a),y:CY+r*Math.sin(a)};}
  function gLbl(i){const a=(2*Math.PI/N)*i-Math.PI/2;return{x:CX+(R+26)*Math.cos(a),y:CY+(R+26)*Math.sin(a)};}
  const gridPaths=[20,40,60,80,100].map(lv=>{
    const pts=dims.map((_,i)=>{const a=(2*Math.PI/N)*i-Math.PI/2;return`${(CX+lv/100*R*Math.cos(a)).toFixed(1)},${(CY+lv/100*R*Math.sin(a)).toFixed(1)}`;}).join(' ');
    return`<polygon points="${pts}" fill="${lv===60?'rgba(239,68,68,.04)':'none'}" stroke="${lv===60?'#FCA5A5':lv===100?'#D1D5DB':'#E5E7EB'}" stroke-width="${lv===100?1:0.7}"/>`;
  }).join('');
  const axisLines=dims.map((_,i)=>{const a=(2*Math.PI/N)*i-Math.PI/2;return`<line x1="${CX}" y1="${CY}" x2="${(CX+R*Math.cos(a)).toFixed(1)}" y2="${(CY+R*Math.sin(a)).toFixed(1)}" stroke="#E5E7EB" stroke-width="0.8"/>`;}).join('');
  const vnPts2=dims.map((d,i)=>gPt(vnScore2[d.key],i));
  const vnPath2=vnPts2.map(p=>`${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' ');
  const avgVn2=Math.round(dims.reduce((s,d)=>s+vnScore2[d.key],0)/dims.length);
  const vnFill=avgVn2>=70?'rgba(13,148,136,.18)':avgVn2>=50?'rgba(217,119,6,.15)':'rgba(220,38,38,.14)';
  const vnStroke=avgVn2>=70?'#0D9488':avgVn2>=50?'#D97706':'#DC2626';
  const labelEls=dims.map((d,i)=>{
    const lp=gLbl(i);const anchor=lp.x<CX-5?'end':lp.x>CX+5?'start':'middle';
    const sc=vnScore2[d.key];const sc2=sc>=70?'#0D9488':sc>=50?'#D97706':'#DC2626';
    return`<text x="${lp.x.toFixed(1)}" y="${(lp.y+3).toFixed(1)}" font-size="10" text-anchor="${anchor}" fill="${sc2}" font-family="Pretendard,sans-serif" font-weight="600">${d.label}</text>
    <text x="${lp.x.toFixed(1)}" y="${(lp.y+13).toFixed(1)}" font-size="9" text-anchor="${anchor}" fill="${sc2}" font-family="Pretendard,sans-serif" font-weight="700">${sc}점</text>`;
  }).join('');
  const radarSvg=`<svg width="${W}" height="${CY*2+40}" viewBox="0 0 ${W} ${CY*2+40}" style="overflow:visible">
    ${gridPaths}${axisLines}
    <polygon points="${vnPath2}" fill="${vnFill}" stroke="${vnStroke}" stroke-width="2" stroke-linejoin="round"/>
    ${vnPts2.map((p,i)=>{const sc=vnScore2[dims[i].key];const dc=sc>=70?'#0D9488':sc>=50?'#D97706':'#DC2626';return`<circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="4" fill="${dc}" stroke="white" stroke-width="1.5"/>`;}).join('')}
    <text x="${CX}" y="${CY+5}" font-size="14" font-weight="700" text-anchor="middle" fill="${vnStroke}" font-family="Pretendard,sans-serif">${avgVn2}</text>
    <text x="${CX}" y="${CY+17}" font-size="8" text-anchor="middle" fill="#9CA3AF" font-family="Pretendard,sans-serif">종합</text>
    ${labelEls}
  </svg>`;

  return`
  <div class="kpi-row4" style="margin-bottom:16px">
    ${[
      {lbl:'VN 종합점수',val:avgVn2+'점',sub:'5개 역량 평균',cls:avgVn2>=70?'c-mint':avgVn2>=50?'c-amber':'c-red'},
      {lbl:'언어 이해력', val:vnScore2.lang+'점', sub:vnScore2.lang>=70?'양호':'개선 필요', cls:vnScore2.lang>=70?'c-mint':'c-amber'},
      {lbl:'수행 능력',   val:vnScore2.exec+'점', sub:vnScore2.exec>=70?'양호':'개선 필요', cls:vnScore2.exec>=70?'c-mint':'c-amber'},
      {lbl:'생산성',      val:vnScore2.prod+'점', sub:`인당 ${vnP.throughputPerHead}건`, cls:vnScore2.prod>=70?'c-mint':'c-amber'},
    ].map(k=>`<div class="kpi-s ${k.cls}"><div class="ks-lbl">${k.lbl}</div><div class="ks-val">${k.val}</div><div class="ks-sub">${k.sub}</div></div>`).join('')}
  </div>

  <div style="display:grid;grid-template-columns:220px 1fr;gap:16px;margin-bottom:16px">
    <!-- 레이더 차트 -->
    <div class="card">
      <div class="card-hd"><span class="card-title">🇻🇳 VN 역량 레이더</span></div>
      <div style="display:flex;flex-direction:column;align-items:center;padding:12px 0 8px">
        ${radarSvg}
      </div>
    </div>
    <!-- 차원별 점수 바 -->
    <div class="card">
      <div class="card-hd"><span class="card-title">차원별 역량 점수</span><span class="card-sub">60점 미만 = 교육 필요</span></div>
      <div class="card-body">
        ${dims.map(d=>{
          const vv=vnScore2[d.key],kv=krScore2[d.key];
          const bar=vv>=70?'#0D9488':vv>=50?'#D97706':'#DC2626';
          const lbl=vv>=70?'양호':vv>=50?'개선필요':'취약';
          const cls=vv>=70?'score-high':vv>=50?'score-warn':'score-low';
          return`<div class="eval-row">
            <div class="eval-name">${d.icon} ${d.label}</div>
            <div class="eval-bars">
              <div class="eval-bar-item">
                <span class="eval-flag">🇻🇳</span>
                <div class="eval-bar-track"><div class="eval-bar-fill" style="width:${vv}%;background:${bar}"></div></div>
                <span class="eval-score" style="color:${bar}">${vv}</span>
              </div>
              <div class="eval-bar-item">
                <span class="eval-flag">🇰🇷</span>
                <div class="eval-bar-track"><div class="eval-bar-fill" style="width:${kv}%;background:#2563EB;opacity:.5"></div></div>
                <span class="eval-score" style="color:#2563EB;opacity:.7">${kv}</span>
              </div>
            </div>
            <span class="score-badge ${cls}" style="flex-shrink:0;font-size:10px">${lbl}</span>
          </div>`;
        }).join('')}
      </div>
    </div>
  </div>

  <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px">
    <!-- 생산성 -->
    <div class="card">
      <div class="card-hd"><span class="card-title">인력 대비 생산성</span></div>
      <div class="card-body">
        ${[{lbl:'🇰🇷 한국팀',color:'#2563EB',bg:'#EFF6FF',p:krP},{lbl:'🇻🇳 베트남팀',color:'#0D9488',bg:'#F0FDFA',p:vnP}].map(tm=>`
        <div style="background:${tm.bg};border-radius:var(--r-lg);padding:11px 13px;margin-bottom:8px">
          <div style="font-size:12px;font-weight:600;color:${tm.color};margin-bottom:7px">${tm.lbl}</div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:5px">
            ${[{l:'인원',v:tm.p.headcount+'명'},{l:'총 처리',v:tm.p.throughput+'건'},{l:'인당 처리',v:tm.p.throughputPerHead+'건'},{l:'완료율',v:tm.p.doneRate+'%'}].map(f=>`
            <div><div style="font-size:10px;color:var(--gray-400)">${f.l}</div><div style="font-size:13px;font-weight:700;color:${tm.color}">${f.v}</div></div>`).join('')}
          </div>
        </div>`).join('')}
      </div>
    </div>
    <!-- 처리시간 -->
    <div class="card">
      <div class="card-hd"><span class="card-title">처리시간 비교</span></div>
      <div class="card-body">
        ${Object.keys(TYPE).map(tp=>{
          const krAvg=avg(tickets.filter(t=>t.team==='KR'&&t.type===tp&&t.dur_min>0).map(t=>t.dur_min));
          const vnAvg=avg(tickets.filter(t=>t.team==='VN'&&t.type===tp&&t.dur_min>0).map(t=>t.dur_min));
          if(!krAvg&&!vnAvg) return '';
          const mx=Math.max(krAvg,vnAvg,1);
          return`<div style="margin-bottom:9px">
            <div style="font-size:11px;color:var(--gray-600);margin-bottom:4px">${TYPE[tp].icon} ${TYPE[tp].label}</div>
            <div style="display:flex;align-items:center;gap:5px;margin-bottom:2px">
              <div style="font-size:9px;width:14px;color:var(--gray-400)">KR</div>
              <div style="flex:1;height:6px;background:var(--gray-100);border-radius:99px;overflow:hidden"><div style="width:${krAvg/mx*100}%;height:100%;background:#2563EB;border-radius:99px"></div></div>
              <div style="font-size:10px;font-weight:600;color:#2563EB;width:34px;text-align:right">${durStr(krAvg)}</div>
            </div>
            <div style="display:flex;align-items:center;gap:5px">
              <div style="font-size:9px;width:14px;color:var(--gray-400)">VN</div>
              <div style="flex:1;height:6px;background:var(--gray-100);border-radius:99px;overflow:hidden"><div style="width:${vnAvg/mx*100}%;height:100%;background:#0D9488;border-radius:99px"></div></div>
              <div style="font-size:10px;font-weight:600;color:#0D9488;width:34px;text-align:right">${durStr(vnAvg)}</div>
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>
    <!-- 재작업률 -->
    <div class="card">
      <div class="card-hd"><span class="card-title">재작업률 분석</span></div>
      <div class="card-body">
        ${[{lbl:'KR',color:'#2563EB',t:krT2},{lbl:'VN',color:'#0D9488',t:vnT2}].map(tm=>{
          const total=tm.t.length||1;
          const r0=tm.t.filter(t=>t.revisions===0).length;
          const r1=tm.t.filter(t=>t.revisions===1).length;
          const r2=tm.t.filter(t=>t.revisions===2).length;
          const r3=tm.t.filter(t=>t.revisions>=3).length;
          const rw=Math.round((r1+r2+r3)/total*100);
          return`<div style="margin-bottom:10px">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px">
              <span style="font-size:12px;font-weight:600;color:${tm.color}">${tm.lbl}</span>
              <span style="font-size:12px;font-weight:700;color:${rw>30?'var(--red)':rw>15?'var(--amber)':'var(--green)'}">${rw}%</span>
            </div>
            <div style="display:flex;height:16px;border-radius:var(--r-sm);overflow:hidden;gap:1px">
              ${r0>0?`<div style="width:${r0/total*100}%;background:#16A34A;display:flex;align-items:center;justify-content:center"><span style="font-size:9px;font-weight:700;color:#fff">${r0}</span></div>`:''}
              ${r1>0?`<div style="width:${r1/total*100}%;background:#D97706;display:flex;align-items:center;justify-content:center"><span style="font-size:9px;font-weight:700;color:#fff">${r1}</span></div>`:''}
              ${r2>0?`<div style="width:${r2/total*100}%;background:#EA580C;display:flex;align-items:center;justify-content:center"><span style="font-size:9px;font-weight:700;color:#fff">${r2}</span></div>`:''}
              ${r3>0?`<div style="width:${r3/total*100}%;background:#DC2626;display:flex;align-items:center;justify-content:center"><span style="font-size:9px;font-weight:700;color:#fff">${r3}</span></div>`:''}
            </div>
          </div>`;
        }).join('')}
        <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;padding-top:8px;border-top:1px solid var(--gray-100)">
          ${[{c:'#16A34A',l:'0회'},{c:'#D97706',l:'1회'},{c:'#EA580C',l:'2회'},{c:'#DC2626',l:'3회+'}].map(x=>`<span style="display:flex;align-items:center;gap:3px;font-size:10px;color:var(--gray-500)"><span style="width:8px;height:8px;border-radius:2px;background:${x.c};display:inline-block"></span>${x.l}</span>`).join('')}
        </div>
        <!-- 교육 필요 인사이트 -->
        ${(()=>{
          const weak=dims.filter(d=>vnScore2[d.key]<60).map(d=>d.label);
          const gap =dims.filter(d=>(krScore2[d.key]-vnScore2[d.key])>15).map(d=>d.label);
          if(!weak.length&&!gap.length) return `<div style="margin-top:10px;padding:8px 10px;background:var(--green-50);border-radius:var(--r-sm);font-size:12px;color:var(--green)">✅ 모든 역량 양호 수준</div>`;
          return`<div style="margin-top:10px;padding:8px 10px;background:#FEF2F2;border-radius:var(--r-sm)">
            <div style="font-size:10px;font-weight:700;color:var(--red);margin-bottom:4px">📌 교육 필요 영역</div>
            ${weak.length?`<div style="font-size:11px;color:var(--gray-700)">취약: <strong style="color:var(--red)">${weak.join(', ')}</strong></div>`:''}
            ${gap.length?`<div style="font-size:11px;color:var(--gray-700);margin-top:2px">KR 격차: <strong style="color:var(--amber)">${gap.join(', ')}</strong></div>`:''}
          </div>`;
        })()}
      </div>
    </div>
  </div>`;
}


function getRtRun(tid,date){return rt_runs.find(x=>x.templateId===tid&&x.date===date);}
function setRtRun(tid,date,status){
  const i=rt_runs.findIndex(x=>x.templateId===tid&&x.date===date);
  const run={id:`run_${tid}_${date}`,templateId:tid,date,status,at:new Date().toISOString()};
  if(i>=0)rt_runs[i]=run;else rt_runs.push(run);
  saveRt();
}
function renderRt(){
  const el=document.getElementById('rt-wrap'); if(!el) return;
  const todayKey=today();
  const all=[...(routines.weekly||[]),...(routines.monthly||[])];
  const done=all.filter(r=>getRtRun(r.id,todayKey)?.status==='done').length;
  const pctVal=all.length?Math.round(done/all.length*100):0;
  el.innerHTML=`
  <div class="rt-top">
    <div>
      <div style="font-size:17px;font-weight:700;color:var(--gray-900)">루틴 점검</div>
      <div style="font-size:12px;color:var(--gray-400);margin-top:3px">완료 기록은 날짜별로 누적됩니다</div>
      <div style="display:flex;align-items:center;gap:8px;margin-top:7px">
        <div class="rt-prog-bar"><div class="rt-prog-fill" style="width:${pctVal}%"></div></div>
        <span style="font-size:12px;font-weight:600;color:var(--mint)">${done} / ${all.length} (${pctVal}%)</span>
      </div>
    </div>
    <div style="display:flex;gap:7px">
      <button class="btn-s" onclick="resetAllFilters()" title="필터 초기화">
        <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M3 3h10l-1 9H4L3 3Z"/><line x1="1" y1="3" x2="15" y2="3"/><line x1="6" y1="7" x2="6" y2="11"/><line x1="10" y1="7" x2="10" y2="11"/></svg>
        초기화
      </button>
      <button class="btn-s" onclick="resetTodayRt()">오늘 리셋</button>
      <button class="btn-p" onclick="openRtModal()">+ 항목 추가</button>
    </div>
  </div>
  ${[{key:'weekly',label:'주간 점검'},{key:'monthly',label:'월간 점검'}].map(sec=>{
    const items=routines[sec.key]||[];
    const dc=items.filter(r=>getRtRun(r.id,todayKey)?.status==='done').length;
    const allDone=dc===items.length&&items.length>0;
    return`<div class="rt-sec">
      <div class="rt-sec-hd">
        <span class="rt-sec-lbl">${sec.label}</span>
        <span class="rt-sec-cnt${allDone?' all':''}">${dc}/${items.length}</span>
        <div class="rt-sec-line"></div>
        <button class="btn-s" style="font-size:11px;height:26px;padding:0 10px" onclick="allDoneSection('${sec.key}')">전체 완료</button>
        <button style="height:26px;padding:0 9px;border:1px solid var(--gray-200);border-radius:var(--r-sm);background:transparent;font-size:11px;color:var(--gray-400);cursor:pointer" onclick="copyRt('${sec.key}')">복사</button>
      </div>
      <div class="rt-list">
        ${items.length?items.map(item=>{
          const run=getRtRun(item.id,todayKey);
          const isDone=run?.status==='done';
          const isSkip=run?.status==='skip';
          const krM=memberByName(item.kr), vnM=memberByName(item.vn);
          return`<div class="rt-item${isDone?' done':''}">
            <div class="rt-chk${isDone?' on':''}" onclick="toggleRtItem('${sec.key}','${item.id}')">
              ${isDone?`<svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="2,6 5,9 10,3"/></svg>`:''}
            </div>
            <div class="rt-item-body">
              <div class="rt-item-text">${esc(item.text)}</div>
              <div class="rt-item-meta">
                ${krM?`${avHtml(krM.name,'KR',14)}<span class="rt-who">${krM.name.split(' ')[0]}</span>`:''}
                ${vnM?`${avHtml(vnM.name,'VN',14)}<span class="rt-who">${vnM.name.split(' ')[0]}</span>`:''}
              </div>
            </div>
            <div class="rt-actions">
              ${isDone
                ?`<button class="rt-btn done-btn" onclick="unDoneRtItem('${sec.key}','${item.id}')">✓ 완료됨 · 취소</button>`
                :`<button class="rt-btn" onclick="completeRtItem('${sec.key}','${item.id}')">완료</button>
                  <button class="rt-btn${isSkip?' skip-done':''}" onclick="skipRtItem('${sec.key}','${item.id}')" title="미완료 처리">미완료</button>`
              }
              <button class="rt-del" onclick="delRtItem('${sec.key}','${item.id}')"><svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><line x1="2" y1="2" x2="10" y2="10"/><line x1="10" y1="2" x2="2" y2="10"/></svg></button>
            </div>
          </div>`;
        }).join(''):`<div style="padding:14px;text-align:center;color:var(--gray-400);font-size:13px">항목 없음</div>`}
      </div>
      ${items.length>0?`<div class="rt-hist">
        <div class="rt-hist-title">최근 기록</div>
        ${(()=>{const hist=[];for(let i=0;i<7;i++){const d=new Date(Date.now()-i*86400000).toISOString().split('T')[0];const dn=items.filter(r=>getRtRun(r.id,d)?.status==='done').length;const sk=items.filter(r=>getRtRun(r.id,d)?.status==='skip').length;if(dn>0||sk>0)hist.push({date:d,done:dn,skip:sk,total:items.length});}return hist.slice(0,4).map(h=>`<div class="rt-run"><span class="rt-run-date">${h.date}</span><span class="${h.done===h.total?'rt-run-ok':'rt-run-partial'}">${h.done}/${h.total} 완료${h.skip>0?' · '+h.skip+'건 미완료':''}</span></div>`).join('')||'<div style="color:var(--gray-400);font-size:12px">기록 없음</div>';})()}
      </div>`:''}
    </div>`;
  }).join('')}`;
  updateBadges();
}

function toggleRtItem(sec,id){const tk=today();const run=getRtRun(id,tk);setRtRun(id,tk,run?.status==='done'?'pending':'done');renderRt();}
function completeRtItem(sec,id){setRtRun(id,today(),'done');renderRt();toast('완료 처리됐습니다 ✓');}
function unDoneRtItem(sec,id){setRtRun(id,today(),'pending');renderRt();}
function skipRtItem(sec,id){setRtRun(id,today(),'skip');renderRt();}
function allDoneSection(sec){(routines[sec]||[]).forEach(r=>setRtRun(r.id,today(),'done'));renderRt();toast('전체 완료 ✓');}
function resetTodayRt(){if(!confirm('오늘 체크를 모두 초기화할까요?'))return;rt_runs=rt_runs.filter(x=>x.date!==today());saveRt();renderRt();}
function copyRt(sec){const lbl={weekly:'주간 점검',monthly:'월간 점검'}[sec];const text=lbl+'\n'+(routines[sec]||[]).map(r=>{const done=getRtRun(r.id,today())?.status==='done';return`${done?'[x]':'[ ]'} ${r.text}`;}).join('\n');navigator.clipboard?.writeText(text).then(()=>toast('복사됐습니다 ✓'));}
function delRtItem(sec,id){showConfirm('삭제할까요?',()=>{routines[sec]=(routines[sec]||[]).filter(r=>r.id!==id);saveRt();renderRt();});}
let rtModalFreq='weekly';
function setRtFreq(f,el){rtModalFreq=f;document.querySelectorAll('.freq-toggle .chip').forEach(b=>b.classList.remove('on'));el?.classList.add('on');}
function fillRtSelects(){
  const kr=document.getElementById('rt-kr'),vn=document.getElementById('rt-vn');
  if(kr)kr.innerHTML=`<option value="">미지정</option>`+KR().map(m=>`<option value="${m.name}">${m.name}</option>`).join('');
  if(vn)vn.innerHTML=`<option value="">미지정</option>`+VN().map(m=>`<option value="${m.name}">${m.name}</option>`).join('');
}
function openRtModal(){fillRtSelects();const el=document.getElementById('rt-name');if(el)el.value='';rtModalFreq='weekly';document.getElementById('rtf-weekly')?.classList.add('on');document.getElementById('rtf-monthly')?.classList.remove('on');document.getElementById('m-routine')?.classList.add('on');}
function saveRtItem(){
  const text=(document.getElementById('rt-name')||{}).value?.trim();if(!text){document.getElementById('rt-name')?.focus();return;}
  if(!routines[rtModalFreq])routines[rtModalFreq]=[];
  routines[rtModalFreq].push({id:'rt_'+Date.now(),text,kr:(document.getElementById('rt-kr')||{}).value||'',vn:(document.getElementById('rt-vn')||{}).value||''});
  saveRt();cm('m-routine');renderRt();toast('추가됐습니다 ✓');
}

// ══════════════════════════════════════════════════════════
// ADMIN
// ══════════════════════════════════════════════════════════
function memberCard(m){
  const mine=tickets.filter(t=>t.assignee===m.name);
  const done=mine.filter(t=>t.qa==='완료').length;
  const color=m.team==='VN'?'#0D9488':'#2563EB';
  const av=m.team==='KR'?m.name[0]:ini(m.name);
  return`<div class="mem-card">
    <div class="mem-av" style="background:${color}">${av}</div>
    <div class="mem-info">
      <div class="mem-name">${esc(m.name)}</div>
      <div class="mem-role">${m.role} · <span class="bdg ${m.team==='KR'?'tm-kr':'tm-vn'}" style="font-size:10px">${m.team}</span></div>
      <div class="mem-stats"><span class="mem-stat">📋 ${mine.length}건</span><span class="mem-stat">✅ ${done}건</span></div>
    </div>
    <div class="mem-btns">
      <button class="mem-btn" title="수정" onclick="event.stopPropagation();openEditMember('${m.id}')"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M11 2l3 3-9 9H2v-3L11 2Z"/></svg></button>
      <button class="mem-btn del" title="삭제" onclick="event.stopPropagation();deleteMember('${m.id}')"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><polyline points="3,4 13,4"/><path d="M6,4V3h4v1"/><path d="M5,4l.7,9h4.6L11,4"/></svg></button>
    </div>
  </div>`;
}
function requesterRow(r,i){
  const cnt=tickets.filter(t=>t.requester===r.name).length;
  return`<tr>
    <td style="color:var(--gray-400);font-size:11px">${i+1}</td>
    <td><span style="font-weight:500;color:var(--gray-800)">${esc(r.name)}</span></td>
    <td style="color:var(--gray-400)">${esc(r.dept||'—')}</td>
    <td style="font-size:12px">${cnt}건</td>
    <td><div style="display:flex;gap:4px">
      <button class="mem-btn" onclick="openEditRequester('${r.id}')"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M11 2l3 3-9 9H2v-3L11 2Z"/></svg></button>
      <button class="mem-btn del" onclick="deleteRequester('${r.id}')"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><polyline points="3,4 13,4"/><path d="M5,4l.7,9h4.6L11,4"/></svg></button>
    </div></td>
  </tr>`;
}
function renderAdmin(){
  const el=document.getElementById('admin-wrap'); if(!el) return;
  const krM=members.filter(m=>m.team==='KR'), vnM=members.filter(m=>m.team==='VN');
  el.innerHTML=`
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
    <div><div style="font-size:17px;font-weight:700;color:var(--gray-900)">인력 관리</div><div style="font-size:12px;color:var(--gray-400);margin-top:2px">담당자 및 요청자 등록·수정·삭제</div></div>
  </div>
  <div class="admin-sec-hd"><span class="admin-sec-lbl">🇰🇷 한국팀 (KR)</span><span class="bdg tm-kr">${krM.length}명</span><div class="admin-sec-div"></div><button class="btn-p" style="font-size:11px;height:28px;padding:0 11px" onclick="openAddMember('KR')">+ 추가</button></div>
  <div class="mem-grid" style="margin-bottom:20px">${krM.map(memberCard).join('')}<div class="add-mem-card" onclick="openAddMember('KR')"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><line x1="8" y1="2" x2="8" y2="14"/><line x1="2" y1="8" x2="14" y2="8"/></svg>추가</div></div>
  <div class="admin-sec-hd"><span class="admin-sec-lbl">🇻🇳 베트남팀 (VN)</span><span class="bdg tm-vn">${vnM.length}명</span><div class="admin-sec-div"></div><button class="btn-p" style="font-size:11px;height:28px;padding:0 11px" onclick="openAddMember('VN')">+ 추가</button></div>
  <div class="mem-grid" style="margin-bottom:24px">${vnM.map(memberCard).join('')}<div class="add-mem-card" onclick="openAddMember('VN')"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><line x1="8" y1="2" x2="8" y2="14"/><line x1="2" y1="8" x2="14" y2="8"/></svg>추가</div></div>
  <div class="admin-sec-hd"><span class="admin-sec-lbl">📋 요청자 목록</span><span class="bdg" style="background:var(--gray-100);color:var(--gray-500)">${requesters.length}명</span><div class="admin-sec-div"></div><button class="btn-p" style="font-size:11px;height:28px;padding:0 11px" onclick="openAddRequester()">+ 추가</button></div>
  <div class="tbl-wrap"><table><thead><tr><th>#</th><th>이름</th><th>소속</th><th>티켓</th><th>관리</th></tr></thead><tbody>
    ${requesters.map((r,i)=>requesterRow(r,i)).join('')}
    ${requesters.length===0?`<tr><td colspan="5" style="text-align:center;padding:28px;color:var(--gray-400)">등록된 요청자 없음</td></tr>`:''}
  </tbody></table></div>`;
}
const COLORS_LIST=['#2563EB','#0D9488','#7C3AED','#D97706','#DC2626','#0891B2','#059669','#9333EA','#EA580C'];
function buildColorPicker(sel){return COLORS_LIST.map(c=>`<div class="color-sw${c===sel?' on':''}" style="background:${c}" onclick="selectColor('${c}',this)"></div>`).join('');}
function selectColor(c,el){STATE.memColor=c;document.querySelectorAll('.color-sw').forEach(s=>s.classList.remove('on'));el.classList.add('on');}
function setMemTeam(t,el){STATE.memTeam=t;document.getElementById('mem-team-kr')?.classList.toggle('on',t==='KR');document.getElementById('mem-team-vn')?.classList.toggle('on',t==='VN');}
function openAddMember(team='KR'){
  STATE.editMemberId=null;STATE.memTeam=team;STATE.memColor=COLORS_LIST[0];
  const tt=document.getElementById('m-member-title');if(tt)tt.textContent='담당자 추가';
  const n=document.getElementById('mem-name');if(n)n.value='';
  const r=document.getElementById('mem-role');if(r)r.value='';
  const mc=document.getElementById('mem-colors');if(mc)mc.innerHTML=buildColorPicker(STATE.memColor);
  document.getElementById('mem-team-kr')?.classList.toggle('on',team==='KR');
  document.getElementById('mem-team-vn')?.classList.toggle('on',team==='VN');
  const md=document.getElementById('m-mem-del');if(md)md.innerHTML='';
  document.getElementById('m-member')?.classList.add('on');
}
function openEditMember(id){
  const m=members.find(m=>m.id===id);if(!m)return;
  STATE.editMemberId=id;STATE.memTeam=m.team;STATE.memColor=m.color||COLORS_LIST[0];
  const tt=document.getElementById('m-member-title');if(tt)tt.textContent='담당자 수정';
  const n=document.getElementById('mem-name');if(n)n.value=m.name;
  const r=document.getElementById('mem-role');if(r)r.value=m.role;
  const mc=document.getElementById('mem-colors');if(mc)mc.innerHTML=buildColorPicker(STATE.memColor);
  document.getElementById('mem-team-kr')?.classList.toggle('on',m.team==='KR');
  document.getElementById('mem-team-vn')?.classList.toggle('on',m.team==='VN');
  const md=document.getElementById('m-mem-del');if(md)md.innerHTML=`<button class="btn-danger" onclick="event.stopPropagation();deleteMember('${id}');cm('m-member')">삭제</button>`;
  document.getElementById('m-member')?.classList.add('on');
}
function saveMember(){
  const name=(document.getElementById('mem-name')||{}).value?.trim();
  const role=(document.getElementById('mem-role')||{}).value;
  if(!name){toast('이름을 입력하세요',false);return;}
  if(!role){toast('역할을 선택하세요',false);return;}
  if(STATE.editMemberId){
    const i=members.findIndex(m=>m.id===STATE.editMemberId);
    if(i>-1)members[i]={...members[i],name,role,team:STATE.memTeam,color:STATE.memColor};
    toast('수정됐습니다 ✓');
  }else{
    members.push({id:'m_'+Date.now(),name,role,team:STATE.memTeam,color:STATE.memColor});
    toast('담당자가 추가됐습니다 ✓');
  }
  saveMembers();cm('m-member');renderAdmin();updateBadges();
}
function deleteMember(id){
  const m=members.find(x=>x.id===id);if(!m)return;
  showConfirm(`"${m.name}" 담당자를 삭제할까요?`,()=>{
    members=members.filter(x=>x.id!==id);saveMembers();renderAdmin();updateBadges();toast('삭제됐습니다');
  });
}
function openAddRequester(){
  STATE.editRequesterId=null;
  const tt=document.getElementById('m-req-title');if(tt)tt.textContent='요청자 추가';
  const n=document.getElementById('req-name');if(n)n.value='';
  const d=document.getElementById('req-dept');if(d)d.value='';
  const rd=document.getElementById('m-req-del');if(rd)rd.innerHTML='';
  document.getElementById('m-requester')?.classList.add('on');
}
function openEditRequester(id){
  const r=requesters.find(r=>r.id===id);if(!r)return;
  STATE.editRequesterId=id;
  const tt=document.getElementById('m-req-title');if(tt)tt.textContent='요청자 수정';
  const n=document.getElementById('req-name');if(n)n.value=r.name;
  const d=document.getElementById('req-dept');if(d)d.value=r.dept||'';
  const rd=document.getElementById('m-req-del');if(rd)rd.innerHTML=`<button class="btn-danger" onclick="deleteRequester('${id}');cm('m-requester')">삭제</button>`;
  document.getElementById('m-requester')?.classList.add('on');
}
function saveRequester(){
  const name=(document.getElementById('req-name')||{}).value?.trim();if(!name){return;}
  const dept=(document.getElementById('req-dept')||{}).value?.trim();
  if(STATE.editRequesterId){const i=requesters.findIndex(r=>r.id===STATE.editRequesterId);if(i>-1)requesters[i]={...requesters[i],name,dept};toast('수정됐습니다 ✓');}
  else{requesters.push({id:'r_'+Date.now(),name,dept});toast('요청자가 추가됐습니다 ✓');}
  saveRequesters();cm('m-requester');renderAdmin();
}
function deleteRequester(id){
  const r=requesters.find(x=>x.id===id);if(!r)return;
  showConfirm(`"${r.name}" 요청자를 삭제할까요?`,()=>{
    requesters=requesters.filter(x=>x.id!==id);saveRequesters();renderAdmin();toast('삭제됐습니다');
  });
}

// ══════════════════════════════════════════════════════════
// CONFIRM DIALOG
// ══════════════════════════════════════════════════════════
function showConfirm(msg,onOk){
  const dlg=document.getElementById('confirm-dialog');
  const msgEl=document.getElementById('confirm-msg');
  const okBtn=document.getElementById('confirm-ok-btn');
  if(!dlg||!msgEl||!okBtn)return;
  msgEl.textContent=msg;
  dlg.style.display='flex';
  okBtn.onclick=function(e){e.stopPropagation();closeConfirmDialog();onOk();};
}
function closeConfirmDialog(){const d=document.getElementById('confirm-dialog');if(d)d.style.display='none';}

// ══════════════════════════════════════════════════════════
// ROLE SWITCH
// ══════════════════════════════════════════════════════════
function switchRole(role){
  STATE.currentRole = role;
  localStorage.setItem('opsbiz_role', role);
  updateRoleUI();
  // 현재 페이지 re-render
  if(STATE.curPane==='dash')      renderDash();
  if(STATE.curPane==='analytics') renderAnalytics();
  toast(`역할 변경: ${ROLES[role]?.label}`);
}

// ══════════════════════════════════════════════════════════
// 저장된 역할 복원
const savedRole = localStorage.getItem('opsbiz_role') || 'admin';
STATE.currentRole = savedRole;
const roleSelectEl = document.getElementById('role-select');
if(roleSelectEl) roleSelectEl.value = savedRole;
updateBadges();
updateRoleUI();
renderDash();

</script>
