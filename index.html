<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>OPSbiz</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
<style>
/* ── TOKENS ─────────────────────────────────────── */
:root{
  --bg:#F0F4F8;
  --white:#FFFFFF;
  --sb1:#1E2A3B;         /* icon sidebar dark */
  --sb2:#FFFFFF;         /* text sidebar white */
  --top:#FFFFFF;
  --blue:#1D6FD8;
  --blue-l:#EBF3FF;
  --blue-m:#B8D4F9;
  --mint:#00BFA6;
  --mint-l:#E6FAF7;
  --red:#E53935;
  --red-l:#FFECEC;
  --amber:#F59E0B;
  --amber-l:#FFF8E7;
  --green:#2E7D32;
  --green-l:#E8F5E9;
  --gray-50:#F9FAFB;
  --gray-100:#F3F4F6;
  --gray-200:#E8ECF0;
  --gray-300:#D1D5DB;
  --gray-400:#9CA3AF;
  --gray-500:#6B7280;
  --gray-600:#4B5563;
  --gray-700:#374151;
  --gray-800:#1F2937;
  --gray-900:#111827;
  --font:'Pretendard',-apple-system,'Apple SD Gothic Neo',sans-serif;
  --mono:'Space Mono',monospace;
  --r:8px;
  --r-lg:12px;
  --r-xl:16px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--gray-800);font-size:13px;line-height:1.5;-webkit-font-smoothing:antialiased}
button,input,select,textarea{font-family:var(--font);font-size:13px}
button{cursor:pointer;border:none;background:none}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--gray-200);border-radius:99px}

/* ── APP SHELL ──────────────────────────────────── */
.app{display:flex;height:100vh;overflow:hidden}

/* ── ICON SIDEBAR (left thin bar) ──────────────── */
.sb1{
  width:56px;flex-shrink:0;
  background:var(--sb1);
  display:flex;flex-direction:column;
  align-items:center;
  padding:16px 0;
  gap:4px;
  z-index:20;
}
.sb1-logo{
  width:32px;height:32px;
  background:var(--blue);
  border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  margin-bottom:16px;
}
.sb1-logo svg{width:16px;height:16px}
.sb1-icon{
  width:36px;height:36px;
  border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  color:rgba(255,255,255,.45);
  transition:all .15s;
  position:relative;
}
.sb1-icon svg{width:17px;height:17px}
.sb1-icon:hover{background:rgba(255,255,255,.1);color:rgba(255,255,255,.9)}
.sb1-icon.on{background:var(--blue);color:#fff}
.sb1-icon .dot{
  position:absolute;top:6px;right:6px;
  width:7px;height:7px;border-radius:50%;
  background:var(--red);
  border:1.5px solid var(--sb1);
}
.sb1-sep{width:24px;height:1px;background:rgba(255,255,255,.1);margin:6px 0}
.sb1-bottom{margin-top:auto;display:flex;flex-direction:column;align-items:center;gap:4px}

/* ── TEXT SIDEBAR ───────────────────────────────── */
.sb2{
  width:196px;flex-shrink:0;
  background:var(--sb2);
  border-right:1px solid var(--gray-200);
  display:flex;flex-direction:column;
  overflow:hidden;
  z-index:10;
}
.sb2-head{
  padding:14px 16px 10px;
  border-bottom:1px solid var(--gray-100);
}
.sb2-title{font-size:12px;font-weight:600;color:var(--gray-400);letter-spacing:.06em;text-transform:uppercase}
.sb2-nav{flex:1;overflow-y:auto;padding:8px}
.sn{
  display:flex;align-items:center;gap:9px;
  height:36px;padding:0 10px;
  border-radius:var(--r);
  font-size:13px;font-weight:400;
  color:var(--gray-600);
  width:100%;text-align:left;
  transition:all .12s;
  position:relative;
}
.sn svg{width:15px;height:15px;flex-shrink:0;color:var(--gray-400)}
.sn:hover{background:var(--gray-50);color:var(--gray-900)}
.sn:hover svg{color:var(--gray-600)}
.sn.on{background:var(--blue-l);color:var(--blue);font-weight:500}
.sn.on svg{color:var(--blue)}
.sn .nb{
  margin-left:auto;
  font-family:var(--mono);
  font-size:10px;font-weight:600;
  min-width:18px;height:18px;
  padding:0 5px;border-radius:99px;
  background:var(--gray-100);color:var(--gray-500);
  display:flex;align-items:center;justify-content:center;
}
.sn.on .nb{background:var(--blue-m);color:var(--blue)}
.nb-red{background:#fee2e2!important;color:var(--red)!important}
.sb2-footer{
  padding:12px 16px;
  border-top:1px solid var(--gray-100);
}
.sb2-team-row{display:flex;flex-wrap:wrap;gap:4px}
.team-pip{
  display:flex;align-items:center;gap:3px;
  padding:2px 7px 2px 3px;
  background:var(--gray-50);border:1px solid var(--gray-200);
  border-radius:99px;font-size:11px;color:var(--gray-600);
}
.tp-av{width:14px;height:14px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:5px;font-weight:800;color:#fff}

/* ── MAIN ───────────────────────────────────────── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}

/* ── TOPBAR ─────────────────────────────────────── */
.topbar{
  height:52px;
  background:var(--top);
  border-bottom:1px solid var(--gray-200);
  display:flex;align-items:center;
  padding:0 20px;gap:12px;
  flex-shrink:0;
  box-shadow:0 1px 3px rgba(0,0,0,.04);
}
.topbar-title{font-size:14px;font-weight:600;color:var(--gray-900)}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.btn-p{
  display:flex;align-items:center;gap:5px;
  height:32px;padding:0 14px;
  background:var(--blue);color:#fff;
  border-radius:var(--r);
  font-size:12px;font-weight:500;
  transition:background .14s;
}
.btn-p:hover{background:#1557BB}
.btn-p svg{width:12px;height:12px}
.btn-s{
  display:flex;align-items:center;gap:5px;
  height:32px;padding:0 12px;
  background:var(--white);color:var(--gray-600);
  border:1px solid var(--gray-200);border-radius:var(--r);
  font-size:12px;font-weight:400;
  transition:all .13s;
}
.btn-s:hover{border-color:var(--gray-300);color:var(--gray-900)}
.btn-s svg{width:12px;height:12px}
.topbar-search{position:relative}
.topbar-search svg{position:absolute;left:9px;top:50%;transform:translateY(-50%);width:13px;height:13px;color:var(--gray-400);pointer-events:none}
.topbar-search input{
  height:32px;width:200px;
  background:var(--gray-50);
  border:1px solid var(--gray-200);border-radius:var(--r);
  padding:0 10px 0 29px;
  font-size:12px;color:var(--gray-800);outline:none;
  transition:border-color .14s;
}
.topbar-search input:focus{border-color:var(--blue);background:#fff;box-shadow:0 0 0 3px var(--blue-l)}
.topbar-search input::placeholder{color:var(--gray-400)}

/* ── PANES ───────────────────────────────────────── */
.pane{display:none;flex:1;flex-direction:column;overflow:hidden;min-height:0}
.pane.on{display:flex;animation:fadeUp .18s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.scroll{flex:1;overflow-y:auto;padding:20px}

/* ── KPI STRIP ──────────────────────────────────── */
.kpi-strip{
  display:grid;grid-template-columns:repeat(4,1fr);
  gap:0;margin-bottom:20px;
  background:var(--white);border-radius:var(--r-xl);
  border:1px solid var(--gray-200);
  box-shadow:0 1px 4px rgba(0,0,0,.05);
  overflow:hidden;
}
.kpi-cell{
  padding:20px 24px;
  border-right:1px solid var(--gray-200);
  cursor:pointer;transition:background .13s;
}
.kpi-cell:last-child{border-right:none}
.kpi-cell:hover{background:var(--gray-50)}
.kpi-lbl{font-size:12px;font-weight:500;color:var(--gray-500);margin-bottom:8px}
.kpi-val{font-family:var(--mono);font-size:28px;font-weight:700;line-height:1;margin-bottom:6px;letter-spacing:-.02em;color:var(--gray-900)}
.kpi-val.blue{color:var(--blue)}
.kpi-val.mint{color:var(--mint)}
.kpi-val.red{color:var(--red)}
.kpi-val.amber{color:var(--amber)}
.kpi-sub{font-size:11px;color:var(--gray-400);display:flex;align-items:center;gap:5px}
.kpi-sub.up{color:var(--mint)}
.kpi-sub.dn{color:var(--red)}
.kpi-sub.warn{color:var(--red);font-weight:600}
.kpi-arrow{font-size:10px}

/* ── MAIN GRID ──────────────────────────────────── */
.mg2{display:grid;grid-template-columns:1fr 320px;gap:16px;margin-bottom:16px}
.mg3{display:grid;grid-template-columns:1fr 340px;gap:16px;margin-bottom:16px}

/* ── CARD ───────────────────────────────────────── */
.card{
  background:var(--white);border:1px solid var(--gray-200);
  border-radius:var(--r-xl);
  box-shadow:0 1px 4px rgba(0,0,0,.05);
}
.card-hd{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 20px;border-bottom:1px solid var(--gray-100);
}
.card-title{font-size:13px;font-weight:600;color:var(--gray-800)}
.card-sub{font-size:11px;color:var(--gray-400)}
.card-link{font-size:12px;color:var(--blue);font-weight:500}
.card-body{padding:16px 20px}

/* ── LINE CHART ─────────────────────────────────── */
.chart-container{position:relative;height:220px;padding:8px 0}
.chart-svg{width:100%;height:100%}

/* ── PRIORITY LIST ─────────────────────────────── */
.prio-item{
  display:flex;align-items:center;gap:12px;
  padding:11px 16px;
  border-bottom:1px solid var(--gray-100);
  cursor:pointer;transition:background .1s;
}
.prio-item:last-child{border:none}
.prio-item:hover{background:var(--gray-50)}
.prio-num{
  font-size:11px;font-weight:600;color:var(--gray-400);
  width:16px;flex-shrink:0;
}
.prio-av{
  width:36px;height:36px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:700;color:#fff;flex-shrink:0;
}
.prio-info{flex:1;min-width:0}
.prio-name{font-size:13px;font-weight:500;color:var(--gray-800);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.prio-meta{font-size:11px;color:var(--gray-400);margin-top:2px}
.prio-dday{
  font-size:12px;font-weight:700;flex-shrink:0;
}
.d-urgent{color:var(--red)}
.d-warn{color:var(--amber)}
.d-normal{color:var(--gray-400)}

/* ── TABLE ──────────────────────────────────────── */
.tbl-wrap{background:var(--white);border:1px solid var(--gray-200);border-radius:var(--r-xl);box-shadow:0 1px 4px rgba(0,0,0,.05);overflow:hidden}
table{width:100%;border-collapse:collapse}
thead tr{background:var(--gray-50)}
th{font-size:11px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--gray-400);padding:10px 16px;text-align:left;border-bottom:1px solid var(--gray-200);white-space:nowrap}
td{padding:12px 16px;font-size:13px;color:var(--gray-600);border-bottom:1px solid var(--gray-100);vertical-align:middle}
tbody tr:last-child td{border:none}
tbody tr{transition:background .1s;cursor:pointer}
tbody tr:hover{background:var(--gray-50)}
.td-s{font-weight:500;color:var(--gray-800)}
.td-m{font-family:var(--mono);font-size:12px;color:var(--gray-700)}
.td-d{color:var(--gray-400);font-size:11px}
.prog-bar{width:100px;height:5px;background:var(--gray-100);border-radius:99px;overflow:hidden}
.prog-fill{height:100%;border-radius:99px;background:var(--blue);transition:width .5s}

/* ── KR vs VN CARD ──────────────────────────────── */
.vs-card{background:var(--white);border:1px solid var(--gray-200);border-radius:var(--r-xl);box-shadow:0 1px 4px rgba(0,0,0,.05);overflow:hidden}
.vs-head{
  display:grid;grid-template-columns:1fr 64px 1fr;
  background:var(--gray-50);border-bottom:1px solid var(--gray-200);
}
.vs-team{padding:12px 14px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}
.vs-team-name{font-size:13px;font-weight:700;margin-top:4px}
.vs-team-sub{font-size:10px;color:var(--gray-400);margin-top:2px}
.vs-mid{display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--gray-400);font-family:var(--mono);border-left:1px solid var(--gray-200);border-right:1px solid var(--gray-200)}
.vs-row{display:grid;grid-template-columns:1fr 64px 1fr;border-bottom:1px solid var(--gray-100)}
.vs-row:last-child{border:none}
.vs-val{padding:10px 14px;font-size:13px;font-weight:600;color:var(--gray-800);display:flex;align-items:center;justify-content:center}
.vs-metric{padding:10px 4px;font-size:10px;color:var(--gray-400);background:var(--gray-50);border-left:1px solid var(--gray-100);border-right:1px solid var(--gray-100);display:flex;align-items:center;justify-content:center;text-align:center;line-height:1.3}
.vs-win-kr{color:var(--blue);font-weight:700}
.vs-win-vn{color:var(--mint);font-weight:700}
/* mini sparkline inside vs card */
.vs-spark{display:flex;align-items:flex-end;gap:3px;height:36px;padding:0 4px}
.vs-spark-b{border-radius:2px 2px 0 0;min-width:5px;flex:1}

/* ── TICKET LIST LAYOUT ──────────────────────────── */
.tk-layout{display:flex;flex:1;overflow:hidden;min-height:0}
.tk-list-col{
  width:320px;flex-shrink:0;
  border-right:1px solid var(--gray-200);
  display:flex;flex-direction:column;
  background:var(--white);
}
.tk-hd{padding:14px 14px 10px;border-bottom:1px solid var(--gray-100);flex-shrink:0}
.tk-hd-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.tk-hd-title{font-size:13px;font-weight:600;color:var(--gray-900)}
.tk-cnt{font-family:var(--mono);font-size:10px;font-weight:600;padding:2px 8px;border-radius:99px;background:var(--blue-l);color:var(--blue)}
.tk-filters{display:flex;flex-direction:column;gap:7px}
.tk-search{position:relative}
.tk-search svg{position:absolute;left:9px;top:50%;transform:translateY(-50%);width:12px;height:12px;color:var(--gray-400);pointer-events:none}
.tk-search input{width:100%;height:32px;background:var(--gray-50);border:1px solid var(--gray-200);border-radius:var(--r);padding:0 9px 0 28px;font-size:12px;color:var(--gray-800);outline:none;transition:border-color .13s}
.tk-search input:focus{border-color:var(--blue);background:#fff}
.tk-search input::placeholder{color:var(--gray-400)}
.chips{display:flex;gap:4px;flex-wrap:wrap}
.chip{
  height:25px;padding:0 9px;border-radius:99px;
  border:1px solid var(--gray-200);background:transparent;
  font-size:11px;font-weight:400;color:var(--gray-500);
  transition:all .11s;white-space:nowrap;
}
.chip:hover{border-color:var(--gray-300);color:var(--gray-700)}
.chip.on{background:var(--blue-l);border-color:var(--blue-m);color:var(--blue);font-weight:500}
.tk-items{flex:1;overflow-y:auto;padding:8px}
.tki{
  padding:11px 12px;border-radius:var(--r);
  border:1px solid transparent;margin-bottom:4px;
  cursor:pointer;transition:all .11s;
  border-left:2px solid transparent;
}
.tki:hover{background:var(--gray-50)}
.tki.on{background:var(--blue-l);border-color:var(--blue-m);border-left-color:var(--blue)}
.tki.inc-item{border-left-color:var(--red)!important}
.tki-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px;gap:6px}
.tki-id{font-family:var(--mono);font-size:9px;color:var(--gray-400)}
.tki-title{font-size:13px;font-weight:500;color:var(--gray-800);line-height:1.4;margin-bottom:6px}
.tki-meta{display:flex;align-items:center;gap:5px;flex-wrap:wrap}

/* ── TICKET DETAIL ──────────────────────────────── */
.tk-detail{flex:1;overflow-y:auto;background:var(--bg);display:flex;flex-direction:column;min-width:0}
.tk-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--gray-400);font-size:13px;gap:10px}
.tk-empty svg{width:44px;height:44px;opacity:.18}
.td-inner{padding:24px;max-width:820px;width:100%}
.td-id-row{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.td-title{font-size:20px;font-weight:700;color:var(--gray-900);line-height:1.35;margin-bottom:12px;letter-spacing:-.01em}
.td-badges{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:18px}
.td-sec{background:var(--white);border:1px solid var(--gray-200);border-radius:var(--r-lg);padding:16px;margin-bottom:12px}
.td-sec-title{font-size:10px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--gray-400);margin-bottom:12px}
.td-g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.td-g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.td-field{display:flex;flex-direction:column;gap:4px}
.td-fl{font-size:10px;font-weight:600;color:var(--gray-400);text-transform:uppercase;letter-spacing:.04em}
.td-fv{font-size:13px;font-weight:500;color:var(--gray-800);display:flex;align-items:center;gap:6px}
.td-fv-mono{font-family:var(--mono);font-size:14px;font-weight:700}
.qa-steps{display:flex;gap:5px;flex-wrap:wrap}
.qa-step{padding:6px 12px;border-radius:var(--r);border:1px solid var(--gray-200);background:var(--white);font-size:12px;font-weight:500;color:var(--gray-500);cursor:pointer;transition:all .12s}
.qa-step:hover{border-color:var(--blue);color:var(--blue)}
.qa-step.on{border-color:var(--blue);background:var(--blue-l);color:var(--blue);font-weight:600}
.dur-box{display:flex;align-items:center;gap:14px;padding:12px 14px;background:var(--gray-50);border-radius:var(--r);border:1px solid var(--gray-200);margin-top:8px}
.dur-val{font-family:var(--mono);font-size:22px;font-weight:700}
.dur-lbl{font-size:10px;color:var(--gray-400);margin-top:2px}
.td-actions{display:flex;gap:8px;align-items:center;padding:14px 24px;border-top:1px solid var(--gray-200);background:var(--white);flex-shrink:0}
.btn-ghost{padding:7px 14px;border:1px solid var(--gray-200);border-radius:var(--r);background:transparent;color:var(--gray-600);font-size:12px;font-weight:500;transition:all .12s}
.btn-ghost:hover{border-color:var(--gray-300);color:var(--gray-900)}
.btn-danger{padding:7px 14px;border:1px solid #fecaca;border-radius:var(--r);background:var(--red-l);color:var(--red);font-size:12px;font-weight:600;transition:all .12s;margin-left:auto}
.btn-danger:hover{background:var(--red);color:#fff}
.btn-done{display:flex;align-items:center;gap:5px;padding:7px 14px;border:1px solid #bbf7d0;border-radius:var(--r);background:var(--green-l);color:var(--green);font-size:12px;font-weight:600;transition:all .12s}
.btn-done:hover{background:var(--green);color:#fff}
.btn-done svg{width:12px;height:12px}

/* ── BADGES ─────────────────────────────────────── */
.bdg{display:inline-flex;align-items:center;gap:3px;font-size:11px;font-weight:600;padding:2px 8px;border-radius:99px;white-space:nowrap}
.qa-open{background:#EBF3FF;color:var(--blue)}
.qa-progress{background:var(--blue-l);color:var(--blue)}
.qa-review{background:var(--amber-l);color:#B45309}
.qa-done{background:var(--green-l);color:var(--green)}
.qa-hold{background:var(--gray-100);color:var(--gray-500)}
.tp-routine{background:var(--mint-l);color:var(--mint)}
.tp-maint{background:var(--blue-l);color:var(--blue)}
.tp-enhance{background:#F5F3FF;color:#7C3AED}
.tp-bug{background:#FFFBEB;color:#B45309}
.tp-incident{background:var(--red-l);color:var(--red);font-weight:700}
.tm-kr{background:var(--blue-l);color:var(--blue)}
.tm-vn{background:var(--mint-l);color:var(--mint)}
.rc-REQ{background:var(--amber-l);color:#B45309}
.rc-DEV{background:var(--red-l);color:var(--red)}
.rc-QA{background:#F5F3FF;color:#7C3AED}
.rc-OPS{background:var(--mint-l);color:var(--mint)}
.rc-EXT{background:var(--gray-100);color:var(--gray-500)}

/* ── ANALYTICS ──────────────────────────────────── */
.an-tabs{display:flex;gap:2px;padding:0 20px;background:var(--white);border-bottom:1px solid var(--gray-200);flex-shrink:0}
.an-tab{height:44px;padding:0 14px;font-size:13px;font-weight:400;color:var(--gray-500);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;transition:all .12s;white-space:nowrap}
.an-tab:hover{color:var(--gray-800)}
.an-tab.on{color:var(--blue);font-weight:500;border-bottom-color:var(--blue)}

.kpi-row4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
.kpi-card-s{background:var(--white);border:1px solid var(--gray-200);border-radius:var(--r-lg);padding:14px 16px;position:relative;overflow:hidden;cursor:pointer;transition:box-shadow .14s;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.kpi-card-s:hover{box-shadow:0 4px 14px rgba(0,0,0,.08)}
.kpi-card-s::after{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.kpi-card-s.blue::after{background:var(--blue)}.kpi-card-s.mint::after{background:var(--mint)}.kpi-card-s.amber::after{background:var(--amber)}.kpi-card-s.red::after{background:var(--red)}
.ks-lbl{font-size:10px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--gray-400);margin-bottom:7px}
.ks-val{font-family:var(--mono);font-size:22px;font-weight:700;line-height:1;margin-bottom:4px}
.kpi-card-s.blue .ks-val{color:var(--blue)}.kpi-card-s.mint .ks-val{color:var(--mint)}.kpi-card-s.amber .ks-val{color:var(--amber)}.kpi-card-s.red .ks-val{color:var(--red)}
.ks-sub{font-size:11px;color:var(--gray-400)}

/* Hbar */
.hbar-row{display:flex;align-items:center;gap:10px;margin-bottom:9px}
.hbar-lbl{font-size:12px;color:var(--gray-600);min-width:100px;flex-shrink:0;font-weight:500;display:flex;align-items:center;gap:6px}
.hbar-track{flex:1;height:5px;background:var(--gray-100);border-radius:99px;overflow:hidden}
.hbar-fill{height:100%;border-radius:99px;transition:width .5s}
.hbar-val{font-family:var(--mono);font-size:11px;font-weight:600;color:var(--gray-600);width:38px;text-align:right;flex-shrink:0}

/* Spark */
.spark{display:flex;align-items:flex-end;gap:4px;height:72px}
.sc{display:flex;flex-direction:column;align-items:center;gap:3px;flex:1}
.sc-bars{display:flex;gap:2px;align-items:flex-end;height:54px;width:100%;justify-content:center}
.sc-b{border-radius:3px 3px 0 0;min-width:6px;flex:1;transition:opacity .15s}
.sc-b:hover{opacity:.72}
.sc-lbl{font-size:9px;color:var(--gray-400)}

/* Donut */
.ring-wrap{position:relative;display:inline-flex;align-items:center;justify-content:center}
.ring-center{position:absolute;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ring-val{font-family:var(--mono);font-weight:700;line-height:1;color:var(--gray-900)}
.ring-lbl{font-size:9px;color:var(--gray-400);margin-top:2px}

.grade{font-family:var(--mono);font-size:12px;font-weight:700;padding:3px 9px;border-radius:var(--r);display:inline-flex;align-items:center}
.gr-A{background:var(--green-l);color:var(--green)}.gr-B{background:var(--blue-l);color:var(--blue)}.gr-C{background:var(--amber-l);color:#B45309}.gr-D{background:var(--red-l);color:var(--red)}

/* ── ROUTINE ─────────────────────────────────────── */
.rt-prog-row{display:flex;align-items:center;gap:8px;margin-top:8px}
.rt-prog-bar{width:200px;height:5px;background:var(--gray-200);border-radius:99px;overflow:hidden}
.rt-prog-fill{height:100%;background:var(--mint);border-radius:99px;transition:width .4s}
.rt-sec{margin-bottom:20px}
.rt-sec-hd{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.rt-sec-lbl{font-size:12px;font-weight:600;color:var(--gray-700)}
.rt-sec-cnt{font-family:var(--mono);font-size:10px;font-weight:600;padding:2px 7px;border-radius:99px;background:var(--gray-100);color:var(--gray-500)}
.rt-sec-cnt.all{background:var(--green-l);color:var(--green)}
.rt-sec-line{flex:1;height:1px;background:var(--gray-200)}
.rt-list{background:var(--white);border:1px solid var(--gray-200);border-radius:var(--r-lg);overflow:hidden}
.rt-item{display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:1px solid var(--gray-100);transition:background .1s}
.rt-item:last-child{border:none}
.rt-item:hover{background:var(--gray-50)}
.rt-item.done .rt-item-text{text-decoration:line-through;color:var(--gray-400)}
.rt-chk{width:17px;height:17px;border-radius:4px;border:1.5px solid var(--gray-300);background:transparent;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:all .13s}
.rt-chk:hover{border-color:var(--mint)}
.rt-chk.on{background:var(--mint);border-color:var(--mint)}
.rt-chk svg{width:9px;height:9px;color:#fff}
.rt-item-body{flex:1;min-width:0}
.rt-item-text{font-size:13px;font-weight:500;color:var(--gray-800)}
.rt-item-meta{display:flex;align-items:center;gap:6px;margin-top:3px}
.rt-who{font-size:11px;color:var(--gray-400)}
.rt-actions{display:flex;align-items:center;gap:4px;flex-shrink:0}
.rt-act-btn{height:25px;padding:0 9px;border-radius:99px;font-size:11px;font-weight:500;cursor:pointer;transition:all .11s;white-space:nowrap;border:1px solid var(--gray-200);background:transparent;color:var(--gray-500)}
.rt-act-btn:hover{border-color:var(--mint);color:var(--mint);background:var(--mint-l)}
.rt-act-btn.done-btn{border-color:#bbf7d0;background:var(--green-l);color:var(--green)}
.rt-act-btn.done-btn:hover{background:var(--green);color:#fff}
.rt-act-btn.skip-done{border-color:#fde68a;color:#B45309;background:var(--amber-l)}
.rt-del{width:24px;height:24px;border:none;border-radius:4px;background:transparent;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--gray-300);transition:all .11s}
.rt-del:hover{background:var(--red-l);color:var(--red)}
.rt-del svg{width:11px;height:11px}
.rt-hist{margin-top:14px}
.rt-hist-title{font-size:10px;font-weight:700;color:var(--gray-400);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
.rt-run{display:flex;align-items:center;justify-content:space-between;padding:6px 12px;background:var(--gray-50);border-radius:var(--r);margin-bottom:4px;font-size:12px}
.rt-run-date{font-family:var(--mono);color:var(--gray-400)}
.rt-run-ok{color:var(--green);font-weight:500}
.rt-run-partial{color:#B45309}

/* ── ADMIN ──────────────────────────────────────── */
.admin-sec-hd{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.admin-sec-lbl{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--gray-400)}
.admin-sec-div{flex:1;height:1px;background:var(--gray-200)}
.mem-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:24px}
.mem-card{background:var(--white);border:1px solid var(--gray-200);border-radius:var(--r-lg);padding:14px;display:flex;align-items:center;gap:12px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.mem-card:hover{box-shadow:0 2px 8px rgba(0,0,0,.07)}
.mem-av{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:#fff;flex-shrink:0}
.mem-info{flex:1;min-width:0}
.mem-name{font-size:13px;font-weight:600;color:var(--gray-900)}
.mem-role{font-size:11px;color:var(--gray-400);margin-top:2px}
.mem-stat-row{display:flex;gap:8px;margin-top:5px}
.mem-stat{font-size:11px;color:var(--gray-400)}
.mem-btns{display:flex;gap:4px;flex-shrink:0}
.mem-btn{width:27px;height:27px;border:1px solid var(--gray-200);border-radius:var(--r);background:transparent;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--gray-400);transition:all .11s}
.mem-btn:hover{background:var(--gray-50);color:var(--gray-700);border-color:var(--gray-300)}
.mem-btn.del:hover{background:var(--red-l);color:var(--red);border-color:#fecaca}
.mem-btn svg{width:12px;height:12px}
.add-mem-card{background:transparent;border:1px dashed var(--gray-300);border-radius:var(--r-lg);padding:14px;display:flex;align-items:center;justify-content:center;gap:8px;cursor:pointer;color:var(--gray-400);font-size:13px;transition:all .14s}
.add-mem-card:hover{border-color:var(--blue);color:var(--blue);background:var(--blue-l)}
.add-mem-card svg{width:15px;height:15px}

/* incident banner */
.inc-banner{background:var(--red-l);border:1px solid #fecaca;border-radius:var(--r-lg);padding:8px 16px;margin-bottom:12px;display:flex;align-items:center;gap:14px;cursor:pointer;animation:inc-pulse 2.5s ease-in-out infinite}
@keyframes inc-pulse{0%,100%{box-shadow:0 0 0 0 rgba(229,57,53,0)}50%{box-shadow:0 0 0 4px rgba(229,57,53,.12)}}
.inc-dot{width:7px;height:7px;border-radius:50%;background:var(--red);flex-shrink:0;animation:blink 1s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.inc-text{flex:1}
.inc-title{font-size:12px;font-weight:600;color:#9B1C1C;margin-bottom:1px}
.inc-sub{font-size:11px;color:#B91C1C;display:none}
.inc-count{font-family:var(--mono);font-size:18px;font-weight:700;color:var(--red);flex-shrink:0}

/* ── MODAL ──────────────────────────────────────── */
.mbg{position:fixed;inset:0;background:rgba(0,0,0,.3);backdrop-filter:blur(4px);z-index:500;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .17s}
.mbg.on{opacity:1;pointer-events:all}
.mbox{background:var(--white);border:1px solid var(--gray-200);border-radius:var(--r-xl);width:580px;max-width:96vw;max-height:92vh;overflow-y:auto;padding:24px;box-shadow:0 16px 60px rgba(0,0,0,.14);transform:scale(.99) translateY(8px);transition:transform .2s}
.mbg.on .mbox{transform:scale(1) translateY(0)}
.mbox-sm{width:440px}
.mhd{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.mtitle{font-size:16px;font-weight:700;color:var(--gray-900);letter-spacing:-.01em}
.mclose{width:28px;height:28px;border-radius:var(--r);border:1px solid var(--gray-200);background:transparent;display:flex;align-items:center;justify-content:center;color:var(--gray-400);transition:all .12s}
.mclose:hover{background:var(--gray-50);color:var(--gray-700)}
.mclose svg{width:12px;height:12px}
.fstack{display:flex;flex-direction:column;gap:12px}
.f2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.f3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.fg{display:flex;flex-direction:column;gap:5px}
.fl{font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--gray-400)}
.fl-req::after{content:' *';color:var(--red)}
.fi,.fs,.fta{background:var(--gray-50);border:1px solid var(--gray-200);border-radius:var(--r);padding:8px 11px;font-size:13px;color:var(--gray-800);outline:none;transition:border-color .13s;width:100%}
.fi:focus,.fs:focus,.fta:focus{border-color:var(--blue);background:#fff;box-shadow:0 0 0 3px var(--blue-l)}
.fi::placeholder,.fta::placeholder{color:var(--gray-400)}
.fta{resize:vertical;min-height:68px}
.fs{appearance:none;cursor:pointer}
.fi-ro{background:var(--gray-100);color:var(--gray-400)}
.sec-box{background:var(--gray-50);border:1px solid var(--gray-200);border-radius:var(--r-lg);padding:13px}
.sec-box-lbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--gray-400);margin-bottom:10px}
.mft{margin-top:20px;display:flex;justify-content:space-between;align-items:center;padding-top:16px;border-top:1px solid var(--gray-100)}
.mft-r{display:flex;gap:8px}
.color-row{display:flex;gap:6px;flex-wrap:wrap}
.color-sw{width:26px;height:26px;border-radius:6px;cursor:pointer;border:2px solid transparent;transition:all .12s}
.color-sw.on{border-color:var(--gray-800);transform:scale(1.12)}
.team-toggle{display:flex;gap:6px}
.freq-toggle{display:flex;gap:6px}

/* ── TOAST ──────────────────────────────────────── */
.toast{position:fixed;bottom:20px;right:20px;z-index:600;background:var(--gray-900);color:#fff;border-radius:var(--r-lg);padding:11px 16px;display:flex;align-items:center;gap:8px;box-shadow:0 8px 32px rgba(0,0,0,.2);font-size:13px;transform:translateY(10px);opacity:0;transition:all .2s;pointer-events:none}
.toast.on{opacity:1;transform:translateY(0)}
.toast svg{width:14px;height:14px;color:#4ade80;flex-shrink:0}

/* ── CONFIRM ─────────────────────────────────────── */
#confirm-dialog{position:fixed;inset:0;background:rgba(0,0,0,.25);backdrop-filter:blur(4px);z-index:700;align-items:center;justify-content:center}
.confirm-box{background:var(--white);border:1px solid var(--gray-200);border-radius:var(--r-xl);padding:24px;width:320px;max-width:92vw;box-shadow:0 16px 60px rgba(0,0,0,.14)}
.confirm-title{font-size:14px;font-weight:700;color:var(--gray-900);margin-bottom:6px}
#confirm-msg{font-size:13px;color:var(--gray-500);line-height:1.6;margin-bottom:20px}
.confirm-btns{display:flex;justify-content:flex-end;gap:8px}

/* scrollbar */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--gray-200);border-radius:99px}
::-webkit-scrollbar-thumb:hover{background:var(--gray-300)}

@media(max-width:960px){.kpi-strip{grid-template-columns:repeat(2,1fr)}.mg2,.mg3{grid-template-columns:1fr}}
</style>
</head>

  </div>
</div>

<!-- ── MAIN ──────────────────────────────────────── -->
<div class="main">
  <div class="topbar">
    <span class="topbar-title" id="tb-title">대시보드</span>
    <div class="topbar-right">
      <div class="topbar-search">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="6.5" cy="6.5" r="4.5"/><line x1="10" y1="10" x2="14" y2="14"/></svg>

<script>

// ═══════════════════════════════════════════════════════
// SCHEMA & CONSTANTS
// ═══════════════════════════════════════════════════════
const SCHEMA = "v5";
if(localStorage.getItem("opsbiz_schema") !== SCHEMA){
  ['opsbiz_mvp','opsbiz_rt_mvp','opsbiz_members','opsbiz_requesters','opsbiz_rt_runs'].forEach(k=>localStorage.removeItem(k));
  localStorage.setItem("opsbiz_schema", SCHEMA);
}

const TYPE = {
  routine: {label:"루틴",      cls:"tp-routine",  dot:"#06B6D4", icon:"🔄"},
  maint:   {label:"유지보수",   cls:"tp-maint",    dot:"#3B82F6", icon:"🛠"},
  enhance: {label:"수정요청",   cls:"tp-enhance",  dot:"#8B5CF6", icon:"✨"},
  bug:     {label:"버그",       cls:"tp-bug",       dot:"#F59E0B", icon:"🐛"},
  incident:{label:"장애",       cls:"tp-incident",  dot:"#EF4444", icon:"🚨"},
};
const QA = {"신규":{cls:"qa-open",label:"신규"},"진행":{cls:"qa-progress",label:"진행"},"검수":{cls:"qa-review",label:"검수"},"완료":{cls:"qa-done",label:"완료"},"보류":{cls:"qa-hold",label:"보류"}};
const SLA = {P1:60,P2:240,P3:1440,P4:2880};
const RC  = {REQ:"요청 오류",DEV:"개발 오류",QA:"검수 누락",OPS:"운영 실수",EXT:"외부 요인"};
const COLORS = ["#6366F1","#EC4899","#F97316","#2563EB","#10B981","#06B6D4","#8B5CF6","#F59E0B","#EF4444","#14B8A6","#84CC16","#F43F5E"];

// ═══════════════════════════════════════════════════════
// DATA - Members & Requesters (동적)
// ═══════════════════════════════════════════════════════
function defaultMembers(){
  return[
    {id:"u1",name:"이수진",  role:"기획",   team:"KR",color:"#6366F1"},
    {id:"u2",name:"김민지",  role:"디자인", team:"KR",color:"#EC4899"},
    {id:"u3",name:"박소연",  role:"디자인", team:"KR",color:"#F97316"},
    {id:"u4",name:"최성호",  role:"개발",   team:"KR",color:"#2563EB"},
    {id:"u5",name:"Nguyen Van A",role:"핸들링",team:"VN",color:"#10B981"},
    {id:"u6",name:"Tran Thi B",  role:"개발",  team:"VN",color:"#06B6D4"},
    {id:"u7",name:"Le Van C",    role:"개발",  team:"VN",color:"#8B5CF6"},
  ];
}
function defaultRequesters(){
  return[
    {id:"r1",name:"이수진",dept:"기획팀"},
    {id:"r2",name:"김민지",dept:"디자인팀"},
    {id:"r3",name:"박소연",dept:"디자인팀"},
    {id:"r4",name:"최성호",dept:"개발팀"},
    {id:"r5",name:"마케팅팀",dept:"마케팅"},
    {id:"r6",name:"CS팀",dept:"고객지원"},
  ];
}

let members    = JSON.parse(localStorage.getItem("opsbiz_members")||"null") || defaultMembers();
let requesters = JSON.parse(localStorage.getItem("opsbiz_requesters")||"null") || defaultRequesters();

function KR(){ return members.filter(m=>m.team==="KR"); }
function VN(){ return members.filter(m=>m.team==="VN"); }
function ALL(){ return members; }
function memberByName(n){ return members.find(m=>m.name===n); }

// ═══════════════════════════════════════════════════════
// SAMPLE DATA
// ═══════════════════════════════════════════════════════
function genSample(){
  const titles={
    routine:["메인페이지 점검","배너 노출 확인","로그 오류 점검","API 상태 모니터링","DB 백업 확인","디자인 에셋 점검"],
    maint:  ["서버 로그 정리","캐시 초기화","의존성 업데이트","SSL 갱신 확인","DB 인덱스 최적화"],
    enhance:["메인 배너 문구 수정","버튼 컬러 변경","여백 조정","폰트 수정","아이콘 교체","링크 URL 업데이트","팝업 위치 수정","이미지 교체","CTA 개선"],
    bug:    ["로그인 500 에러","결제 버튼 무반응","모바일 이미지 깨짐","API 타임아웃","다크모드 오류"],
    incident:["결제 서비스 장애","로그인 API 중단","CDN 장애","배포 롤백","DB 커넥션 소진"],
  };
  const qaList=["신규","진행","진행","검수","완료","완료","완료"];
  const now=Date.now();
  const data=[];
  let idx=1;
  for(const tp of ["routine","maint","enhance","enhance","bug","incident"]){
    const n=tp==="incident"?4:tp==="routine"?5:7;
    for(let i=0;i<n&&idx<=35;i++){
      const team=Math.random()>.45?"KR":"VN";
      const pool=team==="KR"?KR():VN();
      const assignee=pool[Math.floor(Math.random()*pool.length)]?.name||"";
      const reqList=requesters;
      const requester=reqList[Math.floor(Math.random()*reqList.length)]?.name||"";
      const size=["small","small","medium","medium","large"][Math.floor(Math.random()*5)];
      const qa=tp==="incident"?"진행":qaList[Math.floor(Math.random()*qaList.length)];
      const daysAgo=Math.floor(Math.random()*28);
      const reqAt=new Date(now-daysAgo*86400000-Math.floor(Math.random()*8)*3600000).toISOString().slice(0,16);
      const startAt=new Date(new Date(reqAt).getTime()+(Math.floor(Math.random()*120)+10)*60000).toISOString().slice(0,16);
      const durBase={small:[20,90],medium:[60,300],large:[180,720]}[size];
      const dur=Math.floor(Math.random()*(durBase[1]-durBase[0]))+durBase[0];
      const endAt=qa==="완료"?new Date(new Date(startAt).getTime()+dur*60000).toISOString().slice(0,16):null;
      const dur_min=endAt?Math.round((new Date(endAt)-new Date(startAt))/60000):null;
      const rev=qa==="완료"||qa==="검수"?Math.floor(Math.random()*4):0;
      const result=qa==="완료"?["good","good","good","revise","fail"][Math.floor(Math.random()*5)]:null;
      const priority=tp==="incident"?"P1":["P1","P2","P2","P3","P3","P4"][Math.floor(Math.random()*6)];
      const has_error=Math.random()<.18;
      const root_cause=has_error?["REQ","DEV","QA","OPS","EXT"][Math.floor(Math.random()*5)]:null;
      data.push({
        id:`TK-${String(idx).padStart(3,"0")}`,
        title:titles[tp][Math.floor(Math.random()*titles[tp].length)],
        type:tp,size,priority,requester,team,assignee,
        req_at:reqAt,start_at:startAt,end_at:endAt,dur_min,
        qa,revisions:rev,result,
        has_error,root_cause,
        error_owner:has_error?assignee:null,
        is_incident:tp==="incident",
        severity:tp==="incident"?["P1","P2","P2","P3"][Math.floor(Math.random()*4)]:null,
        sla_met:dur_min?(dur_min<=SLA[priority]):null,
        desc:"",note:"",
        created_at:new Date(reqAt).toISOString(),
      });
      idx++;
    }
  }
  return data;
}

function ini(n){if(!n)return"?";const p=n.trim().split(/\s+/);return p.length>1?(p[0][0]+p[1][0]).toUpperCase():n.slice(0,2).toUpperCase();}
function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function fmtDt(s){if(!s)return"—";const d=new Date(s);return`${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`;}
function fmtDate(s){if(!s)return"—";const d=new Date(s);return`${d.getMonth()+1}/${d.getDate()}`;}
function durStr(m){if(!m&&m!==0)return"—";if(m<60)return m+"분";const h=Math.floor(m/60),mn=m%60;return mn?`${h}h ${mn}m`:`${h}h`;}
function calcDur(s,e){if(!s||!e)return null;const m=Math.round((new Date(e)-new Date(s))/60000);return m>0?m:null;}
function pct(a,b){return b?Math.round(a/b*100):0;}
function avg(arr){return arr.length?Math.round(arr.reduce((s,v)=>s+v,0)/arr.length):0;}
function today(){return new Date().toISOString().split("T")[0];}
function toast(msg,ok=true){const e=document.getElementById("toast");if(!e)return;const s=e.querySelector("svg");if(s)s.style.color=ok?"var(--green)":"var(--red)";document.getElementById("toast-msg").textContent=msg;e.classList.add("on");setTimeout(()=>e.classList.remove("on"),2500);}
function cm(id){document.getElementById(id).classList.remove("on");}
document.addEventListener("keydown",e=>{if(e.key==="Escape")["m-ticket","m-member","m-requester","m-routine"].forEach(cm);});

function avHtml(name,team,sz=20,radius="50%"){
  // 팀 컬러 고정: KR=블루, VN=민트

  return`<div class="av" style="background:${color};width:${sz}px;height:${sz}px;font-size:${Math.floor(sz*.38)}px;border-radius:${radius}">${initial}</div>`;
}

function changeQA(id,qa){
  const t=tickets.find(t=>t.id===id);if(!t)return;
  t.qa=qa;
  if(qa==="완료"&&!t.end_at){t.end_at=new Date().toISOString().slice(0,16);t.dur_min=calcDur(t.start_at,t.end_at);if(t.dur_min)t.sla_met=t.dur_min<=SLA[t.priority||"P3"];}
  if(qa==="진행"&&!t.start_at)t.start_at=new Date().toISOString().slice(0,16);
  save();renderList();renderDetail(id);updateBadges();toast(`QA → ${QA[qa]?.label||qa} ✓`);
}

function deleteTk(id){
  showConfirm("이 티켓을 삭제할까요?", ()=>{
    tickets=tickets.filter(t=>t.id!==id);selId=null;save();renderList();updateBadges();
    const tdEl=document.getElementById("tk-detail");
    if(tdEl) tdEl.innerHTML=`<div class="tk-empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"><rect x="2" y="4" width="20" height="16" rx="2"/></svg>삭제됐습니다</div>`;
    toast("삭제됐습니다");
  });
}

function saveTicket(){
  const title=document.getElementById("f-title").value.trim();
  if(!title){document.getElementById("f-title").focus();return;}
  const s=document.getElementById("f-start-at").value, e=document.getElementById("f-end-at").value;
  const dur_min=calcDur(s,e);
  const priority=document.getElementById("f-priority").value;
  const type=document.getElementById("f-type").value;
  const data={
    title,type,size:document.getElementById("f-size").value,priority,
    requester:document.getElementById("f-requester").value,
    team:document.getElementById("f-team").value,
    assignee:document.getElementById("f-assignee").value,
    req_at:document.getElementById("f-req-at").value,
    start_at:s||null,end_at:e||null,dur_min,
    qa:document.getElementById("f-qa").value,
    revisions:parseInt(document.getElementById("f-rev").value)||0,
    result:document.getElementById("f-result").value||null,
    has_error:document.getElementById("f-has-error").value==="true",
    root_cause:document.getElementById("f-root-cause").value||null,
    error_owner:document.getElementById("f-error-owner").value||null,
    is_incident:type==="incident",
    severity:type==="incident"?document.getElementById("f-severity").value:null,
    sla_met:dur_min?(dur_min<=SLA[priority]):null,
    desc:document.getElementById("f-desc").value.trim(),
    note:document.getElementById("f-note").value.trim(),
  };
  if(editTicketId){
    const i=tickets.findIndex(t=>t.id===editTicketId);
    if(i>-1)tickets[i]={...tickets[i],...data};
    selId=editTicketId;toast("수정됐습니다 ✓");
  }else{
    const nid=`TK-${String(tickets.length+1).padStart(3,"0")}`;
    tickets.unshift({id:nid,created_at:new Date().toISOString(),...data});
    selId=nid;toast("티켓이 생성됐습니다 ✓");
  }
  save();cm("m-ticket");renderList();updateBadges();if(selId)renderDetail(selId);
}

function renderDash(){
  const el=document.getElementById("dash-body");if(!el)return;
  const t=tickets, done=t.filter(x=>x.qa==="완료");
  const open=t.filter(x=>x.qa!=="완료"&&x.qa!=="보류");
  const inprog=t.filter(x=>x.qa==="진행");
  const wd=done.filter(x=>x.dur_min>0);
  const ws=done.filter(x=>x.sla_met!==null);
  const rated=t.filter(x=>x.result);
  const avgDur=avg(wd.map(x=>x.dur_min));
  const slaRate=pct(ws.filter(x=>x.sla_met).length,ws.length);
  const goodRate=pct(rated.filter(x=>x.result==="good").length,rated.length);
  const errRate=pct(t.filter(x=>x.has_error).length,t.length);
  const activeInc=t.filter(x=>x.is_incident&&x.qa!=="완료");
  const doneRate=pct(done.length,t.length);

  // KR vs VN
  function ts(team){
    const tt=t.filter(x=>x.team===team);const td=tt.filter(x=>x.qa==="완료");
    const tw=td.filter(x=>x.dur_min>0);const ts2=td.filter(x=>x.sla_met!==null);
    const rated2=td.filter(x=>x.result);
    return{total:tt.length,done:td.length,doneRate:pct(td.length,tt.length),
      avgDur:avg(tw.map(x=>x.dur_min)),slaRate:pct(ts2.filter(x=>x.sla_met).length,ts2.length),
      errRate:pct(tt.filter(x=>x.has_error).length,tt.length),
      avgRev:tt.length?Math.round(tt.reduce((s,x)=>s+x.revisions,0)/tt.length*10)/10:0,
      goodRate:pct(rated2.filter(x=>x.result==="good").length,rated2.length)};
  }
  const kr=ts("KR"),vn=ts("VN");

  // Monthly trend: 12개월 (타입별 라인)
  const monthData=Array.from({length:12},(_,i)=>{
    const d=new Date(); d.setMonth(d.getMonth()-11+i);
    const ds=d.toISOString().slice(0,7);
    return{
      lbl:(d.getMonth()+1)+"월",
      total:t.filter(x=>x.req_at?.startsWith(ds)).length,
      done:t.filter(x=>x.end_at?.startsWith(ds)).length,
    };
  });
  const maxM=Math.max(...monthData.map(d=>Math.max(d.total,d.done)),1);
  const W=100,H=100;
  function mkPoints(vals){
    return vals.map((v,i)=>`${(i/(vals.length-1)*W).toFixed(1)},${(H-v/maxM*H*.85-H*.05).toFixed(1)}`).join(" ");
  }
  const totalPts=mkPoints(monthData.map(d=>d.total));
  const donePts=mkPoints(monthData.map(d=>d.done));

  // Priority tasks (open, sorted by priority)
  const prioTickets=[...open].sort((a,b)=>{
    const p={P1:0,P2:1,P3:2,P4:3};return(p[a.priority]||3)-(p[b.priority]||3);
  }).slice(0,4);

  // Progress table (team assignee stats)

    return{...m,total:mine.length,done:mdone,doneRate:pct(mdone,mine.length),avgDur:avgD};
  }).filter(m=>m.total>0).sort((a,b)=>b.total-a.total);
  const maxT=Math.max(...assigneeRows.map(r=>r.total),1);

  // mini sparkline for vs card

          <div style="flex:1"><div class="vs-spark">${last4months.map(d=>`<div class="vs-spark-b" style="height:${d.vn/maxSp*32}px;background:var(--mint);opacity:.7"></div>`).join("")}</div><div style="font-size:10px;color:var(--mint);margin-top:3px;text-align:center">VN</div></div>

function renderAnalytics(){
  const fns={compare:buildCompare,quality:buildQuality,productivity:buildProductivity,members:buildMembers};
  const el=document.getElementById("an-body");if(!el)return;
  el.innerHTML=(fns[anTab]||buildCompare)();
}

function tStats(team){
  const t=tickets.filter(x=>x.team===team);const d=t.filter(x=>x.qa==="완료");const wd=d.filter(x=>x.dur_min>0);const ws=d.filter(x=>x.sla_met!==null);const rated=d.filter(x=>x.result);
  return{total:t.length,done:d.length,doneRate:pct(d.length,t.length),avgDur:avg(wd.map(x=>x.dur_min)),slaRate:pct(ws.filter(x=>x.sla_met).length,ws.length),errRate:pct(t.filter(x=>x.has_error).length,t.length),avgRev:t.length?Math.round(t.reduce((s,x)=>s+x.revisions,0)/t.length*10)/10:0,goodRate:pct(rated.filter(x=>x.result==="good").length,rated.length),incDone:t.filter(x=>x.is_incident&&x.qa==="완료").length};
}
function grade(s){const sc=s.doneRate*.35+Math.max(0,100-s.avgRev*20)*.35+(s.avgDur>0?Math.max(0,100-s.avgDur/3)*.3:0);return sc>=82?"A":sc>=65?"B":sc>=48?"C":"D";}
function kbox(lbl,val,sub,color,link=""){return`<div class="kbox" onclick="${link}" style="${link?"cursor:pointer":""}"><div class="kbox-bar" style="background:${color}"></div><div class="kbox-lbl">${lbl}</div><div class="kbox-val" style="color:${color}">${val}</div><div class="kbox-sub">${sub}</div></div>`;}

  const d7=Array.from({length:7},(_,i)=>{const d=new Date(Date.now()-(6-i)*86400000);const ds=d.toISOString().split("T")[0];return{lbl:["일","월","화","수","목","금","토"][d.getDay()],kr:tickets.filter(t=>t.team==="KR"&&t.end_at?.startsWith(ds)).length,vn:tickets.filter(t=>t.team==="VN"&&t.end_at?.startsWith(ds)).length};});

  <div style="margin-bottom:14px"><div class="vs-card">
    <div class="vs-hd"><div class="vs-team"><span style="font-size:18px">🇰🇷</span><div><div class="vs-name" style="color:var(--blue)">한국팀 (KR)</div><div class="vs-sub">기획·디자인·개발</div></div></div><div class="vs-divider">VS</div><div class="vs-team vs-team-r"><span style="font-size:18px">🇻🇳</span><div><div class="vs-name" style="color:var(--green)">베트남팀 (VN)</div><div class="vs-sub">핸들링·개발</div></div></div></div>
    ${cmp("총 담당",kr.total,vn.total,"건")}${cmp("완료율",kr.doneRate,vn.doneRate,"%")}${cmp("SLA 준수율",kr.slaRate,vn.slaRate,"%")}${cmp("평균 소요",durStr(kr.avgDur),durStr(vn.avgDur),"",false)}${cmp("실수율",kr.errRate,vn.errRate,"%",false)}${cmp("평균 수정",kr.avgRev+"회",vn.avgRev+"회","",false)}${cmp("Good율",kr.goodRate,vn.goodRate,"%")}
  </div></div>
  <div class="dg2">
    <div class="card"><div class="card-hd"><span class="card-title">일별 완료 비교</span><span class="card-sub">최근 7일</span></div><div class="card-body"><div class="spark">${d7.map(d=>`<div class="sc"><div class="sc-bars"><div class="sc-b" style="height:${d.kr/maxD*54}px;background:rgba(59,130,246,.6)" title="KR:${d.kr}"></div><div class="sc-b" style="height:${d.vn/maxD*54}px;background:rgba(16,185,129,.7)" title="VN:${d.vn}"></div></div><div class="sc-lbl">${d.lbl}</div></div>`).join("")}</div><div class="leg" style="margin-top:8px"><div class="leg-item"><div class="leg-dot" style="background:#3B82F6"></div>KR</div><div class="leg-item"><div class="leg-dot" style="background:#10B981"></div>VN</div></div></div></div>

      ${[{key:"KR",flag:"🇰🇷",color:"var(--blue)",bg:"rgba(59,130,246,.08)",s:kr},{key:"VN",flag:"🇻🇳",color:"var(--green)",bg:"rgba(16,185,129,.08)",s:vn}].map(tm=>`<div class="card" style="background:${tm.bg};border-color:${tm.color}30"><div class="card-hd"><div style="display:flex;align-items:center;gap:6px"><span style="font-size:16px">${tm.flag}</span><div><div style="font-size:13px;font-weight:800;color:${tm.color}">${tm.key}팀</div></div></div><span class="grade gr-${grade(tm.s)}">${grade(tm.s)}</span></div><div class="card-body">${[{l:"완료율",v:tm.s.doneRate+"%"},{l:"SLA",v:tm.s.slaRate+"%"},{l:"평균 소요",v:durStr(tm.s.avgDur)},{l:"실수율",v:tm.s.errRate+"%"},{l:"Good율",v:tm.s.goodRate+"%"}].map(f=>`<div style="display:flex;justify-content:space-between;font-size:12px;padding:5px 0;border-bottom:1px solid var(--gray-200)"><span style="color:var(--gray-400)">${f.l}</span><span style="font-weight:600;font-family:var(--mono);color:${tm.color}">${f.v}</span></div>`).join("")}</div></div>`).join("")}

function buildQuality(){
  const t=tickets,errors=t.filter(x=>x.has_error);
  const rated=t.filter(x=>x.result);
  const goodRate=pct(rated.filter(x=>x.result==="good").length,rated.length);
  const errRate=pct(errors.length,t.length);
  const avgRev=t.length?Math.round(t.reduce((s,x)=>s+x.revisions,0)/t.length*10)/10:0;
  const rcDist=["REQ","DEV","QA","OPS","EXT"].map(k=>({k,cnt:errors.filter(x=>x.root_cause===k).length})).filter(x=>x.cnt>0).sort((a,b)=>b.cnt-a.cnt);
  const maxRC=Math.max(...rcDist.map(x=>x.cnt),1);
  const revDist=[{l:"0회",n:0,c:"#10B981"},{l:"1회",n:1,c:"#F59E0B"},{l:"2회",n:2,c:"#EF4444"},{l:"3+",n:99,c:"#B91C1C"}];
  const maxRev=Math.max(...revDist.map(d=>d.n===99?t.filter(x=>x.revisions>=3).length:t.filter(x=>x.revisions===d.n).length),1);
  const ownerMap={};errors.forEach(x=>{const n=x.error_owner||x.assignee;if(!n)return;if(!ownerMap[n])ownerMap[n]={name:n,team:x.team,cnt:0};ownerMap[n].cnt++;});
  const owners=Object.values(ownerMap).sort((a,b)=>b.cnt-a.cnt).slice(0,6);
  const maxOwner=Math.max(...owners.map(o=>o.cnt),1);
  return`
  <div class="kpi-strip ks4">${kbox("전체 실수율",errRate+"%",`${errors.length}건 / 전체 ${t.length}건`,"#EF4444")}${kbox("평균 수정횟수",avgRev+"회","작업당 평균",avgRev>2?"#EF4444":avgRev>1?"#F59E0B":"#10B981")}${kbox("Good율",goodRate+"%",`${rated.length}건 평가 기준`,goodRate>=80?"#10B981":"#F59E0B")}${kbox("3회↑ 수정",t.filter(x=>x.revisions>=3).length+"건","품질 위험",t.filter(x=>x.revisions>=3).length>0?"#EF4444":"#10B981")}</div>
  <div class="dg2">
    <div class="card"><div class="card-hd"><span class="card-title">Root Cause 분포</span><span class="card-sub">실수 ${errors.length}건</span></div><div class="card-body">${rcDist.length?rcDist.map(d=>`<div class="hbar-row"><div class="hbar-lbl"><span class="bdg rc-${d.k}">${d.k}</span> <span style="font-size:11px;color:var(--gray-400)">${RC[d.k]||""}</span></div><div class="hbar-track"><div class="hbar-fill" style="width:${pct(d.cnt,maxRC)}%;background:var(--red)"></div></div><div class="hbar-val">${d.cnt}건</div></div>`).join(""):`<div style="color:var(--gray-400);font-size:13px;padding:12px 0">실수 없음 ✓</div>`}</div></div>
    <div class="card"><div class="card-hd"><span class="card-title">수정 횟수 분포</span></div><div class="card-body">
      <div class="spark">${revDist.map(d=>{const cnt=d.n===99?t.filter(x=>x.revisions>=3).length:t.filter(x=>x.revisions===d.n).length;return`<div class="sc"><div style="font-size:11px;font-weight:600;color:${d.c};margin-bottom:3px">${cnt}</div><div class="sc-bars"><div class="sc-b" style="height:${cnt/maxRev*54}px;background:${d.c};width:60%"></div></div><div class="sc-lbl">${d.l}</div></div>`;}).join("")}</div>
      <div style="margin-top:14px"><div style="font-size:11px;font-weight:700;color:var(--gray-400);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px">Error Owner 누적</div>${owners.map(o=>`<div class="hbar-row"><div class="hbar-lbl" style="display:flex;align-items:center;gap:5px">${avHtml(o.name,o.team,16)}<span style="font-size:12px">${o.name.split(" ")[0]}</span></div><div class="hbar-track"><div class="hbar-fill" style="width:${pct(o.cnt,maxOwner)}%;background:var(--red)"></div></div><div class="hbar-val">${o.cnt}건</div></div>`).join("")||`<div style="color:var(--gray-400);font-size:13px">실수 없음</div>`}</div>
    </div></div>
  </div>
  <div class="tbl-wrap"><table><thead><tr><th>티켓</th><th>제목</th><th>팀</th><th>Error Owner</th><th>Root Cause</th><th>수정</th></tr></thead><tbody>
    ${errors.slice(0,10).map(t=>`<tr onclick="selectTk('${t.id}');goPane('tickets')"><td style="font-family:var(--mono);font-size:11px;color:var(--gray-400)">${t.id}</td><td style="max-width:180px"><div style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500;color:var(--gray-900)">${esc(t.title)}</div></td><td><span class="bdg ${t.team==="KR"?"tm-kr":"tm-vn"}">${t.team}</span></td><td><div style="display:flex;align-items:center;gap:5px">${avHtml(t.error_owner||"",t.team,16)}<span>${esc(t.error_owner||"—")}</span></div></td><td>${t.root_cause?`<span class="bdg rc-${t.root_cause}">${t.root_cause}</span>`:"—"}</td><td style="font-family:var(--mono);font-weight:700;color:${t.revisions>2?"var(--red)":"var(--gray-600)"}">${t.revisions}회</td></tr>`).join("")}
    ${errors.length===0?`<tr><td colspan="6" style="text-align:center;padding:32px;color:var(--gray-400)">실수 이력 없음 ✓</td></tr>`:""}
  </tbody></table></div>`;
}

function buildProductivity(){
  const done=tickets.filter(t=>t.qa==="완료");const wd=done.filter(t=>t.dur_min>0);
  const avgDur=avg(wd.map(t=>t.dur_min));
  const ws=done.filter(t=>t.sla_met!==null);const slaRate=pct(ws.filter(t=>t.sla_met).length,ws.length);
  function tAvg(team){const td=wd.filter(t=>t.team===team);return avg(td.map(t=>t.dur_min));}
  const krAvg=tAvg("KR"),vnAvg=tAvg("VN");
  const dist=[{l:"30분↓",cnt:wd.filter(t=>t.dur_min<=30).length,c:"#10B981"},{l:"1시간",cnt:wd.filter(t=>t.dur_min>30&&t.dur_min<=60).length,c:"#06B6D4"},{l:"2시간",cnt:wd.filter(t=>t.dur_min>60&&t.dur_min<=120).length,c:"#3B82F6"},{l:"4시간",cnt:wd.filter(t=>t.dur_min>120&&t.dur_min<=240).length,c:"#F59E0B"},{l:"4h+",cnt:wd.filter(t=>t.dur_min>240).length,c:"#EF4444"}];
  const maxDist=Math.max(...dist.map(d=>d.cnt),1);
  const typeAvg=Object.keys(TYPE).map(k=>{const td=wd.filter(t=>t.type===k);return{k,label:TYPE[k].label,icon:TYPE[k].icon,avg:avg(td.map(t=>t.dur_min)),cnt:td.length};}).filter(d=>d.cnt>0).sort((a,b)=>b.avg-a.avg);
  const maxTA=Math.max(...typeAvg.map(d=>d.avg),1);
  const weeks=Array.from({length:8},(_,i)=>{const from=new Date(Date.now()-(7-i)*7*86400000);const to=new Date(from.getTime()+7*86400000);return{lbl:i===7?"이번":i===6?"지난":`${7-i}주전`,cnt:done.filter(t=>t.end_at&&new Date(t.end_at)>=from&&new Date(t.end_at)<to).length};});
  const maxW=Math.max(...weeks.map(w=>w.cnt),1);
  return`
  <div class="kpi-strip ks4">${kbox("SLA 준수율",slaRate+"%","목표 95%",slaRate>=95?"#10B981":"#EF4444")}${kbox("전체 평균",durStr(avgDur),`완료 ${wd.length}건`,"#8B5CF6")}${kbox("KR 평균",durStr(krAvg),`${wd.filter(t=>t.team==="KR").length}건`,"#3B82F6")}${kbox("VN 평균",durStr(vnAvg),`${wd.filter(t=>t.team==="VN").length}건`,"#10B981")}</div>
  <div class="dg2">
    <div class="card"><div class="card-hd"><span class="card-title">처리시간 분포</span></div><div class="card-body"><div class="spark">${dist.map(d=>`<div class="sc"><div style="font-size:11px;font-weight:600;color:${d.c};margin-bottom:3px">${d.cnt}</div><div class="sc-bars"><div class="sc-b" style="height:${d.cnt/maxDist*54}px;background:${d.c};width:60%"></div></div><div class="sc-lbl">${d.l}</div></div>`).join("")}</div></div></div>
    <div class="card"><div class="card-hd"><span class="card-title">유형별 평균 소요시간</span></div><div class="card-body">${typeAvg.map(d=>`<div class="hbar-row"><div class="hbar-lbl">${d.icon} ${d.label}</div><div class="hbar-track"><div class="hbar-fill" style="width:${pct(d.avg,maxTA)}%;background:${TYPE[d.k].dot}"></div></div><div class="hbar-val">${durStr(d.avg)}</div></div>`).join("")}</div></div>
  </div>
  <div class="dg2">
    <div class="card"><div class="card-hd"><span class="card-title">주간 완료 추이</span></div><div class="card-body"><div class="spark">${weeks.map(w=>`<div class="sc"><div class="sc-bars"><div class="sc-b" style="height:${w.cnt/maxW*54}px;background:var(--blue-m);width:60%"></div></div><div class="sc-lbl" style="font-size:9px">${w.lbl}</div></div>`).join("")}</div></div></div>
    <div class="card"><div class="card-hd"><span class="card-title">KR vs VN 처리속도</span></div><div class="card-body"><div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">${[{lbl:"KR팀",color:"var(--blue)",bg:"rgba(59,130,246,.08)",avg:krAvg,cnt:wd.filter(t=>t.team==="KR").length},{lbl:"VN팀",color:"var(--green)",bg:"rgba(16,185,129,.08)",avg:vnAvg,cnt:wd.filter(t=>t.team==="VN").length}].map(t=>`<div style="text-align:center;padding:14px;background:${t.bg};border-radius:var(--r)"><div style="font-size:12px;font-weight:700;color:${t.color};margin-bottom:6px">${t.lbl}</div><div style="font-family:var(--mono);font-size:24px;font-weight:700;color:${t.color}">${durStr(t.avg)}</div><div style="font-size:11px;color:var(--gray-400);margin-top:4px">${t.cnt}건 기준</div></div>`).join("")}</div></div></div>
  </div>`;
}

function buildMembers(){
  const rows=members.map(m=>{const mine=tickets.filter(t=>t.assignee===m.name);const d=mine.filter(t=>t.qa==="완료");const wd=d.filter(t=>t.dur_min>0);const avgDur=avg(wd.map(t=>t.dur_min));const avgRev=mine.length?Math.round(mine.reduce((s,t)=>s+t.revisions,0)/mine.length*10)/10:0;const doneRate=pct(d.length,mine.length);const g=grade({doneRate,avgRev,avgDur});return{...m,total:mine.length,done:d.length,doneRate,avgDur,avgRev,grade:g};}).filter(m=>m.total>0).sort((a,b)=>b.total-a.total);
  const maxT=Math.max(...rows.map(r=>r.total),1);
  return`
  <div class="tbl-wrap" style="margin-bottom:14px"><table><thead><tr><th>담당자</th><th>팀</th><th>역할</th><th>총 작업</th><th>완료</th><th>완료율</th><th>평균 소요</th><th>평균 수정</th><th>등급</th></tr></thead><tbody>
    ${rows.map(r=>`<tr><td><div style="display:flex;align-items:center;gap:8px">${avHtml(r.name,r.team,26,"8px")}<span style="font-size:13px;font-weight:600;color:var(--gray-900)">${r.name.split(" ")[0]}</span></div></td><td><span class="bdg ${r.team==="KR"?"tm-kr":"tm-vn"}">${r.team}</span></td><td style="color:var(--gray-400)">${r.role}</td><td><div style="font-weight:600">${r.total}건</div><div style="height:3px;background:var(--gray-50);border-radius:99px;overflow:hidden;margin-top:4px;width:60px"><div style="height:100%;background:${r.color};border-radius:99px;width:${pct(r.total,maxT)}%"></div></div></td><td style="font-weight:600;color:var(--green)">${r.done}건</td><td style="font-weight:700;color:${r.doneRate>=80?"var(--green)":r.doneRate>=60?"var(--amber)":"var(--red)"}">${r.doneRate}%</td><td style="font-family:var(--mono);font-weight:600">${durStr(r.avgDur)}</td><td style="font-weight:700;color:${r.avgRev>2?"var(--red)":r.avgRev>1?"var(--amber)":"var(--green)"}">${r.avgRev}회</td><td><span class="grade gr-${r.grade}">${r.grade}</span></td></tr>`).join("")}
    ${rows.length===0?`<tr><td colspan="9" style="text-align:center;padding:32px;color:var(--gray-400)">데이터 없음</td></tr>`:""}
  </tbody></table></div>`;
}

// ROUTINE - 체크리스트 + 완료/미완료 처리 + 기록 누적

function getRtRun(templateId,date){return rt_runs.find(x=>x.templateId===templateId&&x.date===date);}
function setRtRun(templateId,date,status,note=""){
  const existing=rt_runs.findIndex(x=>x.templateId===templateId&&x.date===date);
  const run={id:`run_${templateId}_${date}`,templateId,date,status,note,at:new Date().toISOString()};
  if(existing>=0)rt_runs[existing]=run;else rt_runs.push(run);
  saveRt();
}

function renderRt(){
  const el=document.getElementById("rt-wrap");if(!el)return;
  const todayKey=today();
  const allItems=[...(routines.weekly||[]),...(routines.monthly||[])];
  const doneToday=allItems.filter(r=>getRtRun(r.id,todayKey)?.status==="done").length;
  const pctVal=allItems.length?Math.round(doneToday/allItems.length*100):0;

  const SECS=[{key:"weekly",label:"주간 점검"},{key:"monthly",label:"월간 점검"}];

  el.innerHTML=`
  <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px;gap:12px">
    <div>
      <div style="font-size:18px;font-weight:800;color:var(--gray-900)">루틴 점검</div>
      <div style="font-size:13px;color:var(--gray-400);margin-top:3px">루틴 업무 체크리스트 · 완료 기록이 날짜별로 누적됩니다</div>
      <div style="display:flex;align-items:center;gap:8px;margin-top:8px">
        <div class="rt-prog-bar"><div class="rt-prog-fill" style="width:${pctVal}%"></div></div>
        <span style="font-size:13px;font-weight:600;color:var(--green)">${doneToday} / ${allItems.length} 완료 (${pctVal}%)</span>
      </div>
    </div>
    <div style="display:flex;gap:7px">
      <button class="btn-s" onclick="resetTodayRt()">오늘 초기화</button>
      <button class="btn-p" onclick="openRtModal()"><svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="8" y1="2" x2="8" y2="14"/><line x1="2" y1="8" x2="14" y2="8"/></svg> 항목 추가</button>
    </div>
  </div>

  ${SECS.map(sec=>{
    const items=routines[sec.key]||[];
    const dc=items.filter(r=>getRtRun(r.id,todayKey)?.status==="done").length;
    const allDone=dc===items.length&&items.length>0;
    return`<div class="rt-section">
      <div class="rt-sec-hd">
        <span class="rt-sec-lbl">${sec.label}</span>
        <span class="rt-sec-cnt${allDone?" all":""}">${dc}/${items.length}</span>
        <div class="rt-sec-line"></div>
        <button class="btn-s" style="font-size:11px;padding:4px 10px" onclick="allDoneSection('${sec.key}')">전체 완료</button>
        <button style="display:flex;align-items:center;gap:4px;padding:4px 9px;border:1px solid var(--gray-300);border-radius:var(--r);background:transparent;font-size:11px;color:var(--gray-400);cursor:pointer" onclick="copyRt('${sec.key}')"><svg width="11" height="11" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><rect x="5" y="2" width="9" height="12" rx="1"/><path d="M3 4H2a1 1 0 0 0-1 1v9a1 1 0 0 0 1 1h9a1 1 0 0 0 1-1v-1"/></svg>복사</button>
      </div>
      <div class="rt-list">
        ${items.length?items.map(item=>{
          const run=getRtRun(item.id,todayKey);
          const isDone=run?.status==="done";
          const isSkip=run?.status==="skip";
          const krM=memberByName(item.kr);
          const vnM=memberByName(item.vn);
          return`<div class="rt-item${isDone?" done":""}">
            <div class="rt-chk${isDone?" on":""}" onclick="toggleRtItem('${sec.key}','${item.id}')">
              ${isDone?`<svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="2,6 5,9 10,3"/></svg>`:""}
            </div>
            <div class="rt-item-body">
              <div class="rt-item-text">${esc(item.text)}</div>
              <div class="rt-item-meta">
                ${krM?`${avHtml(krM.name,"KR",14)}<span class="rt-item-who">${krM.name.split(" ")[0]}</span>`:""}
                ${vnM?`${avHtml(vnM.name,"VN",14)}<span class="rt-item-who">${vnM.name.split(" ")[0]}</span>`:""}
              </div>
            </div>
            <div class="rt-item-actions">
              ${isDone
                ? `<button class="rt-done-btn undone" onclick="unDoneRtItem('${sec.key}','${item.id}')">✓ 완료됨 · 취소</button>`
                : `<button class="rt-done-btn" onclick="completeRtItem('${sec.key}','${item.id}')">완료 처리</button>
                   <button class="rt-done-btn undone" onclick="skipRtItem('${sec.key}','${item.id}')" title="건너뛰기" style="${isSkip?'color:var(--amber);border-color:var(--amber)':''}">미완료</button>`
              }
              <button class="rt-del" onclick="delRtItem('${sec.key}','${item.id}')"><svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><line x1="2" y1="2" x2="10" y2="10"/><line x1="10" y1="2" x2="2" y2="10"/></svg></button>
            </div>
          </div>`;
        }).join(""):`<div style="padding:16px;text-align:center;color:var(--gray-400);font-size:13px">항목 없음</div>`}
      </div>
      ${items.length>0?`<div class="rt-hist">
        <div class="rt-hist-title">최근 완료 기록</div>
        ${(()=>{
          const hist=[];
          for(let i=0;i<7;i++){
            const d=new Date(Date.now()-i*86400000).toISOString().split("T")[0];
            const done=items.filter(r=>getRtRun(r.id,d)?.status==="done").length;
            const skip=items.filter(r=>getRtRun(r.id,d)?.status==="skip").length;
            if(done>0||skip>0)hist.push({date:d,done,skip,total:items.length});
          }
          return hist.length?hist.slice(0,5).map(h=>`<div class="rt-run-item"><span class="rt-run-date">${h.date}</span><span class="rt-run-status${h.done===h.total?" rt-run-done":" rt-run-skip"}">${h.done}/${h.total} 완료${h.skip>0?" · "+h.skip+"건 미완료":""}</span></div>`).join(""):`<div style="color:var(--gray-400);font-size:12px;padding:6px 0">기록 없음</div>`;
        })()}
      </div>`:""}
    </div>`;
  }).join("")}`;
  updateBadges();
}

function toggleRtItem(sec,id){
  const todayKey=today();
  const run=getRtRun(id,todayKey);
  if(run?.status==="done")setRtRun(id,todayKey,"pending");
  else setRtRun(id,todayKey,"done");
  renderRt();
}
function completeRtItem(sec,id){setRtRun(id,today(),"done");renderRt();toast("완료 처리됐습니다 ✓");}
function unDoneRtItem(sec,id){setRtRun(id,today(),"pending");renderRt();toast("완료 취소됐습니다");}
function skipRtItem(sec,id){setRtRun(id,today(),"skip");renderRt();toast("미완료 처리됐습니다");}
function allDoneSection(sec){const todayKey=today();(routines[sec]||[]).forEach(r=>setRtRun(r.id,todayKey,"done"));renderRt();toast("전체 완료 처리됐습니다 ✓");}
function resetTodayRt(){if(!confirm("오늘 체크를 모두 초기화할까요?"))return;const todayKey=today();rt_runs=rt_runs.filter(x=>x.date!==todayKey);saveRt();renderRt();toast("초기화됐습니다");}
function copyRt(sec){const label={weekly:"주간 점검",monthly:"월간 점검"}[sec];const todayKey=today();const text=label+"\n"+(routines[sec]||[]).map(r=>{const done=getRtRun(r.id,todayKey)?.status==="done";return`${done?"[x]":"[ ]"} ${r.text}`;}).join("\n");navigator.clipboard?.writeText(text).then(()=>toast("복사됐습니다 ✓")).catch(()=>toast("복사 실패",false));}
function delRtItem(sec,id){if(!confirm("삭제할까요?"))return;routines[sec]=(routines[sec]||[]).filter(r=>r.id!==id);saveRt();renderRt();toast("삭제됐습니다");}

let rtModalFreq="weekly";
function setRtFreq(f,el){rtModalFreq=f;document.querySelectorAll(".chip[id^='rtf-']").forEach(b=>b.classList.remove("on"));el.classList.add("on");}
function fillRtSelects(){
  const krSel=document.getElementById("rt-kr");const vnSel=document.getElementById("rt-vn");
  krSel.innerHTML=`<option value="">미지정</option>`+KR().map(m=>`<option value="${m.name}">${m.name}</option>`).join("");
  vnSel.innerHTML=`<option value="">미지정</option>`+VN().map(m=>`<option value="${m.name}">${m.name}</option>`).join("");
}
function openRtModal(){fillRtSelects();document.getElementById("rt-name").value="";rtModalFreq="weekly";document.getElementById("rtf-weekly").classList.add("on");document.getElementById("rtf-monthly").classList.remove("on");document.getElementById("m-routine").classList.add("on");}
function saveRtItem(){
  const text=document.getElementById("rt-name").value.trim();if(!text){document.getElementById("rt-name").focus();return;}
  if(!routines[rtModalFreq])routines[rtModalFreq]=[];
  routines[rtModalFreq].push({id:"rt_"+Date.now(),text,kr:document.getElementById("rt-kr").value,vn:document.getElementById("rt-vn").value});
  saveRt();cm("m-routine");renderRt();toast("추가됐습니다 ✓");
}

// ADMIN - Member & Requester Management
// ═══════════════════════════════════════════════════════
function renderAdmin(){
  const el=document.getElementById("admin-wrap");if(!el)return;
  const krMembers=KR(), vnMembers=VN();
  function memberCard(m){
    const mine=tickets.filter(t=>t.assignee===m.name);
    const done=mine.filter(t=>t.qa==="완료").length;
    return`<div class="member-card">
      <div class="mem-av" style="background:${m.team==="VN"?"#00BFA6":"#1D6FD8"}">${m.team==="KR"?m.name[0]:ini(m.name)}</div>
      <div class="mem-info">
        <div class="mem-name">${esc(m.name)}</div>
        <div class="mem-role">${m.role} · <span class="bdg ${m.team==="KR"?"tm-kr":"tm-vn"}" style="font-size:10px">${m.team}</span></div>
        <div class="mem-stats">
          <span class="mem-stat">📋 ${mine.length}건</span>
          <span class="mem-stat">✅ ${done}건</span>
        </div>
      </div>
      <div class="mem-actions">
        <button class="mem-btn" title="수정" onclick="openEditMember('${m.id}')"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M11 2l3 3-9 9H2v-3L11 2Z"/></svg></button>
        <button class="mem-btn del" title="삭제" onclick="deleteMember('${m.id}')"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><polyline points="3,4 13,4"/><path d="M6,4V3h4v1"/><path d="M5,4l.7,9h4.6L11,4"/></svg></button>
      </div>
    </div>`;
  }

  el.innerHTML=`
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
    <div><div style="font-size:18px;font-weight:800;color:var(--gray-900)">인력 관리</div><div style="font-size:13px;color:var(--gray-400);margin-top:3px">담당자 및 요청자 등록 · 수정 · 삭제</div></div>
  </div>

  <!-- KR팀 -->
  <div style="font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--gray-400);margin-bottom:10px;display:flex;align-items:center;gap:8px">
    🇰🇷 한국팀 (KR) <span class="bdg tm-kr">${krMembers.length}명</span>
    <div style="flex:1;height:1px;background:var(--gray-200)"></div>
    <button class="btn-p" style="font-size:12px;padding:5px 12px" onclick="openAddMember('KR')"><svg width="11" height="11" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="8" y1="2" x2="8" y2="14"/><line x1="2" y1="8" x2="14" y2="8"/></svg> 담당자 추가</button>
  </div>
  <div class="mem-grid" style="margin-bottom:20px">
    ${krMembers.map(memberCard).join("")}
    <div class="add-mem-card" onclick="openAddMember('KR')"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><line x1="8" y1="2" x2="8" y2="14"/><line x1="2" y1="8" x2="14" y2="8"/></svg>한국팀 담당자 추가</div>
  </div>

  <!-- VN팀 -->
  <div style="font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--gray-400);margin-bottom:10px;display:flex;align-items:center;gap:8px">
    🇻🇳 베트남팀 (VN) <span class="bdg tm-vn">${vnMembers.length}명</span>
    <div style="flex:1;height:1px;background:var(--gray-200)"></div>
    <button class="btn-p" style="font-size:12px;padding:5px 12px" onclick="openAddMember('VN')"><svg width="11" height="11" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="8" y1="2" x2="8" y2="14"/><line x1="2" y1="8" x2="14" y2="8"/></svg> 담당자 추가</button>
  </div>
  <div class="mem-grid" style="margin-bottom:24px">
    ${vnMembers.map(memberCard).join("")}
    <div class="add-mem-card" onclick="openAddMember('VN')"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><line x1="8" y1="2" x2="8" y2="14"/><line x1="2" y1="8" x2="14" y2="8"/></svg>베트남팀 담당자 추가</div>
  </div>

  <!-- 요청자 -->
  <div style="font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--gray-400);margin-bottom:10px;display:flex;align-items:center;gap:8px">
    📋 요청자 목록 <span class="bdg" style="background:var(--gray-50);color:var(--gray-600)">${requesters.length}명</span>
    <div style="flex:1;height:1px;background:var(--gray-200)"></div>
    <button class="btn-p" style="font-size:12px;padding:5px 12px" onclick="openAddRequester()"><svg width="11" height="11" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="8" y1="2" x2="8" y2="14"/><line x1="2" y1="8" x2="14" y2="8"/></svg> 요청자 추가</button>

      ${requesters.map((r,i)=>`<tr>
        <td style="color:var(--gray-400);font-family:var(--mono);font-size:11px">${i+1}</td>

        <td><span class="req-team">${esc(r.dept||"—")}</span></td>
        <td style="font-family:var(--mono);font-size:12px">${tickets.filter(t=>t.requester===r.name).length}건</td>

          <button class="mem-btn" onclick="openEditRequester('${r.id}')"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M11 2l3 3-9 9H2v-3L11 2Z"/></svg></button>
          <button class="mem-btn del" onclick="deleteRequester('${r.id}')"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><polyline points="3,4 13,4"/><path d="M5,4l.7,9h4.6L11,4"/></svg></button>
        </div></td>
      </tr>`).join("")}
      ${requesters.length===0?`<tr><td colspan="5" style="text-align:center;padding:32px;color:var(--gray-400)">등록된 요청자 없음</td></tr>`:""}

}

// Member CRUD
function buildColorPicker(selected){
  return COLORS.map((c,i)=>`<div class="color-swatch${c===selected?" on":""}" style="background:${c}" onclick="selectColor('${c}',this)"></div>`).join("");
}
function selectColor(c,el){memColor=c;document.querySelectorAll(".color-swatch").forEach(s=>s.classList.remove("on"));el.classList.add("on");}

function openAddMember(team="KR"){
  editMemberId=null;memTeam=team;memColor=COLORS[0];
  const mmt1=document.getElementById("m-member-title");if(mmt1)mmt1.textContent="담당자 추가";
  document.getElementById("mem-name").value="";
  document.getElementById("mem-role").value="";
  const mcEl=document.getElementById("mem-colors");if(mcEl)mcEl.innerHTML=buildColorPicker(memColor);
  document.getElementById("mem-team-kr")?.classList.toggle("on",team==="KR");
  document.getElementById("mem-team-vn")?.classList.toggle("on",team==="VN");
  const mmd=document.getElementById("m-mem-del");if(mmd)mmd.innerHTML="";
  document.getElementById("m-member")?.classList.add("on");
}
function openEditMember(id){
  const m=members.find(m=>m.id===id);if(!m)return;
  editMemberId=id;memTeam=m.team;memColor=m.color||COLORS[0];
  const mmtEl=document.getElementById("m-member-title");if(mmtEl)mmtEl.textContent="담당자 수정";
  document.getElementById("mem-name").value=m.name;
  document.getElementById("mem-role").value=m.role;
  document.getElementById("mem-colors").innerHTML=buildColorPicker(memColor);
  document.getElementById("mem-team-kr").classList.toggle("on",m.team==="KR");
  document.getElementById("mem-team-vn").classList.toggle("on",m.team==="VN");
  document.getElementById("m-mem-del").innerHTML=`<button class="btn-danger" onclick="deleteMember('${id}');cm('m-member')">삭제</button>`;
  document.getElementById("m-member").classList.add("on");
}
function setMemTeam(team,el){memTeam=team;document.getElementById("mem-team-kr").classList.toggle("on",team==="KR");document.getElementById("mem-team-vn").classList.toggle("on",team==="VN");}
function saveMember(){
  const name=document.getElementById("mem-name").value.trim();const role=document.getElementById("mem-role").value.trim();
  if(!name||!role){toast("이름과 역할을 입력하세요",false);return;}
  if(editMemberId){
    const i=members.findIndex(m=>m.id===editMemberId);
    if(i>-1)members[i]={...members[i],name,role,team:memTeam,color:memColor};
    toast("수정됐습니다 ✓");
  }else{
    members.push({id:"m_"+Date.now(),name,role,team:memTeam,color:memColor});
    toast("담당자가 추가됐습니다 ✓");
  }
  saveMembers();cm("m-member");renderAdmin();updateBadges();
}
function deleteMember(id){
  const m=members.find(x=>x.id===id);if(!m)return;
  showConfirm(`"${m.name}" 담당자를 삭제할까요?`, ()=>{
    members=members.filter(x=>x.id!==id);
    saveMembers();renderAdmin();updateBadges();toast("삭제됐습니다");
  });
}

// Requester CRUD
function openAddRequester(){
  editRequesterId=null;
  const mqt=document.getElementById("m-req-title");if(mqt)mqt.textContent="요청자 추가";
  document.getElementById("req-name").value="";document.getElementById("req-dept").value="";
  const mqd=document.getElementById("m-req-del");if(mqd)mqd.innerHTML="";
  document.getElementById("m-requester").classList.add("on");
}
function openEditRequester(id){
  const r=requesters.find(r=>r.id===id);if(!r)return;
  editRequesterId=id;
  const mqt2=document.getElementById("m-req-title");if(mqt2)mqt2.textContent="요청자 수정";
  document.getElementById("req-name").value=r.name;document.getElementById("req-dept").value=r.dept||"";
  document.getElementById("m-req-del").innerHTML=`<button class="btn-danger" onclick="deleteRequester('${id}');cm('m-requester')">삭제</button>`;
  document.getElementById("m-requester").classList.add("on");
}
function saveRequester(){
  const name=document.getElementById("req-name").value.trim();if(!name){document.getElementById("req-name").focus();return;}
  const dept=document.getElementById("req-dept").value.trim();
  if(editRequesterId){const i=requesters.findIndex(r=>r.id===editRequesterId);if(i>-1)requesters[i]={...requesters[i],name,dept};toast("수정됐습니다 ✓");}
  else{requesters.push({id:"r_"+Date.now(),name,dept});toast("요청자가 추가됐습니다 ✓");}
  saveRequesters();cm("m-requester");renderAdmin();
}
function deleteRequester(id){
  const r=requesters.find(x=>x.id===id);if(!r)return;
  showConfirm(`"${r.name}" 요청자를 삭제할까요?`, ()=>{
    requesters=requesters.filter(x=>x.id!==id);
    saveRequesters();renderAdmin();toast("삭제됐습니다");
  });
}

updateBadges();
renderDash();
renderRt();


// ═══ CONFIRM DIALOG ═══════════════════════════════════
function showConfirm(msg, onOk){
  const dlg=document.getElementById("confirm-dialog");
  const msgEl=document.getElementById("confirm-msg");
  const okBtn=document.getElementById("confirm-ok-btn");
  if(!dlg||!msgEl||!okBtn)return;
  msgEl.textContent=msg;
  dlg.style.display="flex";
  okBtn.onclick=function(e){
    e.stopPropagation();
    closeConfirmDialog();
    onOk();
  };
}
function closeConfirmDialog(){
  const d=document.getElementById("confirm-dialog");
  if(d) d.style.display="none";
}
